            "short_name": "다윗5순매니져",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#F3F4F6",

            "icons": [
                {
                    "src": "https://raw.githubusercontent.com/jongsungjoo/david5/refs/heads/main/icon2.png",

                },
                {

                    "type": "image/png",
                    "purpose": "any maskable"
                }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestUrl = URL.createObjectURL(manifestBlob);
        document.write('<link rel="manifest" href="' + manifestUrl + '">');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                const swCode = "self.addEventListener('install', function(e) { self.skipWaiting(); }); self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request).catch(function() { return new Response('Offline'); })); });";
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl).catch(function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
    
    <!-- Scripts -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --primary: #802B22;
            --bg: #F3F4F6;
        }
        
        html, body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg);

            -webkit-tap-highlight-color: transparent;

        @media (min-width: 768px) { .calendar-grid { gap: 4px; } }
        
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5px; padding-bottom: 4px; font-size: 0.8rem; font-weight: 700; border-radius: 8px; transition: all 0.2s; position: relative; gap: 1px; min-width: 0; overflow: visible; min-height: 36px; }
        .calendar-day.has-extra { aspect-ratio: unset; }
        @media (min-width: 768px) { .calendar-day { border-radius: 12px; padding-top: 7px; } }
        .has-record::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        @media (max-width: 768px) {
            .custom-scrollbar::-webkit-scrollbar { display: none; }
        }

        .bulletin-border {
            border: 1px solid #E5E7EB;
            position: relative;
            background-color: #FAFAFA;

<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {

            storageBucket: "onnuri-grace.firebasestorage.app",

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-[32px] p-6 card-shadow ${className}`}>{children}</div>
        );

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        const getLocalYYYYMMDD = (dateObj) => {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        // --- View 1: 순예배기록 ---
        const WorshipHistoryView = ({ history, members, onAddRecord, finance, onUpdateFinanceEdits, onUpdateRecord, onDeleteRecord, onOpenDirectory, isGlobalAdmin, onRequestAdmin }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const scrollRefs = useRef({});
            const [showAdd, setShowAdd] = useState(false);
            const [newRecord, setNewRecord] = useState({ date: getLocalYYYYMMDD(new Date()), type: "순예배", members: [], offering: "", location: "", notes: "" });
            
            const activeMembers = useMemo(() => members.filter(m => m.isParticipating && m.name.trim() !== ''), [members]);

            const [editingRecord, setEditingRecord] = useState(null); 
            const [prayerModal, setPrayerModal] = useState(null); // { name, prayer }
            const [financeEditMode, setFinanceEditMode] = useState(false);
            const [edits, setEdits] = useState({});
            const [carry, setCarry] = useState(finance.carryOver || 0);

            useEffect(() => { setCarry(finance.carryOver || 0); }, [finance.carryOver]);

            const daysInMonth = useMemo(() => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const totalDays = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= totalDays; i++) days.push(new Date(year, month, i));
                return days;
            }, [currentMonth]);

            const recordDates = useMemo(() => {
                const map = new Map();
                history.forEach(h => map.set(h.date, h));
                return map;
            }, [history]);

            const birthdayMap = useMemo(() => {
                const map = new Map();
                members.forEach(m => {
                    if (m.isParticipating && m.name.trim() !== '' && m.birthday && m.birthday.trim() && m.name) {
                        const key = m.birthday.trim(); // MM-DD format
                        const existing = map.get(key) || [];
                        map.set(key, [...existing, { name: m.name, role: m.role || '' }]);
                    }
                });
                return map;
            }, [members]);
            
            const handleDateClick = (dateStr) => scrollRefs.current[dateStr]?.scrollIntoView({ behavior: 'smooth', block: 'center' });

            const cumulativeTotal = useMemo(() => {
                const totalOffering = history.reduce((sum, h) => sum + Math.floor((Number(h.offering) || 0) * 0.4), 0);
                return totalOffering + (Number(finance.carryOver) || 0);
            }, [history, finance]);

            const currentYear = currentMonth.getFullYear();
            const currentHalf = currentMonth.getMonth() < 6 ? '상반기' : '하반기';
            
            const quarterStats = useMemo(() => {
                const isFirstHalf = currentMonth.getMonth() < 6;
                const records = history.filter(h => {
                    const d = new Date(h.date);
                    const month = d.getMonth();
                    return d.getFullYear() === currentYear && (isFirstHalf ? month < 6 : month >= 6);
                });
                const count = records.filter(h => h.type === '순예배' || !h.type || h.type === '종강예배').length;
                return { count };
            }, [history, currentYear, currentMonth]);

            const handleSaveFinance = () => {
                onUpdateFinanceEdits(carry, edits);
                setFinanceEditMode(false);
                setEdits({});
                alert("재정 설정이 저장되었습니다.");
            };

            const executeWithAuth = (action) => {
                if (isGlobalAdmin) { action(); } else { onRequestAdmin(action); }
            };

            return (
                <div className="space-y-6 animate-slide-up">
                    <header className="flex justify-between items-end px-1">
                        <div><span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase">Management</span><h1 className="text-2xl font-black">순예배 기록</h1></div>
                        <button onClick={() => setShowAdd(!showAdd)} className="w-10 h-10 bg-[#802B22] text-white rounded-full shadow-lg flex items-center justify-center transition-transform active:scale-90 hover:bg-[#6c231c]"><Icon name={showAdd ? "x" : "plus"} /></button>
                    </header>

                    {financeEditMode ? (
                        <div className="max-w-xl mx-auto w-full">
                            <Card className="border-4 border-[#802B22] bg-white relative z-20 fade-in p-4 md:p-6">
                                <div className="flex justify-between items-center mb-4 md:mb-5 border-b border-gray-50 pb-3">
                                    <h3 className="font-black text-lg md:text-2xl text-gray-800 flex items-center gap-2"><Icon name="coins" className="text-[#802B22] w-5 h-5"/> 누적순헌금 현황</h3>
                                    <button onClick={() => setFinanceEditMode(false)} className="p-1.5 bg-gray-50 rounded-full text-gray-500 active:scale-95 hover:bg-gray-100"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="space-y-5">
                                    
                                    <div className="bg-red-50 p-4 md:p-5 rounded-2xl flex flex-col sm:flex-row justify-between items-center sm:items-end gap-2 border border-red-100 shadow-inner">
                                        <span className="font-black text-[#802B22] text-xs md:text-sm tracking-widest uppercase">총 누적합산 금액</span>
                                        <span className="font-black text-2xl md:text-3xl text-gray-800 tracking-tight">₩ {cumulativeTotal.toLocaleString()}</span>
                                    </div>

                                    <div className="w-full">
                                        <label className="text-[10px] md:text-xs font-black text-gray-400 uppercase tracking-widest block mb-1.5 px-1">전학기 이월금</label>
                                        <div className="flex items-center gap-2 w-full">
                                            <div className="flex items-center gap-2 bg-gray-50 p-1.5 pl-3 rounded-xl flex-1 border border-gray-100">
                                                <input type="number" value={carry} onChange={e => setCarry(e.target.value)} className="flex-1 min-w-0 w-full py-1 bg-transparent font-black text-sm md:text-base outline-none text-right text-gray-700" placeholder="이월금" />
                                                <span className="text-xs md:text-sm font-bold text-gray-400 pr-2 shrink-0">원</span>
                                            </div>
                                            <button onClick={() => { onUpdateFinanceEdits(carry, {}); alert("이월금이 저장되었습니다."); }} className="px-4 py-2.5 md:py-3 bg-[#802B22] text-white rounded-xl font-black text-xs md:text-sm active:scale-95 transition-transform shrink-0 shadow-sm hover:bg-[#6c231c]">저장</button>
                                        </div>
                                    </div>

                                    <div className="border-t border-gray-100 pt-4 w-full">
                                        <label className="text-[10px] md:text-xs font-black text-gray-400 uppercase tracking-widest block mb-3 px-1">순예배 헌금 내역</label>
                                        <div className="space-y-2 max-h-[30vh] overflow-y-auto pr-1 md:pr-2 custom-scrollbar w-full">
                                            {history.length === 0 && <div className="text-xs md:text-sm text-gray-400 font-bold text-center py-6">기록된 헌금 내역이 없습니다.</div>}
                                            {history.map(h => (
                                                <div key={h.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100 w-full hover:bg-gray-100 transition-colors">
                                                    <span className="text-xs md:text-sm font-black text-gray-600 shrink-0">{h.date}</span>
                                                    <div className="flex items-center gap-2 text-right">
                                                        <span className="text-[10px] md:text-xs font-bold text-gray-400 hidden sm:inline">총액 ₩{(Number(h.offering)||0).toLocaleString()}</span>
                                                        <span className="hidden sm:inline text-gray-300">|</span>
                                                        <span className="text-sm md:text-base font-black text-[#802B22]">₩{Math.floor((Number(h.offering)||0) * 0.4).toLocaleString()} <span className="text-[9px] md:text-[10px] text-[#802B22]/60 font-bold ml-0.5">(40%)</span></span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                            {/* 왼쪽 열: 통계 & 달력 */}
                            <div className="lg:col-span-5 flex flex-col gap-6 lg:sticky lg:top-[100px] z-30">
                                <div className="bg-white rounded-[24px] p-6 shadow-sm border border-gray-100 flex flex-col gap-4">
                                    <div className="flex items-center gap-2 border-b border-gray-50 pb-3">
                                        <Icon name="bar-chart-2" className="w-5 h-5 text-[#802B22]" />
                                        <span className="font-black text-[#802B22] text-base">{currentYear}년 {currentHalf} 현황</span>
                                    </div>
                                    <div className="grid grid-cols-3 divide-x divide-gray-100">
                                        <div className="flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform hover:bg-blue-50 bg-blue-50/50 rounded-xl py-3 mx-1" onClick={onOpenDirectory}>
                                            <span className="text-xs font-bold text-blue-500 uppercase mb-1.5 flex items-center gap-1"><Icon name="users" className="w-3.5 h-3.5"/> 참석순원</span>
                                            <span className="font-black text-gray-800 text-xl md:text-2xl">{activeMembers.length}명</span>
                                        </div>
                                        <div className="flex flex-col items-center justify-center mx-1">
                                            <span className="text-xs font-bold text-gray-400 uppercase mb-1.5">순예배</span>
                                            <span className="font-black text-gray-800 text-xl md:text-2xl">{quarterStats.count}회</span>
                                        </div>
                                        <div className="flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform hover:bg-gray-100 bg-gray-50/50 rounded-xl py-3 mx-1" onClick={() => setFinanceEditMode(true)}>
                                            <span className="text-xs font-bold text-[#802B22] uppercase mb-1.5 flex items-center gap-1"><Icon name="coins" className="w-3.5 h-3.5"/> 순헌금(40%)</span>
                                            <span className="font-black text-gray-800 text-xl md:text-2xl">₩{cumulativeTotal.toLocaleString()}</span>
                                        </div>
                                    </div>
                                </div>

                                <Card className="p-4 md:p-6">
                                    <div className="flex justify-between items-center mb-3 md:mb-5">
                                        <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1))} className="p-2 active:scale-90 hover:bg-gray-100 rounded-full"><Icon name="chevron-left" className="text-gray-500 w-5 h-5 md:w-6 md:h-6" /></button>
                                        <h3 className="font-black text-base md:text-xl">{currentMonth.getFullYear()}년 {currentMonth.getMonth() + 1}월</h3>
                                        <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1))} className="p-2 active:scale-90 hover:bg-gray-100 rounded-full"><Icon name="chevron-right" className="text-gray-500 w-5 h-5 md:w-6 md:h-6" /></button>
                                    </div>
                                    <div className="calendar-grid mb-2 md:mb-3">{['일','월','화','수','목','금','토'].map(d => <div key={d} className="text-center text-[10px] md:text-xs font-black text-gray-400 uppercase">{d}</div>)}</div>
                                    <div className="calendar-grid">
                                        {daysInMonth.map((day, i) => {
                                            if (!day) return <div key={`empty-${i}`} />;
                                            const dStr = getLocalYYYYMMDD(day);
                                            const record = recordDates.get(dStr);
                                            const mmdd = `${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
                                            const bdayNames = birthdayMap.get(mmdd);
                                            return (
                                                <div key={dStr} onClick={() => record && handleDateClick(dStr)} className={`calendar-day${(record && bdayNames) ? ' has-extra' : ''} py-1 md:py-2 ${record ? 'cursor-pointer text-[#802B22] hover:bg-red-50' : bdayNames ? 'text-pink-500 hover:bg-pink-50' : 'text-gray-400'}`}>
                                                    <span className="text-sm md:text-lg leading-none flex items-center gap-0.5">
                                                        {day.getDate()}
                                                        {bdayNames && <span className="text-[9px] md:text-[11px] leading-none">🎂</span>}
                                                    </span>
                                                    {record && (
                                                        <div className={`text-[8px] sm:text-[9px] md:text-[10px] font-black px-0.5 py-[2px] rounded-sm w-[95%] mx-auto text-center block leading-[1.2] break-keep ${
                                                            record.type === '휴강' ? 'bg-gray-200 text-gray-600' :
                                                            record.type === '종강예배' ? 'bg-blue-100 text-blue-600' :
                                                            record.type === '연합야유회' ? 'bg-green-100 text-green-600' :
                                                            record.type === '미실시' ? 'bg-gray-300 text-gray-700' :
                                                            'bg-red-100 text-[#802B22]'
                                                        }`}>
                                                            {record.type || '순예배'}
                                                        </div>
                                                    )}
                                                    {bdayNames && bdayNames.map((person, idx) => (
                                                        <div key={idx} className="text-[8px] sm:text-[9px] md:text-[10px] font-black px-0.5 py-[2px] rounded-sm w-[95%] mx-auto text-center block leading-[1.3] bg-pink-100 text-pink-500 break-keep">
                                                            {person.name}{person.role && <span className="block text-[7px] sm:text-[8px] font-bold opacity-80">{person.role}</span>}
                                                        </div>
                                                    ))}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </Card>
                            </div>

                            {/* 오른쪽 열: 타임라인 */}
                            <div className="lg:col-span-7 flex flex-col gap-6 pt-2 lg:pt-0">
                                <h3 className="text-sm font-black text-gray-400 uppercase tracking-widest ml-2 mb-1">Timeline</h3>
                                {history.length === 0 && <p className="text-center text-base font-bold text-gray-400 py-10">기록된 예배가 없습니다.</p>}
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                    {history.map(h => (
                                        <Card key={h.id} className="p-6 flex flex-col gap-4 border-l-[6px] border-[#802B22] hover:shadow-lg transition-shadow">

        // --- View 2: 예배안내 (Worship Guide) ---
        const FullScreenImageViewer = ({ src, onClose }) => {
            const [imgScale, setImgScale] = useState(1);
            const [imgPos, setImgPos] = useState({ x: 0, y: 0 });
            const pinchRef = useRef(null);
            const lastPosRef = useRef(null);

            const getDistance = (touches) =>
                Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);

            const handleTouchStart = (e) => {
                if (e.touches.length === 2) {
                    pinchRef.current = { dist: getDistance(e.touches), scale: imgScale };
                } else if (e.touches.length === 1 && imgScale > 1) {
                    lastPosRef.current = { x: e.touches[0].pageX - imgPos.x, y: e.touches[0].pageY - imgPos.y };
                }
            };

            const handleTouchMove = (e) => {
                e.preventDefault();
                if (e.touches.length === 2 && pinchRef.current) {
                    const newDist = getDistance(e.touches);
                    const newScale = Math.min(Math.max(1, pinchRef.current.scale * (newDist / pinchRef.current.dist)), 5);
                    setImgScale(newScale);
                    if (newScale === 1) setImgPos({ x: 0, y: 0 });
                } else if (e.touches.length === 1 && imgScale > 1 && lastPosRef.current) {
                    setImgPos({ x: e.touches[0].pageX - lastPosRef.current.x, y: e.touches[0].pageY - lastPosRef.current.y });
                }
            };

            const handleTouchEnd = (e) => {
                if (e.touches.length < 2) pinchRef.current = null;
                if (e.touches.length === 0) lastPosRef.current = null;
                if (imgScale <= 1) { setImgScale(1); setImgPos({ x: 0, y: 0 }); }
            };

            return (
                <div
                    className="fixed inset-0 z-[99999] bg-black flex items-center justify-center fade-in overflow-hidden"
                    onTouchStart={handleTouchStart}
                    onTouchMove={handleTouchMove}
                    onTouchEnd={handleTouchEnd}
                    onClick={imgScale === 1 ? onClose : undefined}
                    style={{ touchAction: 'none' }}
                >
                    <img
                        src={src}
                        alt="크게 보기"
                        draggable={false}
                        style={{
                            transform: `scale(${imgScale}) translate(${imgPos.x / imgScale}px, ${imgPos.y / imgScale}px)`,
                            transformOrigin: 'center center',
                            transition: pinchRef.current ? 'none' : 'transform 0.15s ease-out',
                            maxWidth: '100vw',
                            maxHeight: '100vh',
                            objectFit: 'contain',
                            userSelect: 'none',
                            display: 'block',
                        }}
                    />
                    <div className="absolute top-5 right-5 flex gap-2">
                        <button
    onClick={async (e) => {
        e.stopPropagation();
        try {
            const res = await fetch(src);
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'image_' + Date.now() + '.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch(err) {
            alert('다운로드에 실패했습니다. 이미지를 길게 눌러 저장해주세요.');
        }
    }}
    className="bg-white/20 backdrop-blur-sm text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-white/30 transition-colors"
    title="이미지 다운로드"
><Icon name="download" className="w-5 h-5" /></button>
                        <button

            const [pinchDist, setPinchDist] = useState(null);

            useEffect(() => { setForm(guideData); }, [guideData]);

            useEffect(() => {
                if (!fullScreenBible) setTextScale(1);
            }, [fullScreenBible]);

            const IMGBB_API_KEY = "3eb61775e25c039859e4f8433f82b0a6";

            const handleImageUpload = async (e, slot) => {
                const file = e.target.files[0];
                if (!file) return;

                setUploadingSlot(slot);
                const deleteSlot = slot + 'DeleteUrl'; // 'musicImageDeleteUrl' or 'musicImage2DeleteUrl'

                try {
                    // 1. 기존 이미지 ImgBB에서 삭제
                    const oldDeleteUrl = form[deleteSlot];
                    if (oldDeleteUrl) {
                        try {
                            await fetch(oldDeleteUrl, { method: 'GET', mode: 'no-cors' });
                        } catch (_) { /* 삭제 실패해도 업로드는 계속 진행 */ }
                    }

                    // 2. 이미지 압축 후 ImgBB 업로드
                    const compressed = await compressImage(file);
                    const base64Data = compressed.split(',')[1];

                    const formData = new FormData();
                    formData.append('key', IMGBB_API_KEY);
                    formData.append('image', base64Data);
                    formData.append('name', `${slot}_${Date.now()}`);

                    const res = await fetch('https://api.imgbb.com/1/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();

                    if (!data.success) throw new Error(data.error?.message || '업로드 실패');

                    const url = data.data.url;
                    const deleteUrl = data.data.delete_url;

                    // 3. 새 URL + 삭제 URL을 form에 저장 (Firestore에 함께 저장됨)
                    setForm(prev => ({ ...prev, [slot]: url, [deleteSlot]: deleteUrl }));
                } catch (err) {
                    console.error('이미지 업로드 실패:', err);
                    alert('이미지 업로드에 실패했습니다. 다시 시도해주세요.');
                } finally {
                    setUploadingSlot(null);

            const save = () => { onUpdateGuide(form); setIsEditing(false); alert("예배 주보가 저장되었습니다."); };

            const handleDeleteAdImage = async (slot) => {
                const deleteSlot = slot + 'DeleteUrl';
                const deleteUrl = form[deleteSlot];
                if (deleteUrl) {
                    try { await fetch(deleteUrl, { method: 'GET', mode: 'no-cors' }); } catch(_) {}
                }
                const updated = { ...form, [slot]: '', [deleteSlot]: '' };
                setForm(updated);
                await onUpdateGuide(updated); // 즉시 Firestore 저장
            };

            const handleTouchStart = (e) => {
                if (e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    setPinchDist(dist);
                }
            };

                    {fullScreenBible && ReactDOM.createPortal(
                        <div 
                            className="fixed inset-0 z-[99999] bg-white/95 backdrop-blur-md flex flex-col p-6 md:p-12 fade-in overflow-y-auto custom-scrollbar" 
                            onClick={() => setFullScreenBible(false)}
                            onTouchStart={handleTouchStart}
                            onTouchMove={handleTouchMove}
                            onTouchEnd={handleTouchEnd}
                        >
                            <div className="flex justify-between items-center mb-10 shrink-0 max-w-4xl mx-auto w-full">
                                <span className="text-[#802B22] font-black tracking-[0.2em] uppercase text-sm border-b-2 border-[#802B22] pb-1">Scripture Reading</span>
                                <button className="p-2 text-gray-400 hover:text-[#802B22] hover:bg-red-50 rounded-full transition-colors"><Icon name="x" className="w-10 h-10" /></button>
                            </div>
                            <div className="mb-6 max-w-4xl mx-auto w-full">
                                <h2 className="font-black text-[#802B22] leading-tight" style={{ fontSize: `calc(1.25rem * ${textScale})` }}>{form.bibleVerse}</h2>
                            </div>
                            <div className="flex-1 max-w-4xl mx-auto w-full">
                                <p className="font-bold text-gray-800 leading-[2.2] whitespace-pre-wrap" style={{ fontSize: `calc(1.125rem * ${textScale})` }}>{form.bibleContent}</p>
                            </div>
                            <div className="mt-16 text-center text-gray-400 font-bold text-sm md:text-base bg-gray-50 py-4 rounded-xl max-w-4xl mx-auto w-full cursor-pointer hover:bg-gray-100 transition-colors">
                                아무 곳이나 탭하면 화면이 닫힙니다.<br/>
                                <span className="text-xs mt-1 block font-medium">(두 손가락으로 화면을 확대/축소하여 글씨 크기를 조절할 수 있습니다)</span>
                            </div>
                        </div>,
                        document.body
                    )}
                </div>
            );
        };

        // --- View 3: 순기도제목 ---
        const extractTags = (text, member) => {
            if (!text) return [];
            const tags = new Set();
            
            // 1. 건강 (최우선순위 1)
            // '건강한 가정'이라는 표현에서는 '건강' 태그가 잡히지 않도록 예외 처리
            const healthText = text.replace(/건강한\s*가정/g, '');
            if (/건강|치료|수술|아픔|병원|항암|질병|질환|입원|투병/.test(healthText)) tags.add('건강');
            
            // 2. 부모님 (최우선순위 2)
            if (/부모님|어머니|어머님|아버지|아버님|장인|장모|시어머니|시아버지|시댁|처가|친정|양가/.test(text)) tags.add('부모님');
            
            // 3. 자녀 (최우선순위 3)
            if (/자녀|아들|딸|아이|임신|출산|육아|학업|학교|대학|수능|합격|공부|진로/.test(text)) tags.add('자녀');
            if (member && member.children) {
                const childNames = member.children
                    .replace(/\(.*?\)/g, '') // "소율('04)" -> "소율"
                    .split(/[\s,]+/)         // 쉼표나 공백으로 분리
                    .map(n => n.trim())
                    .filter(n => n.length > 0);
                
                if (childNames.some(name => text.includes(name))) {
                    tags.add('자녀');
                }
            }

            // 4. 교회/사역
            if (/사역|사명|순장|봉사|전도|선교|임원|교사|목장|다락방/.test(text)) tags.add('교회/사역');
            
            // 5. 직장/사업
            if (/직장|취업|이직|회사|면접|승진|업무|사업|매출|계약/.test(text)) tags.add('직장/사업');
            
            // 6. 말씀/믿음
            if (/말씀|믿음|관계|갈등|마음|우울|평안|위로/.test(text)) tags.add('말씀/믿음');
            
            // 7. 가정/신앙 (부부 관련 단어 복구 및 통합)
            if (/가정|남편|아내|부부|결혼|배우자|신앙|예배|교회|성령|은혜|기도/.test(text)) tags.add('가정/신앙');
            
            // 최대 표시 태그 개수 4개
            return Array.from(tags).slice(0, 4); 
        };

        const PrayerCard = ({ m, onEditClick, forceExpand }) => {
            const [isExpanded, setIsExpanded] = useState(true);
            
            const tags = extractTags(m.prayer, m);

            useEffect(() => {
                setIsExpanded(forceExpand);
            }, [forceExpand]);

            const handleCopy = (e) => {
                e.stopPropagation();
                const text = `[${m.name}${m.role ? ' ' + m.role : ''}]\n${m.prayer || ''}`;
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('개별 기도제목이 복사되었습니다.');
                    }).catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            };

            const fallbackCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('개별 기도제목이 복사되었습니다.');
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                    alert('복사에 실패했습니다.');
                }
                document.body.removeChild(textArea);
            };

            return (
                <Card className="p-0 transition-all overflow-hidden border border-gray-100 shadow-sm hover:shadow-md">
                    <div className="p-4 md:p-5 flex justify-between items-start cursor-pointer hover:bg-gray-50 active:bg-gray-100 transition-colors relative" onClick={() => setIsExpanded(!isExpanded)}>
                        <div className="flex items-center">
                            <div>
                                <div className="flex items-center gap-1.5 mb-1.5 flex-wrap">
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-xl md:text-2xl font-black text-gray-800">{m.name}</span>
                                        {m.role && <span className="text-sm font-bold text-gray-400">{m.role}</span>}
                                    </div>
                                    {m.prayer && (
                                        <button onClick={handleCopy} className="ml-1 p-1.5 text-gray-400 hover:text-[#802B22] hover:bg-red-50 rounded-lg transition-colors active:scale-95" title="기도제목 복사">
                                            <Icon name="copy" className="w-4 h-4" />
                                        </button>
                                    )}
                                </div>
                                {tags.length > 0 && (
                                    <div className="flex flex-wrap gap-1.5 mt-1.5">
                                        {tags.map(tag => <span key={tag} className="text-[10px] font-black bg-gray-100 text-gray-500 px-2 py-0.5 rounded-md border border-gray-200">#{tag}</span>)}
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="flex flex-col items-center gap-2 mt-1">
                            {!isExpanded && <Icon name="chevron-down" className="text-gray-300 w-6 h-6 shrink-0" />}
                            {isExpanded && <Icon name="chevron-up" className="text-[#802B22] w-6 h-6 shrink-0" />}
                            {isExpanded && (
                                <button onClick={(e) => { e.stopPropagation(); onEditClick(m); }} className="p-2 text-[#802B22] bg-red-50 rounded-xl active:scale-95 transition-transform flex items-center justify-center hover:bg-red-100 shadow-sm mt-1">
                                    <Icon name="edit-3" className="w-4 h-4" />
                                </button>
                            )}
                        </div>
                    </div>

                    {isExpanded && (
                        <div className="px-3.5 pb-5 pt-4 md:px-5 border-t border-gray-50 bg-gray-50/30">
                            <div className="relative fade-in">
                                {m.prayer ? (
                                    <div className="text-[15px] md:text-base font-bold flex flex-col gap-3">
                                        {m.prayer.split('\n').map((line, idx) => {
                                            if (!line.trim()) return <div key={idx} className="h-1"></div>;
                                            const match = line.trim().match(/^(\d+[\.\)])\s*(.*)/);
                                            if (match) {
                                                return (
                                                    <div key={idx} className="flex gap-2 items-start">
                                                        <span className="text-[#802B22] font-black shrink-0 leading-[1.7]">{match[1]}</span>
                                                        <span className="text-gray-700 leading-[1.7] break-words">{match[2]}</span>
                                                    </div>
                                                );
                                            }
                                            return <div key={idx} className="text-gray-700 leading-[1.7] break-words">{line}</div>;
                                        })}
                                    </div>
                                ) : (
                                    <p className="text-sm md:text-base text-gray-400 font-bold italic py-2">등록된 순기도제목이 없습니다.</p>
                                )}
                            </div>
                        </div>
                    )}
                </Card>
            );
        };

        const PrayerListView = ({ members, onUpdate }) => {
            const activeMembers = useMemo(() => members.filter(m => m.isParticipating && m.name.trim() !== ''), [members]);
            
            const [shuffledIds, setShuffledIds] = useState([]);
            useEffect(() => {
                const ids = activeMembers.map(m => m.id);
                ids.sort(() => Math.random() - 0.5);
                setShuffledIds(ids);
            }, [activeMembers.length]); 

            const displayMembers = useMemo(() => {
                if (shuffledIds.length === 0) return activeMembers;
                const membersById = {};
                activeMembers.forEach(m => { membersById[m.id] = m; });
                return shuffledIds.map(id => membersById[id]).filter(Boolean);
            }, [activeMembers, shuffledIds]);

            const allTags = useMemo(() => {
                const tags = new Set();
                activeMembers.forEach(m => extractTags(m.prayer, m).forEach(t => tags.add(t)));
                return Array.from(tags);
            }, [activeMembers]);

            const [selectedTag, setSelectedTag] = useState(null);
            const [isAllExpanded, setIsAllExpanded] = useState(true);

            const [editingMember, setEditingMember] = useState(null);
            const [editDraft, setEditDraft] = useState("");

            const filteredMembers = useMemo(() => {
                if (selectedTag === '가나다순') {
                    return [...activeMembers].sort((a, b) => a.name.localeCompare(b.name));
                }
                if (!selectedTag) return displayMembers;
                return displayMembers.filter(m => extractTags(m.prayer, m).includes(selectedTag));
            }, [displayMembers, activeMembers, selectedTag]);

            const openEdit = (m) => {
                setEditingMember(m);
                setEditDraft(m.prayer || "");
            };

            const closeEdit = () => {
                setEditingMember(null);
                setEditDraft("");
            };

            const handleSavePrayer = () => {
                onUpdate(editingMember.id, editDraft);
                closeEdit();
            };

            const handleShareAll = async () => {
                const prayers = activeMembers
                    .filter(m => m.prayer && m.prayer.trim() !== '')
                    .sort((a, b) => (a.order || 99) - (b.order || 99));

                let text = "★다윗5순 기도제목★\n\n";
                prayers.forEach(m => {
                    text += `[${m.name} ${m.role || ''}]\n${m.prayer}\n\n`;
                });

                let copySuccess = false;
                if (navigator.clipboard && window.isSecureContext) {
                    try {
                        await navigator.clipboard.writeText(text);
                        copySuccess = true;
                    } catch (e) {
                        copySuccess = fallbackCopy(text, true); // 두 번째 인자 true는 복사 완료 alert를 숨기기 위함
                    }
                } else {
                    copySuccess = fallbackCopy(text, true);
                }

                if (navigator.share) {
                    try {
                        // title 속성을 제거하여 공유 시 불필요한 "다윗5순 기도제목 -" 중복 방지
                        await navigator.share({
                            text: text
                        });
                    } catch (error) {
                        console.log('공유 취소 또는 에러', error);
                        // 사용자가 공유를 취소하더라도 클립보드에는 복사되었음을 알림
                        if(copySuccess) alert('전체 기도제목이 복사되었습니다.');
                    }
                } else {
                    if(copySuccess) alert('전체 기도제목이 복사되었습니다.\n(현재 브라우저는 공유하기 기능을 지원하지 않아 복사만 진행되었습니다)');
                }
            };

            const fallbackCopy = (text, silent = false) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                let success = false;
                try {
                    document.execCommand('copy');
                    success = true;
                    if(!silent) alert('전체 기도제목이 복사되었습니다.');
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                    if(!silent) alert('복사에 실패했습니다.');
                }
                document.body.removeChild(textArea);
                return success;
            };

            return (
                <div className="space-y-6 animate-slide-up pb-6">
                    <header className="px-1 flex justify-between items-end">
                        <div>
                            <span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase">PRAYER REQUEST</span>
                            <h1 className="text-2xl font-black mt-1">순기도제목</h1>
                        </div>
                    </header>

                    <div className="flex flex-wrap gap-2.5 px-1">
                        <button onClick={() => setSelectedTag(null)} className={`px-4 py-2 rounded-full text-sm font-black transition-colors shadow-sm ${!selectedTag ? 'bg-gray-800 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>전체보기</button>
                        <button onClick={() => setSelectedTag('가나다순')} className={`px-4 py-2 rounded-full text-sm font-black transition-colors shadow-sm ${selectedTag === '가나다순' ? 'bg-gray-800 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>#가나다순</button>
                        {allTags.map(tag => (
                            <button key={tag} onClick={() => setSelectedTag(selectedTag === tag ? null : tag)} className={`px-4 py-2 rounded-full text-sm font-black transition-colors shadow-sm ${selectedTag === tag ? 'bg-gray-800 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>#{tag}</button>
                        ))}
                    </div>

                    <div className="flex justify-between items-center px-1">
                        <button onClick={handleShareAll} className="flex items-center gap-1.5 text-[12px] font-black text-gray-500 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100 hover:bg-gray-50 active:scale-95 transition-transform" title="공유하기">
                            <Icon name="share-2" className="w-3.5 h-3.5 text-[#802B22]" />
                            공유 ({activeMembers.filter(m => m.prayer).length})
                        </button>
                        <button onClick={() => setIsAllExpanded(!isAllExpanded)} className="text-sm font-black text-[#802B22] flex items-center gap-1.5 bg-red-50 px-4 py-2 rounded-xl active:scale-95 transition-transform shadow-sm hover:bg-red-100 border border-red-100">
                            <Icon name={isAllExpanded ? "chevrons-up" : "chevrons-down"} className="w-4 h-4" />
                            {isAllExpanded ? "순기도제목 모두 접기" : "순기도제목 모두 펼치기"}
                        </button>
                    </div>

                    <div className="columns-1 md:columns-2 lg:columns-3 gap-6 w-full mt-4">
                        {filteredMembers.length === 0 && <div className="text-center py-12 text-gray-400 font-bold text-base w-full block col-span-full">해당되는 순기도제목이 없습니다.</div>}
                        {filteredMembers.map(m => (
                            <div key={m.id} className="break-inside-avoid mb-6 w-full block">
                                <PrayerCard m={m} onEditClick={openEdit} forceExpand={isAllExpanded} />
                            </div>
                        ))}
                    </div>

                    {/* 기도제목 수정 모달 레이어 (포털 적용 및 흰색 반투명 효과) */}
                    {editingMember && ReactDOM.createPortal(
                        <div className="fixed inset-0 z-[99999] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center p-4 fade-in pb-[90px]" onClick={closeEdit}>
                            <div className="w-full max-w-2xl mx-auto flex flex-col max-h-full shadow-2xl rounded-3xl bg-white" onClick={e=>e.stopPropagation()}>
                                <Card className="border-t-8 border-[#802B22] fade-in p-5 md:p-8 flex flex-col overflow-hidden w-full max-h-[85vh]">
                                    <div className="flex justify-between items-center mb-6 shrink-0">
                                        <div>
                                            <span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase block mb-1">PRAYER EDIT</span>
                                            <h3 className="font-black text-xl md:text-2xl">{editingMember.name} {editingMember.role} 기도제목 수정</h3>
                                        </div>
                                        <button onClick={closeEdit} className="p-2 text-gray-400 active:scale-95 hover:bg-gray-100 rounded-full"><Icon name="x" className="w-6 h-6"/></button>
                                    </div>
                                    <div className="space-y-4 md:space-y-6 overflow-y-auto custom-scrollbar pr-2 flex-1 pb-4">
                                        <textarea
                                            value={editDraft}
                                            onChange={e => setEditDraft(e.target.value)}
                                            placeholder="순기도제목을 상세히 입력하세요..."
                                            className="w-full bg-gray-50 p-5 rounded-2xl border border-gray-200 text-[15px] md:text-base font-bold outline-none focus:border-[#802B22] min-h-[250px] resize-none text-gray-800 custom-scrollbar leading-relaxed"
                                            autoFocus
                                        />
                                    </div>
                                    <div className="flex gap-3 pt-4 border-t border-gray-100 mt-2 shrink-0">
                                        <button onClick={closeEdit} className="w-1/3 py-4 md:py-5 bg-gray-100 text-gray-600 rounded-2xl font-black text-lg active:scale-95 hover:bg-gray-200">취소</button>
                                        <button onClick={handleSavePrayer} className="w-2/3 py-4 md:py-5 bg-[#802B22] text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 hover:bg-[#6c231c]">저장 완료</button>
                                    </div>
                                </Card>
                            </div>
                        </div>,
                        document.body
                    )}
                </div>
            );
        };

        // --- View 4: 가족 단위 명단(테이블) 모달 ---
        const MobileDirectoryCard = ({ family, isAdmin, draft, onChange, onDelete }) => {
            if (isAdmin && draft) {
                return (
                    <div className="bg-blue-50/20 p-4 rounded-xl border border-blue-200 flex flex-col gap-3 shadow-sm">
                        <div className="flex flex-col gap-3">
                            <div className="bg-white p-3 rounded-lg border border-blue-100">
                                <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1.5 block">남편</span>
                                <div className="flex gap-2 mb-2 w-full">
                                    <input className="w-1/2 min-w-0 flex-1 p-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-[#802B22] font-bold" value={draft.hName} onChange={e=>onChange({...draft, hName: e.target.value})} placeholder="이름" />
                                    <input className="w-1/2 min-w-0 flex-1 p-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-[#802B22] font-bold" value={draft.hRole} onChange={e=>onChange({...draft, hRole: e.target.value})} placeholder="직분" />
                                </div>
                                <input className="w-full p-2 border border-gray-200 rounded-lg text-sm outline-none focus:border-[#802B22] font-bold mb-2" value={draft.hBirthday || ''} onChange={e=>onChange({...draft, hBirthday: e.target.value})} placeholder="생일 MM-DD (예: 03-15)" />
                                <label className="flex items-center gap-2 cursor-pointer pt-1"><input type="checkbox" checked={draft.hPart} onChange={e=>onChange({...draft, hPart: e.target.checked})} className="text-[#802B22] w-4 h-4 rounded cursor-pointer"/><span className="text-xs font-bold text-gray-700">순예배참여</span></label>
                            </div>
                            <div className="bg-white p-3 rounded-lg border border-blue-100">
                                <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1.5 block">아내</span>
                                <div className="flex gap-2 mb-2 w-full">
                                    <input className="w-1/2 min-w-0 flex-1 p-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-[#802B22] font-bold" value={draft.wName} onChange={e=>onChange({...draft, wName: e.target.value})} placeholder="이름" />
                                    <input className="w-1/2 min-w-0 flex-1 p-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-[#802B22] font-bold" value={draft.wRole} onChange={e=>onChange({...draft, wRole: e.target.value})} placeholder="직분" />
                                </div>
                                <input className="w-full p-2 border border-gray-200 rounded-lg text-sm outline-none focus:border-[#802B22] font-bold mb-2" value={draft.wBirthday || ''} onChange={e=>onChange({...draft, wBirthday: e.target.value})} placeholder="생일 MM-DD (예: 03-15)" />
                                <label className="flex items-center gap-2 cursor-pointer pt-1"><input type="checkbox" checked={draft.wPart} onChange={e=>onChange({...draft, wPart: e.target.checked})} className="text-[#802B22] w-4 h-4 rounded cursor-pointer"/><span className="text-xs font-bold text-gray-700">순예배참여</span></label>
                            </div>
                        </div>
                        <div className="bg-white p-3 rounded-lg border border-blue-100 flex flex-col gap-2">
                            <div className="w-full">
                                <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-1">자녀정보</span>

        const App = () => {

            const [members, setMembers] = useState([]);
            const [history, setHistory] = useState([]);
            const [finance, setFinance] = useState({ carryOver: 180000 });
            const [adminPass, setAdminPass] = useState("00");

            // --- 전역 관리자 인증 상태 ---
            const [isGlobalAdmin, setIsGlobalAdmin] = useState(false);
            const [showGlobalAuth, setShowGlobalAuth] = useState(false);
            const [globalAuthInput, setGlobalAuthInput] = useState('');
            const [globalAuthError, setGlobalAuthError] = useState('');
            const [pendingGlobalAction, setPendingGlobalAction] = useState(null);

            const requestAdmin = (action) => {

                                <div className="flex gap-3 mt-6">
                                    <button onClick={()=>{setShowGlobalAuth(false); setGlobalAuthError(''); setGlobalAuthInput('');}} className="flex-1 py-4 text-gray-500 text-lg font-black rounded-2xl active:scale-95 hover:bg-gray-50 transition-colors">취소</button>
                                    <button onClick={handleGlobalAuthConfirm} className="flex-1 py-4 bg-[#802B22] text-white text-lg font-black rounded-2xl active:scale-95 shadow-md hover:bg-[#6c231c] transition-colors">확인</button>
                                </div>
                            </div>
                        </div>,
                        document.body
                    )}

                    {/* Main Content: 헤더 공간 확보를 위해 pt-20 정도 추가 */}
                    <div className="main-content flex-1 w-full flex justify-center pt-[74px] md:pt-[80px] pb-[100px] bg-[#F3F4F6]">
                        <div className="w-full max-w-6xl p-4 md:p-6">
                            {view === 'prayer' && <PrayerListView members={members} onUpdate={handleUpdatePrayer} />}
                            {view === 'guide' && <WorshipGuideView guideData={guideData} onUpdateGuide={handleUpdateGuide} />}
                            {view === 'history' && <WorshipHistoryView history={history} members={members} finance={finance} isGlobalAdmin={isGlobalAdmin} onRequestAdmin={requestAdmin} onUpdateFinanceEdits={handleUpdateFinanceEdits} onUpdateRecord={handleUpdateRecord} onDeleteRecord={handleDeleteRecord} onOpenDirectory={() => setShowDirectory(true)} onAddRecord={async (r) => { const { db, collection, addDoc, appId } = window.FB_SDK; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'worship'), r); }} />}
                        </div>
                    </div>

                    {/* 하단 탭: fixed 적용 및 transition으로 스크롤 반응형 구현 */}
                    <nav className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 h-[76px] md:h-[84px] safe-bottom z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] flex justify-center transition-transform duration-300 ease-in-out ${showNav ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="w-full max-w-xl flex relative h-full px-2 items-center pb-1">
                            <div 
                                className="absolute h-[56px] top-1/2 -translate-y-1/2 bg-red-50 rounded-[1.2rem] transition-transform duration-500"
                                style={{ 
                                    width: `calc((100% - 16px) / 3)`, 
                                    left: `8px`,
                                    transform: `translateX(calc(${activeIndex} * 100%))`,
                                    transitionTimingFunction: 'cubic-bezier(0.34, 1.56, 0.64, 1)' 
                                }}
                            />
                            
                            {tabs.map(t => (
                                <button 
                                    key={t.id} 
                                    onClick={() => { setView(t.id); window.scrollTo({top: 0, behavior: 'smooth'}); setShowNav(true); }} 
                                    className="flex-1 relative z-10 flex flex-col items-center justify-center h-full w-full outline-none"
                                    style={{ WebkitTapHighlightColor: 'transparent' }}
                                >
                                    <div className={`transition-all duration-500 ease-out flex flex-col items-center ${view === t.id ? '-translate-y-1.5' : 'translate-y-0'}`}>
                                        <Icon name={t.icon} className={`transition-colors duration-500 ${view === t.id ? 'text-[#802B22] w-[22px] h-[22px] stroke-[2.5]' : 'text-gray-400 w-6 h-6 stroke-2'}`} />
                                    </div>
                                    <span className={`text-[11px] md:text-xs font-black tracking-tighter absolute bottom-1.5 transition-colors duration-500 ease-out ${view === t.id ? 'text-[#802B22]' : 'text-gray-400'}`}>
                                        {t.label}
                                    </span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {showDirectory && <DirectoryModal members={members} onClose={() => setShowDirectory(false)} onGlobalSave={handleGlobalSaveFamilyInfo} onAddFamily={handleAddFamily} onDeleteFamily={handleDeleteFamily} adminPass={adminPass} onChangeAdminPass={handleChangeAdminPass} isGlobalAdmin={isGlobalAdmin} onRequestAdmin={requestAdmin} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
