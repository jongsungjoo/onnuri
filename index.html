            cloudinary: {
                cloudName:    "여기에_CLOUD_NAME",

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const sw = "self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response(''))));";
                navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
            });
        }
    </script>

<body><div id="root"></div>
<script type="module">
    const loadGroup = () => {
        const hash = window.location.hash.slice(1);
        if (hash) {
            try {
                const g = JSON.parse(atob(decodeURIComponent(hash)));
                if (g?.groupId && g?.groupName) {
                    localStorage.setItem('soon-group', JSON.stringify(g));
                    history.replaceState(null,'',location.pathname);
                    return g;
                }
            } catch(e){}
        }
        try { const s=localStorage.getItem('soon-group'); if(s) return JSON.parse(s); } catch(e){}
        return null;
    };
    window.__G__ = loadGroup();
    const fc = window.SOON_CFG.firebase;
    if (!fc.apiKey || fc.apiKey.startsWith('여기에')) {
        window.__MODE__ = 'owner-setup';
    } else {
        try {
            const {initializeApp} = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const {getAuth,signInAnonymously} = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const {getFirestore,doc,collection,onSnapshot,setDoc,addDoc,deleteDoc,updateDoc} = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const app = initializeApp(fc);
            await signInAnonymously(getAuth(app));
            window.FB = {db:getFirestore(app),doc,collection,onSnapshot,setDoc,addDoc,deleteDoc,updateDoc};
            window.__MODE__ = window.__G__ ? 'app' : 'wizard';
        } catch(e) {
            window.__MODE__ = 'error';
            window.__ERR__ = e.message;
        }
    }
    window.dispatchEvent(new CustomEvent('soon-ready'));
</script>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo} = React;

// ── 공통 ─────────────────────────────────────────────────────
const Icon = ({name,className="w-5 h-5"}) => {
    const r=useRef(null);
    useEffect(()=>{if(window.lucide&&r.current){r.current.innerHTML=`<i data-lucide="${name}"></i>`;window.lucide.createIcons({root:r.current});}},[name]);
    return <span ref={r} className={`inline-flex items-center justify-center ${className}`}/>;
};
const Card = ({children,className=""}) => <div className={`bg-white rounded-[32px] p-6 card-shadow ${className}`}>{children}</div>;
const ymd = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const P = () => `groups/${window.__G__?.groupId}/data`;

const compress = (file,maxW=1200,q=0.85) => new Promise(res=>{
    const fr=new FileReader(); fr.readAsDataURL(file);
    fr.onload=e=>{const img=new Image();img.src=e.target.result;img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxW){h=h*maxW/w;w=maxW;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q));};};
});
const uploadImg = async file => {
    const {cloudName,uploadPreset}=window.SOON_CFG.cloudinary;
    const b64=await compress(file);
    const blob=await(await fetch(b64)).blob();
    const fd=new FormData();fd.append('file',blob);fd.append('upload_preset',uploadPreset);fd.append('folder','soon-manager');
    const d=await(await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,{method:'POST',body:fd})).json();
    if(d.error)throw new Error(d.error.message);
    return {url:d.secure_url,pid:d.public_id};
};
const cpText = async text => {
    if(navigator.clipboard&&window.isSecureContext){try{await navigator.clipboard.writeText(text);return true;}catch{}}
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.focus();ta.select();
    const ok=document.execCommand('copy');document.body.removeChild(ta);return ok;
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  마법사 (순 이름 + 비밀번호만!)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Wizard = () => {
    const [name,setName]=useState('');
    const [pwd,setPwd]=useState('');
    const [saving,setSaving]=useState(false);
    const [url,setUrl]=useState('');
    const [copied,setCopied]=useState(false);
    const [done,setDone]=useState(false);

    const create = async () => {
        if (!name.trim()) return;
        setSaving(true);
        try {
            const gid='g_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
            const g={groupId:gid,groupName:name.trim()};
            await window.FB.setDoc(window.FB.doc(window.FB.db,`groups/${gid}/data/settings/admin`),{password:pwd.trim()||'1234'});
            localStorage.setItem('soon-group',JSON.stringify(g));
            window.__G__=g;
            const enc=encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(g)))));
            setUrl(location.origin+location.pathname+'#'+enc);
            setDone(true);
        } catch(e){alert('오류: '+e.message);}
        finally{setSaving(false);}
    };

    const doCopy = async () => {
        const ok=await cpText(url);
        if(ok){setCopied(true);setTimeout(()=>setCopied(false),3000);}
    };

    if (done) return (
        <div className="min-h-screen bg-gradient-to-br from-[#802B22]/5 via-white to-orange-50/30 flex items-center justify-center p-4">
            <div className="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-8 text-center wiz-in">
                <div className="text-6xl mb-4">🎉</div>
                <h2 className="text-2xl font-black mb-1">완성!</h2>
                <p className="text-gray-500 font-bold text-sm mb-6"><strong className="text-[#802B22]">{name}</strong> 순 매니저가 만들어졌습니다</p>
                <div className="bg-[#802B22]/5 border border-[#802B22]/20 rounded-2xl p-4 text-left mb-4">
                    <p className="text-xs font-black text-[#802B22] mb-1">📱 순원 공유 URL</p>
                    <p className="text-xs text-gray-500 font-bold mb-3">이 URL을 카톡으로 공유하면 순원들은 별도 설정 없이 바로 사용 가능합니다.</p>
                    <div className="bg-white rounded-xl p-3 border border-gray-200 text-[10px] font-mono text-gray-500 break-all mb-3">{url}</div>
                    <button onClick={doCopy} className={`w-full py-3 rounded-xl font-black text-sm transition-all ${copied?'bg-green-100 text-green-700':'bg-[#802B22] text-white hover:bg-[#6c231c] active:scale-95'}`}>{copied?'✓ URL 복사됨!':'🔗 URL 복사하기'}</button>
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 text-left mb-5">
                    <p className="text-xs font-black text-amber-700 mb-1">💾 이 URL을 꼭 저장해두세요!</p>
                    <p className="text-xs text-amber-700 font-bold leading-relaxed">새 기기에서 접속할 때 이 URL이 필요합니다. 카톡 나에게 보내기 추천!</p>
                </div>
                <button onClick={()=>location.reload()} className="w-full py-4 rounded-2xl font-black text-base bg-[#802B22] text-white shadow-lg hover:bg-[#6c231c] active:scale-95">앱 시작하기 →</button>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen bg-gradient-to-br from-[#802B22]/5 via-white to-orange-50/30 flex items-center justify-center p-4">
            <div className="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-8 wiz-in">
                <div className="text-center mb-8">
                    <div className="text-5xl mb-4">⛪</div>
                    <h1 className="text-2xl font-black mb-1">순 매니저 시작</h1>
                    <p className="text-gray-400 font-bold text-sm">순 이름과 비밀번호만 입력하면 됩니다</p>
                </div>
                <div className="space-y-4 mb-6">
                    <div>
                        <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">순 이름</label>
                        <input type="text" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&create()} placeholder="예: 다윗 5순, 룻 3순..." className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-black text-base outline-none focus:border-[#802B22]" autoFocus/>
                    </div>
                    <div>
                        <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">관리자 비밀번호</label>
                        <input type="text" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==='Enter'&&create()} placeholder="숫자나 문자 조합 (예: 1234)" className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-black text-base outline-none focus:border-[#802B22]"/>
                        <p className="text-xs text-gray-400 font-bold mt-1.5 px-1">예배기록 수정·삭제, 순원 명단 편집 시 필요합니다</p>
                    </div>
                </div>
                <button onClick={create} disabled={!name.trim()||saving} className={`w-full py-4 rounded-2xl font-black text-base transition-all ${!name.trim()||saving?'bg-gray-200 text-gray-400 cursor-not-allowed':'bg-[#802B22] text-white shadow-lg hover:bg-[#6c231c] active:scale-95'}`}>
                    {saving?<span className="flex items-center justify-center gap-2"><svg className="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>생성 중...</span>:'순 매니저 만들기 →'}
                </button>
                <div className="mt-4 bg-blue-50 border border-blue-100 rounded-2xl p-3 text-xs text-blue-700 font-bold text-center">✅ 구글 계정 불필요 · 앱 설치 불필요 · 완전 무료</div>
            </div>
        </div>
    );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  오너 설정 안내
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const OwnerSetup = () => (
    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
        <div className="w-full max-w-lg bg-white rounded-[2rem] shadow-xl p-8">
            <div className="text-4xl mb-4">🔧</div>
            <h1 className="text-2xl font-black mb-2">순장님, 설정값만 채워주세요!</h1>
            <p className="text-gray-500 font-bold text-sm mb-5">HTML 파일 상단의 <code className="bg-gray-100 px-1.5 py-0.5 rounded text-[#802B22] font-black">window.SOON_CFG</code> 부분을 수정하세요</p>
            <div className="space-y-4 mb-6">
                <div className="flex gap-3 items-start p-4 bg-orange-50 border border-orange-100 rounded-2xl">
                    <span className="w-7 h-7 rounded-full bg-orange-500 text-white text-xs font-black flex items-center justify-center shrink-0 mt-0.5">1</span>
                    <div><p className="font-black text-gray-800 text-sm">Firebase 설정</p><p className="text-gray-500 font-bold text-xs mt-1">console.firebase.google.com → 프로젝트 설정 → 내 앱 → 웹 앱 추가 → firebaseConfig 복사</p><p className="text-orange-600 font-bold text-xs mt-1">⚠️ Firestore 생성 + 익명 로그인 활성화도 필요합니다</p></div>
                </div>
                <div className="flex gap-3 items-start p-4 bg-blue-50 border border-blue-100 rounded-2xl">
                    <span className="w-7 h-7 rounded-full bg-blue-500 text-white text-xs font-black flex items-center justify-center shrink-0 mt-0.5">2</span>
                    <div><p className="font-black text-gray-800 text-sm">Cloudinary 설정 (이미지 업로드)</p><p className="text-gray-500 font-bold text-xs mt-1">cloudinary.com 가입 → Settings → Upload → Upload presets → Add preset → Unsigned 선택 후 저장</p></div>
                </div>

                    <div><p className="font-black text-gray-800 text-sm">Netlify 배포</p><p className="text-gray-500 font-bold text-xs mt-1">netlify.com → 이 HTML 파일 드래그&드롭 → 완성!</p></div>
                </div>
            </div>
            <div className="bg-gray-900 rounded-2xl p-4 text-xs font-mono text-green-400 leading-relaxed overflow-x-auto">
                <span className="text-gray-500">// soon-manager.html 상단에서 수정</span>{"\n"}
                firebase: {"{"}{"\n"}
                {"  "}apiKey: <span className="text-yellow-300">"AIzaSy..."</span>,{"\n"}
                {"  "}projectId: <span className="text-yellow-300">"my-project"</span>,{"\n"}
                {"  "}...{"\n"}
                {"}"},{"\n"}
                cloudinary: {"{"}{"\n"}
                {"  "}cloudName: <span className="text-yellow-300">"my-cloud"</span>,{"\n"}
                {"  "}uploadPreset: <span className="text-yellow-300">"soon_unsigned"</span>{"\n"}
                {"}"}
            </div>
        </div>
    </div>
);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  순예배기록
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const WorshipView = ({history,members,finance,onAdd,onUpdate,onDelete,onUpdateFin,onOpenDir,isAdmin,onAuth}) => {
    const [month,setMonth]=useState(new Date());
    const refs=useRef({});
    const [showAdd,setShowAdd]=useState(false);
    const [rec,setRec]=useState({date:ymd(new Date()),type:'순예배',members:[],offering:'',location:'',notes:''});
    const [editing,setEditing]=useState(null);
    const [pModal,setPModal]=useState(null);
    const [finMode,setFinMode]=useState(false);
    const [carry,setCarry]=useState(finance.carryOver||0);
    useEffect(()=>setCarry(finance.carryOver||0),[finance.carryOver]);
    const active=useMemo(()=>members.filter(m=>m.isParticipating&&m.name.trim()),[members]);

    const days=useMemo(()=>{
        const y=month.getFullYear(),m2=month.getMonth(),fd=new Date(y,m2,1).getDay(),td=new Date(y,m2+1,0).getDate(),a=[];
        for(let i=0;i<fd;i++)a.push(null);for(let i=1;i<=td;i++)a.push(new Date(y,m2,i));return a;
    },[month]);
    const rmap=useMemo(()=>{const m=new Map();history.forEach(h=>m.set(h.date,h));return m;},[history]);
    const bmap=useMemo(()=>{const m=new Map();members.forEach(mb=>{if(mb.isParticipating&&mb.name.trim()&&mb.birthday?.trim())m.set(mb.birthday.trim(),[...(m.get(mb.birthday.trim())||[]),mb.name]);});return m;},[members]);
    const total=useMemo(()=>history.reduce((s,h)=>s+Math.floor((Number(h.offering)||0)*0.4),0)+(Number(finance.carryOver)||0),[history,finance]);
    const yr=month.getFullYear(),half=month.getMonth()<6?'상반기':'하반기';
    const cnt=useMemo(()=>history.filter(h=>{const d=new Date(h.date),m2=d.getMonth();return d.getFullYear()===yr&&(month.getMonth()<6?m2<6:m2>=6)&&(!h.type||h.type==='순예배'||h.type==='종강예배');}).length,[history,yr,month]);
    const exec=fn=>isAdmin?fn():onAuth(fn);
    const tc=t=>t==='휴강'?'bg-gray-100 text-gray-600':t==='연합야유회'?'bg-yellow-100 text-yellow-800':t==='미실시'?'bg-orange-100 text-orange-600':t==='종강예배'?'bg-purple-100 text-purple-800':'bg-red-50 text-[#802B22]';
    const cc=t=>t==='휴강'?'bg-gray-200 text-gray-600':t==='연합야유회'?'bg-yellow-200 text-yellow-800':t==='미실시'?'bg-orange-100 text-orange-600':t==='종강예배'?'bg-purple-200 text-purple-800':'bg-red-100 text-[#802B22]';
    const TYPES=['순예배','휴강','종강예배','연합야유회','미실시'];

    return (
        <div className="space-y-6 slide-up">

const ImgViewer=({src,onClose})=>{const[sc,setSc]=useState(1),[pos,setPos]=useState({x:0,y:0}),pr=useRef(null),lr=useRef(null),gd=t=>Math.hypot(t[0].pageX-t[1].pageX,t[0].pageY-t[1].pageY);return<div className="fixed inset-0 z-[99999] bg-black flex items-center justify-center overflow-hidden"onClick={sc===1?onClose:undefined}style={{touchAction:'none'}}onTouchStart={e=>{if(e.touches.length===2)pr.current={dist:gd(e.touches),scale:sc};else if(e.touches.length===1&&sc>1)lr.current={x:e.touches[0].pageX-pos.x,y:e.touches[0].pageY-pos.y};}}onTouchMove={e=>{e.preventDefault();if(e.touches.length===2&&pr.current){const s=Math.min(Math.max(1,pr.current.scale*(gd(e.touches)/pr.current.dist)),5);setSc(s);if(s===1)setPos({x:0,y:0});}else if(e.touches.length===1&&sc>1&&lr.current)setPos({x:e.touches[0].pageX-lr.current.x,y:e.touches[0].pageY-lr.current.y});}}onTouchEnd={e=>{if(e.touches.length<2)pr.current=null;if(e.touches.length===0)lr.current=null;}}><img src={src}draggable={false}style={{transform:`scale(${sc}) translate(${pos.x/sc}px,${pos.y/sc}px)`,maxWidth:'100vw',maxHeight:'100vh',objectFit:'contain',userSelect:'none'}}/><div className="absolute top-5 right-5 flex gap-2"><button onClick={async e=>{e.stopPropagation();try{const r=await fetch(src);const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='img_'+Date.now()+'.jpg';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}catch{alert('길게 눌러 저장');} }}className="bg-white/20 text-white rounded-full w-10 h-10 flex items-center justify-center"><Icon name="download"className="w-5 h-5"/></button><button onClick={e=>{e.stopPropagation();onClose();}}className="bg-white/20 text-white rounded-full w-10 h-10 flex items-center justify-center">✕</button></div>{sc>1&&<button onClick={e=>{e.stopPropagation();setSc(1);setPos({x:0,y:0});}}className="absolute bottom-8 left-1/2 -translate-x-1/2 bg-white/20 text-white text-xs font-black px-4 py-2 rounded-full">원래 크기로</button>}</div>;};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  순기도제목
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const getTags=(text,member)=>{if(!text)return[];const s=new Set();const ht=text.replace(/건강한\s*가정/g,'');if(/건강|치료|수술|아픔|병원|항암|질병|입원|투병/.test(ht))s.add('건강');if(/부모님|어머니|어머님|아버지|아버님|장인|장모|양가/.test(text))s.add('부모님');if(/자녀|아들|딸|아이|임신|출산|학업|학교|대학|수능|공부|진로/.test(text))s.add('자녀');if(member?.children){const ns=member.children.replace(/\(.*?\)/g,'').split(/[\s,]+/).map(n=>n.trim()).filter(n=>n);if(ns.some(n=>text.includes(n)))s.add('자녀');}if(/사역|사명|순장|봉사|전도|선교/.test(text))s.add('교회/사역');if(/직장|취업|이직|회사|면접|승진|업무|사업/.test(text))s.add('직장/사업');if(/말씀|믿음|관계|갈등|마음|우울|평안|위로/.test(text))s.add('말씀/믿음');if(/가정|남편|아내|부부|결혼|신앙|예배|기도/.test(text))s.add('가정/신앙');return Array.from(s).slice(0,4);};

const PCard=({m,onEdit,expand})=>{
    const[open,setOpen]=useState(true);const tags=getTags(m.prayer,m);useEffect(()=>setOpen(expand),[expand]);
    const copy=e=>{e.stopPropagation();const t=`[${m.name}${m.role?' '+m.role:''}]\n${m.prayer||''}`;cpText(t).then(ok=>ok&&alert('복사되었습니다.'));};
    return<Card className="hover:shadow-md transition-shadow p-5">
        <div className="flex justify-between items-start mb-2 cursor-pointer"onClick={()=>setOpen(!open)}>
            <div className="flex items-center gap-2.5 flex-1 min-w-0"><div className={`w-9 h-9 rounded-full flex items-center justify-center font-black text-sm shrink-0 ${m.gender==='M'?'bg-blue-100 text-blue-700':'bg-pink-100 text-pink-700'}`}>{m.name.slice(-1)}</div><div className="min-w-0"><div className="font-black text-base truncate">{m.name}<span className="text-gray-400 font-bold text-xs ml-2">{m.role}</span></div>{m.birthday&&<div className="text-pink-400 text-xs font-bold">🎂 {m.birthday}</div>}</div></div>
            <div className="flex items-center gap-1 shrink-0 ml-2"><button onClick={copy}className="p-1.5 text-gray-300 hover:text-[#802B22] rounded-lg"><Icon name="copy"className="w-3.5 h-3.5"/></button><button onClick={e=>{e.stopPropagation();onEdit(m);}}className="p-1.5 text-gray-300 hover:text-[#802B22] rounded-lg"><Icon name="edit-3"className="w-3.5 h-3.5"/></button><Icon name={open?"chevron-up":"chevron-down"}className="w-4 h-4 text-gray-300"/></div>
        </div>
        {tags.length>0&&<div className="flex flex-wrap gap-1 mb-2">{tags.map(t=><span key={t}className="px-2 py-0.5 bg-[#802B22]/8 text-[#802B22] text-[10px] font-black rounded-full">#{t}</span>)}</div>}
        {open&&<div className="mt-2 border-t border-gray-50 pt-3">{m.prayer?<div className="space-y-1.5">{m.prayer.split('\n').map((line,i)=>{const mt=line.match(/^(\d+\.)\s*(.*)/);if(mt)return<div key={i}className="flex gap-2 items-start"><span className="text-[#802B22] font-black shrink-0 leading-[1.7]">{mt[1]}</span><span className="text-gray-700 leading-[1.7] break-words">{mt[2]}</span></div>;return<div key={i}className="text-gray-700 leading-[1.7] break-words">{line}</div>;})}</div>:<p className="text-sm text-gray-400 font-bold italic py-2">등록된 기도제목이 없습니다.</p>}</div>}
    </Card>;
};

const PrayerView=({members,onUpdate})=>{
    const active=useMemo(()=>members.filter(m=>m.isParticipating&&m.name.trim()),[members]);
    const[shuffled,setShuffled]=useState([]);useEffect(()=>{const ids=active.map(m=>m.id);ids.sort(()=>Math.random()-.5);setShuffled(ids);},[active.length]);
    const display=useMemo(()=>{if(!shuffled.length)return active;const bi={};active.forEach(m=>{bi[m.id]=m;});return shuffled.map(id=>bi[id]).filter(Boolean);},[active,shuffled]);
    const allTags=useMemo(()=>{const s=new Set();active.forEach(m=>getTags(m.prayer,m).forEach(t=>s.add(t)));return Array.from(s);},[active]);
    const[tag,setTag]=useState(null),[expanded,setExpanded]=useState(true),[editing,setEditing]=useState(null),[draft,setDraft]=useState('');
    const filtered=useMemo(()=>{if(tag==='가나다순')return[...active].sort((a,b)=>a.name.localeCompare(b.name));if(!tag)return display;return display.filter(m=>getTags(m.prayer,m).includes(tag));},[display,active,tag]);
    const share=async()=>{const gn=window.__G__?.groupName||'우리 순';const ps=active.filter(m=>m.prayer?.trim()).sort((a,b)=>(a.order||99)-(b.order||99));let t=`★${gn} 기도제목★\n\n`;ps.forEach(m=>{t+=`[${m.name} ${m.role||''}]\n${m.prayer}\n\n`;});const ok=await cpText(t);if(navigator.share){try{await navigator.share({text:t});return;}catch{}}if(ok)alert('전체 기도제목이 복사되었습니다.');};
    return(
        <div className="space-y-6 slide-up pb-6">
            <header className="px-1"><span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase">PRAYER REQUEST</span><h1 className="text-2xl font-black mt-1">순기도제목</h1></header>
            <div className="flex flex-wrap gap-2.5 px-1"><button onClick={()=>setTag(null)}className={`px-4 py-2 rounded-full text-sm font-black shadow-sm ${!tag?'bg-gray-800 text-white':'bg-white border border-gray-200 text-gray-600'}`}>전체보기</button><button onClick={()=>setTag('가나다순')}className={`px-4 py-2 rounded-full text-sm font-black shadow-sm ${tag==='가나다순'?'bg-gray-800 text-white':'bg-white border border-gray-200 text-gray-600'}`}>#가나다순</button>{allTags.map(t=><button key={t}onClick={()=>setTag(tag===t?null:t)}className={`px-4 py-2 rounded-full text-sm font-black shadow-sm ${tag===t?'bg-gray-800 text-white':'bg-white border border-gray-200 text-gray-600'}`}>#{t}</button>)}</div>
            <div className="flex justify-between items-center px-1"><button onClick={share}className="flex items-center gap-1.5 text-[12px] font-black text-gray-500 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100 active:scale-95"><Icon name="share-2"className="w-3.5 h-3.5 text-[#802B22]"/>공유({active.filter(m=>m.prayer).length})</button><button onClick={()=>setExpanded(!expanded)}className="text-sm font-black text-[#802B22] flex items-center gap-1.5 bg-red-50 px-4 py-2 rounded-xl shadow-sm border border-red-100 active:scale-95"><Icon name={expanded?"chevrons-up":"chevrons-down"}className="w-4 h-4"/>{expanded?'모두 접기':'모두 펼치기'}</button></div>
            {active.length===0&&<Card className="text-center py-16"><Icon name="users"className="w-12 h-12 text-gray-200 mx-auto mb-4"/><p className="text-gray-400 font-black">순원 명단이 비어있습니다</p><p className="text-gray-300 font-bold text-sm mt-1">순예배기록 탭 → 참석순원을 눌러 추가해주세요</p></Card>}
            <div className="columns-1 md:columns-2 lg:columns-3 gap-6 w-full">{filtered.map(m=><div key={m.id}className="break-inside-avoid mb-6"><PCard m={m}onEdit={mb=>{setEditing(mb);setDraft(mb.prayer||'');}}expand={expanded}/></div>)}</div>
            {editing&&ReactDOM.createPortal(<div className="fixed inset-0 z-[99999] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center p-4 fade-in pb-[90px]"onClick={()=>setEditing(null)}><div className="w-full max-w-2xl shadow-2xl rounded-3xl bg-white"onClick={e=>e.stopPropagation()}><Card className="border-t-8 border-[#802B22] p-5 flex flex-col overflow-hidden max-h-[85vh]"><div className="flex justify-between items-center mb-6 shrink-0"><div><span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase block mb-1">PRAYER EDIT</span><h3 className="font-black text-xl">{editing.name} {editing.role} 기도제목 수정</h3></div><button onClick={()=>setEditing(null)}className="p-2 text-gray-400 hover:bg-gray-100 rounded-full"><Icon name="x"className="w-6 h-6"/></button></div><textarea value={draft}onChange={e=>setDraft(e.target.value)}className="w-full bg-gray-50 p-5 rounded-2xl border border-gray-200 text-[15px] font-bold outline-none focus:border-[#802B22] min-h-[250px] resize-none text-gray-800 leading-relaxed overflow-y-auto flex-1 cs"autoFocus/><div className="flex gap-3 pt-4 border-t border-gray-100 mt-2 shrink-0"><button onClick={()=>setEditing(null)}className="w-1/3 py-4 bg-gray-100 text-gray-600 rounded-2xl font-black text-lg active:scale-95">취소</button><button onClick={()=>{onUpdate(editing.id,draft);setEditing(null);}}className="w-2/3 py-4 bg-[#802B22] text-white rounded-2xl font-black text-lg shadow-lg active:scale-95">저장 완료</button></div></Card></div></div>,document.body)}
        </div>
    );
};

    const fams=useMemo(()=>{const map={};members.forEach(m=>{const fid=m.familyId||m.id;if(!map[fid])map[fid]={id:fid,husband:null,wife:null,children:'',vehicle:''};if(m.gender==='M')map[fid].husband=m;else map[fid].wife=m;if(m.children)map[fid].children=m.children;if(m.vehicle)map[fid].vehicle=m.vehicle;});return Object.values(map).sort((a,b)=>(a.husband?.order||a.wife?.order||99)-(b.husband?.order||b.wife?.order||99));},[members]);
    const[admin,setAdmin]=useState(false),[drafts,setDrafts]=useState({}),[pwdM,setPwdM]=useState(false),[newPwd,setNewPwd]=useState('');
    useEffect(()=>{const d={};fams.forEach(f=>{d[f.id]={hN:f.husband?.name||'',hR:f.husband?.role||'',hP:f.husband?.isParticipating||false,hB:f.husband?.birthday||'',wN:f.wife?.name||'',wR:f.wife?.role||'',wP:f.wife?.isParticipating||false,wB:f.wife?.birthday||'',ch:f.children||'',ve:f.vehicle||''};});setDrafts(d);},[fams.length]);
    const sd=(fid,k,v)=>setDrafts(p=>({...p,[fid]:{...p[fid],[k]:v}}));
    const doSave=()=>{const fn=()=>{onSave(fams,drafts);setAdmin(false);alert('저장되었습니다.');};if(isAdmin)fn();else onAuth(fn);};
    const cpV=()=>{const t=fams.filter(f=>f.vehicle).map(f=>`${f.husband?.name||f.wife?.name||'?'} : ${f.vehicle}`).join('\n');cpText(t).then(ok=>ok&&alert('차량정보 복사됨'));};
    const resetGroup=()=>{if(confirm('이 기기의 순 설정을 초기화합니다.\n다른 순으로 입장하거나 새 순을 만들 수 있습니다.')){localStorage.removeItem('soon-group');location.reload();}};
    return ReactDOM.createPortal(

                <div className="flex items-center gap-2">{admin?(<><button onClick={()=>setPwdM(true)}className="hidden sm:flex px-3 py-1.5 bg-gray-100 text-gray-600 text-xs font-black rounded-lg items-center gap-1"><Icon name="key"className="w-3.5 h-3.5"/>비밀번호 변경</button><button onClick={onAdd}className="px-3 py-2 bg-gray-800 text-white text-xs font-black rounded-lg">새 가족 추가</button><button onClick={doSave}className="px-3 py-2 bg-[#802B22] text-white text-sm font-black rounded-lg flex items-center gap-1.5"><Icon name="save"className="w-4 h-4"/>저장</button></>):(<button onClick={()=>{if(isAdmin)setAdmin(true);else onAuth(()=>setAdmin(true));}}className="px-4 py-2 bg-white border border-gray-200 text-gray-600 text-sm font-black rounded-lg flex items-center gap-1.5 hover:bg-gray-50"><Icon name="lock"className="w-4 h-4"/>관리자 편집</button>)}</div>

                <div className="md:hidden flex flex-col gap-4">{fams.map(f=>{const dr=drafts[f.id];if(admin&&dr)return<div key={f.id}className="bg-blue-50/20 p-4 rounded-xl border border-blue-200 space-y-3">{[{g:'M',k:'h'},{g:'F',k:'w'}].map(({g,k})=><div key={g}className={`bg-white p-3 rounded-lg border ${g==='M'?'border-blue-100':'border-pink-100'}`}><span className={`text-[10px] font-black uppercase tracking-widest mb-1.5 block ${g==='M'?'text-blue-500':'text-pink-500'}`}>{g==='M'?'남편':'아내'}</span><div className="flex gap-2 mb-2"><input className="flex-1 p-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-[#802B22] font-bold"value={dr[`${k}N`]}onChange={e=>sd(f.id,`${k}N`,e.target.value)}placeholder="이름"/><input className="flex-1 p-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-[#802B22] font-bold"value={dr[`${k}R`]}onChange={e=>sd(f.id,`${k}R`,e.target.value)}placeholder="직분"/></div><input className="w-full p-2 border border-pink-200 rounded-lg text-sm outline-none font-bold mb-2"value={dr[`${k}B`]||''}onChange={e=>sd(f.id,`${k}B`,e.target.value)}placeholder="🎂 생일 MM-DD"/><label className="flex items-center gap-2 cursor-pointer"><input type="checkbox"checked={dr[`${k}P`]}onChange={e=>sd(f.id,`${k}P`,e.target.checked)}className="rounded w-4 h-4"/><span className="text-xs font-bold text-gray-700">순예배 참여</span></label></div>)}<div className="flex gap-2"><input className="flex-1 p-2.5 border border-gray-200 rounded-lg text-sm outline-none font-bold"value={dr.ch}onChange={e=>sd(f.id,'ch',e.target.value)}placeholder="자녀 정보"/><input className="flex-1 p-2.5 border border-gray-200 rounded-lg text-sm outline-none font-bold"value={dr.ve}onChange={e=>sd(f.id,'ve',e.target.value)}placeholder="차량 번호"/></div><button onClick={()=>onDel(f.id)}className="w-full py-2.5 bg-white text-red-600 text-xs font-black rounded-xl border border-red-200">삭제</button></div>;return<div key={f.id}className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 space-y-3">{[f.husband,f.wife].map(mb=>mb?.name?<div key={mb.id}className={`flex items-start gap-3 p-3 rounded-lg ${mb.gender==='M'?'bg-blue-50/30':'bg-pink-50/30'}`}><div className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-sm ${mb.gender==='M'?'bg-blue-100 text-blue-700':'bg-pink-100 text-pink-700'}`}>{mb.name.slice(-1)}</div><div><div className="font-black text-gray-800">{mb.name} <span className="text-gray-400 font-bold text-xs">{mb.role}</span></div>{mb.birthday&&<div className="text-pink-400 text-xs font-bold">🎂 {mb.birthday}</div>}<div className={`text-xs font-bold mt-0.5 ${mb.isParticipating?'text-[#802B22]':'text-gray-400'}`}>{mb.isParticipating?'순예배 참여':'미참여'}</div></div></div>:null)}{f.children&&<div className="text-sm font-bold text-gray-600 px-1">👶 {f.children}</div>}{f.vehicle&&<div className="text-sm font-black text-[#802B22] px-1">🚗 {f.vehicle}</div>}</div>;})}</div>
                <div className="hidden md:block overflow-x-auto rounded-xl border border-gray-200 shadow-sm bg-white"><table className="w-full min-w-[800px] text-base text-left"><thead className="bg-gray-50 text-gray-500 font-black text-xs uppercase tracking-widest"><tr>{['남편','아내','자녀','차량',admin&&'관리'].filter(Boolean).map(h=><th key={h}className="py-4 px-6 border-b border-gray-200">{h}</th>)}</tr></thead><tbody className="divide-y divide-gray-100">{fams.map(f=>{const dr=drafts[f.id];if(admin&&dr)return<tr key={f.id}className="bg-blue-50/10">{[{k:'h'},{k:'w'}].map(({k})=><td key={k}className="py-4 px-6 border-r border-gray-100 bg-blue-50/20"><div className="flex gap-2 mb-2"><input className="w-3/5 p-2.5 bg-white border border-blue-200 rounded-xl text-sm outline-none focus:border-[#802B22] font-bold"value={dr[`${k}N`]}onChange={e=>sd(f.id,`${k}N`,e.target.value)}placeholder="이름"/><input className="w-2/5 p-2.5 bg-white border border-blue-200 rounded-xl text-sm outline-none focus:border-[#802B22] font-bold"value={dr[`${k}R`]}onChange={e=>sd(f.id,`${k}R`,e.target.value)}placeholder="직분"/></div><input className="w-full p-2 bg-white border border-pink-200 rounded-xl text-sm outline-none font-bold mb-2"value={dr[`${k}B`]||''}onChange={e=>sd(f.id,`${k}B`,e.target.value)}placeholder="🎂 MM-DD"/><label className="flex items-center gap-2 cursor-pointer pl-1"><input type="checkbox"checked={dr[`${k}P`]}onChange={e=>sd(f.id,`${k}P`,e.target.checked)}className="rounded w-4 h-4"/><span className="text-xs font-bold text-gray-700">순예배 참여</span></label></td>)}<td className="py-4 px-6 border-r border-gray-100 bg-blue-50/20"><input className="w-full p-2.5 bg-white border border-blue-200 rounded-xl text-sm outline-none font-bold"value={dr.ch}onChange={e=>sd(f.id,'ch',e.target.value)}placeholder="자녀"/></td><td className="py-4 px-6 border-r border-gray-100 bg-blue-50/20"><input className="w-full p-2.5 bg-white border border-blue-200 rounded-xl text-sm outline-none font-bold"value={dr.ve}onChange={e=>sd(f.id,'ve',e.target.value)}placeholder="차량"/></td><td className="py-4 px-6 text-center bg-blue-50/20"><button onClick={()=>onDel(f.id)}className="px-4 py-2.5 bg-white text-red-600 text-xs font-black rounded-xl border border-red-200 w-full">삭제</button></td></tr>;const h=f.husband||{},w=f.wife||{};return<tr key={f.id}className="hover:bg-gray-50">{[h,w].map((mb,i)=><td key={i}className={`py-5 px-6 border-r border-gray-100 ${!mb.isParticipating?'opacity-40':''}`}>{mb.name?<div className="flex flex-col gap-1"><div className="font-black text-gray-800 text-lg">{mb.name} <span className="font-bold text-gray-400 text-sm">{mb.role}</span></div>{mb.birthday&&<div className="text-xs text-pink-400 font-bold">🎂 {mb.birthday}</div>}<div className={`text-xs font-bold mt-1 ${mb.isParticipating?'text-[#802B22]':'text-gray-400'}`}>{mb.isParticipating?'순예배 참여':'미참여'}</div></div>:<span className="text-gray-300 font-bold">-</span>}</td>)}<td className="py-5 px-6 border-r border-gray-100"><span className="text-base font-bold text-gray-700">{f.children||'-'}</span></td><td className="py-5 px-6 border-r border-gray-100"><span className="text-base font-black text-[#802B22]">{f.vehicle||'-'}</span></td></tr>;})}</tbody></table></div>
            </div>
            {pwdM&&ReactDOM.createPortal(<div className="fixed inset-0 z-[200] bg-white/80 backdrop-blur-sm flex items-center justify-center p-4 fade-in"onClick={()=>setPwdM(false)}><div className="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl text-center"onClick={e=>e.stopPropagation()}><h3 className="text-2xl font-black mb-6">새 비밀번호 설정</h3><input type="text"value={newPwd}onChange={e=>setNewPwd(e.target.value)}onKeyDown={e=>{if(e.key==='Enter'&&newPwd.trim()){onChangePwd(newPwd.trim());setPwdM(false);setNewPwd('');alert('변경됨');}}}className="w-full p-4 bg-gray-50 rounded-2xl font-black text-center text-lg mb-6 outline-none focus:border-[#802B22] border border-transparent"placeholder="새로운 비밀번호 입력"autoFocus/><div className="flex gap-3"><button onClick={()=>setPwdM(false)}className="flex-1 py-4 text-gray-500 font-black rounded-2xl hover:bg-gray-50">취소</button><button onClick={()=>{if(newPwd.trim()){onChangePwd(newPwd.trim());setPwdM(false);setNewPwd('');alert('변경됨');}}}className="flex-1 py-4 bg-[#802B22] text-white font-black rounded-2xl shadow-md">변경</button></div></div></div>,document.body)}
        </div>,document.body
    );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  메인 앱
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MainApp=()=>{
    const gn=window.__G__?.groupName||'순 매니저';
    const[ready,setReady]=useState(false),[view,setView]=useState('prayer'),[dir,setDir]=useState(false);
    const[members,setMembers]=useState([]),[history,setHistory]=useState([]),[finance,setFinance]=useState({carryOver:0});
    const[adminPass,setAdminPass]=useState('1234'),[isAdmin,setIsAdmin]=useState(false);
    const[showAuth,setShowAuth]=useState(false),[authIn,setAuthIn]=useState(''),[authErr,setAuthErr]=useState(''),[pending,setPending]=useState(null);
    const[showNav,setShowNav]=useState(true);
    const[guide,setGuide]=useState({prayerLeader:'순장',closingPrayerLeader:'',announcements:'',applicationText:'실천할 일을 결단하고 나누기',bibleVerse:'',bibleContent:'',prsBible:'',prsLink:'',musicImage:null,musicImage2:null});
    const doAuth=fn=>{if(isAdmin)fn();else{setPending(()=>fn);setShowAuth(true);}};
    const confirm=()=>{if(authIn===adminPass){setIsAdmin(true);setShowAuth(false);setAuthIn('');setAuthErr('');if(pending){pending();setPending(null);}}else setAuthErr('비밀번호가 일치하지 않습니다.');};

    useEffect(()=>{let last=window.pageYOffset,tick=false;const up=()=>{const c=window.pageYOffset;if(c<60)setShowNav(true);else if(c>last+5)setShowNav(false);else if(c<last-5)setShowNav(true);last=c>0?c:0;tick=false;};const sc=()=>{if(!tick){requestAnimationFrame(up);tick=true;}};window.addEventListener('scroll',sc,{passive:true});return()=>window.removeEventListener('scroll',sc);},[]);

    useEffect(()=>{
        const{db,collection,onSnapshot,doc,setDoc}=window.FB,p=P();
        const uns=[
            onSnapshot(collection(db,`${p}/members`),s=>setMembers(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||99)-(b.order||99)))),
            onSnapshot(collection(db,`${p}/worship`),s=>setHistory(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date)))),
            onSnapshot(doc(db,`${p}/settings/guide`),s=>{if(s.exists())setGuide(s.data());}),
            onSnapshot(doc(db,`${p}/settings/finance`),s=>{if(s.exists())setFinance(s.data());}),
            onSnapshot(doc(db,`${p}/settings/admin`),s=>{if(s.exists())setAdminPass(s.data().password);else setDoc(doc(db,`${p}/settings/admin`),{password:'1234'});})
        ];
        setReady(true);return()=>uns.forEach(u=>u());
    },[]);

    const{db,doc,collection,setDoc,addDoc,deleteDoc,updateDoc}=window.FB||{};
    const p=P();
    const upGuide=async d=>await setDoc(doc(db,`${p}/settings/guide`),d);
    const upFin=async(c,e2)=>{await setDoc(doc(db,`${p}/settings/finance`),{carryOver:Number(c)});for(const id in e2)if(e2[id]!==undefined)await updateDoc(doc(db,`${p}/worship/${id}`),{offering:Number(e2[id])});};
    const upRec=async(id,d)=>await updateDoc(doc(db,`${p}/worship/${id}`),{date:d.date,type:d.type||'순예배',members:d.members,offering:Number(d.offering)||0,location:d.location||'',notes:d.notes||''});
    const delRec=async id=>await deleteDoc(doc(db,`${p}/worship/${id}`));
    const addRec=async r=>await addDoc(collection(db,`${p}/worship`),r);
    const upPrayer=async(id,prayer)=>await updateDoc(doc(db,`${p}/members/${id}`),{prayer});
    const saveFam=async(fams,drafts)=>{const ps=[];for(const f of fams){const d=drafts[f.id];if(!d)continue;const upd=(id,data)=>ps.push(updateDoc(doc(db,`${p}/members/${id}`),data));if(f.husband?.id)upd(f.husband.id,{name:d.hN,role:d.hR,isParticipating:d.hP,children:d.ch,vehicle:d.ve,birthday:d.hB||''});if(f.wife?.id)upd(f.wife.id,{name:d.wN,role:d.wR,isParticipating:d.wP,children:d.ch,vehicle:d.ve,birthday:d.wB||''});}await Promise.all(ps);};
    const addFam=async()=>{const fid='f_'+Date.now();const o=members.length+1;await addDoc(collection(db,`${p}/members`),{familyId:fid,name:'',role:'',gender:'M',children:'',vehicle:'',prayer:'',isParticipating:false,order:o});await addDoc(collection(db,`${p}/members`),{familyId:fid,name:'',role:'',gender:'F',children:'',vehicle:'',prayer:'',isParticipating:false,order:o+1});};
    const delFam=async fid=>{if(!confirm('이 가족을 삭제하시겠습니까?'))return;for(const m of members.filter(m=>(m.familyId||m.id)===fid))await deleteDoc(doc(db,`${p}/members/${m.id}`));};
    const changePwd=async pwd=>{await setDoc(doc(db,`${p}/settings/admin`),{password:pwd});setAdminPass(pwd);};

    const tabs=[{id:'prayer',icon:'users',label:'순기도제목'},{id:'guide',icon:'book-open',label:'순예배주보'},{id:'history',icon:'calendar-days',label:'순예배기록'}];
    const ai=tabs.findIndex(t=>t.id===view);
    if(!ready)return<div className="h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-[#802B22] border-t-transparent rounded-full animate-spin"></div></div>;

    return(
        <div className="w-full min-h-[100dvh] bg-[#F3F4F6] flex flex-col">
            <div className={`bg-white border-b border-gray-100 shadow-sm z-40 flex justify-center w-full fixed top-0 transition-transform duration-300 ${showNav?'translate-y-0':'-translate-y-full'}`}>
                <div className="w-full max-w-6xl flex items-center gap-3 p-4"><div className="w-9 h-9 rounded-xl bg-[#802B22] flex items-center justify-center shrink-0"><Icon name="church"className="w-5 h-5 text-white"/></div><h2 className="text-[19px] font-black tracking-tighter text-gray-800 flex-1">{gn} 매니저</h2>{isAdmin&&<button onClick={()=>setIsAdmin(false)}className="flex items-center gap-1.5 px-3 py-1.5 bg-red-50 border border-red-200 text-[#802B22] text-xs font-black rounded-xl"><Icon name="lock"className="w-3.5 h-3.5"/>관리자 종료</button>}</div>
            </div>
            {showAuth&&ReactDOM.createPortal(<div className="fixed inset-0 z-[999999] bg-white/80 backdrop-blur-sm flex items-center justify-center p-4"onClick={()=>{setShowAuth(false);setAuthErr('');setAuthIn('');}}>
                <div className="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl text-center"onClick={e=>e.stopPropagation()}><h3 className="text-2xl font-black mb-2">관리자 인증</h3><p className="text-sm text-gray-500 font-bold mb-6">비밀번호를 입력해주세요</p><input type="password"value={authIn}onChange={e=>{setAuthIn(e.target.value);setAuthErr('');}}onKeyDown={e=>e.key==='Enter'&&confirm()}className={`w-full p-4 bg-gray-50 border ${authErr?'border-red-400':'border-transparent'} rounded-2xl font-black text-center text-xl tracking-[0.2em] mb-2 outline-none focus:border-[#802B22]`}placeholder="••••••••"autoFocus/>{authErr&&<p className="text-red-500 text-sm font-bold mb-2">{authErr}</p>}<div className="flex gap-3 mt-4"><button onClick={()=>{setShowAuth(false);setAuthErr('');setAuthIn('');}}className="flex-1 py-4 text-gray-500 font-black rounded-2xl hover:bg-gray-50">취소</button><button onClick={confirm}className="flex-1 py-4 bg-[#802B22] text-white font-black rounded-2xl shadow-md">확인</button></div></div>
            </div>,document.body)}
            <div className="flex-1 w-full flex justify-center pt-[74px] pb-[100px]">
                <div className="w-full max-w-6xl p-4 md:p-6">
                    {view==='prayer'&&<PrayerView members={members}onUpdate={upPrayer}/>}
                    {view==='guide'&&<GuideView guideData={guide}onSave={upGuide}/>}
                    {view==='history'&&<WorshipView history={history}members={members}finance={finance}isAdmin={isAdmin}onAuth={doAuth}onAdd={addRec}onUpdate={upRec}onDelete={delRec}onUpdateFin={upFin}onOpenDir={()=>setDir(true)}/>}
                </div>
            </div>
            <nav className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 h-[76px] safe-bottom z-50 flex justify-center transition-transform duration-300 ${showNav?'translate-y-0':'translate-y-full'}`}>
                <div className="w-full max-w-xl flex relative h-full px-2 items-center pb-1">
                    <div className="absolute h-[56px] top-1/2 -translate-y-1/2 bg-red-50 rounded-[1.2rem] transition-all duration-500"style={{width:`calc((100% - 16px) / 3)`,left:'8px',transform:`translateX(calc(${ai} * 100%))`,transitionTimingFunction:'cubic-bezier(0.34, 1.56, 0.64, 1)'}}/>
                    {tabs.map(t=><button key={t.id}onClick={()=>{setView(t.id);window.scrollTo({top:0,behavior:'smooth'});setShowNav(true);}}className="flex-1 relative z-10 flex flex-col items-center justify-center h-full outline-none"style={{WebkitTapHighlightColor:'transparent'}}><div className={`transition-all duration-500 flex flex-col items-center ${view===t.id?'-translate-y-1.5':'translate-y-0'}`}><Icon name={t.icon}className={`transition-colors duration-500 ${view===t.id?'text-[#802B22] w-[22px] h-[22px]':'text-gray-400 w-6 h-6'}`}/></div><span className={`text-[11px] font-black tracking-tighter absolute bottom-1.5 transition-colors duration-500 ${view===t.id?'text-[#802B22]':'text-gray-400'}`}>{t.label}</span></button>)}
                </div>
            </nav>
            {dir&&<DirModal members={members}onClose={()=>setDir(false)}onSave={saveFam}onAdd={addFam}onDel={delFam}adminPass={adminPass}onChangePwd={changePwd}isAdmin={isAdmin}onAuth={doAuth}/>}
        </div>
    );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  루트
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Root=()=>{
    const[mode,setMode]=useState('loading');
    useEffect(()=>{
        if(window.__MODE__){setMode(window.__MODE__);return;}
        const h=()=>setMode(window.__MODE__||'wizard');
        window.addEventListener('soon-ready',h);
        return()=>window.removeEventListener('soon-ready',h);
    },[]);
    if(mode==='loading')return<div className="h-screen flex flex-col items-center justify-center gap-4"><div className="w-12 h-12 border-4 border-[#802B22] border-t-transparent rounded-full animate-spin"></div><p className="text-gray-400 font-bold text-sm">잠시만 기다려주세요...</p></div>;
    if(mode==='owner-setup')return<OwnerSetup/>;
    if(mode==='wizard')return<Wizard/>;
    if(mode==='app')return<MainApp/>;
    return<div className="h-screen flex items-center justify-center p-4"><div className="bg-red-50 border border-red-200 rounded-2xl p-6 text-center"><p className="text-red-600 font-black text-lg mb-2">연결 오류</p><p className="text-red-500 font-bold text-sm">{window.__ERR__}</p><button onClick={()=>location.reload()}className="mt-4 px-6 py-3 bg-red-600 text-white font-black rounded-xl">다시 시도</button></div></div>;
};
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
