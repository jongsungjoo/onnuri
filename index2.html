        const getYoutubeId = (url) => {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url?.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;

        const compressImage = (file, maxWidth = 1200, maxHeight = 1200, quality = 0.8) => {
            return new Promise((resolve, reject) => {
                if (!file) return reject("No file provided");
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onerror = () => reject(new Error("Image Load Failed")); 
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } }
                            else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                            canvas.width = Math.floor(width) || 100;
                            canvas.height = Math.floor(height) || 100;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', quality));
                        } catch (e) {
                            reject(e);
                        }
                    };
                };
                reader.onerror = (e) => reject(e);
            });
        };

        const cropImageForOCR = (dataUrl, startYRatio = 0.0, endYRatio = 1.0) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        const startY = Math.floor(img.height * startYRatio);
                        const endY = Math.floor(img.height * endYRatio);
                        const cropHeight = Math.max(1, endY - startY);
                        
                        canvas.width = img.width;
                        canvas.height = cropHeight;
                        const ctx = canvas.getContext('2d');
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, startY, img.width, cropHeight, 0, 0, img.width, cropHeight);
                        
                        resolve(canvas.toDataURL('image/jpeg', 0.9));
                    } catch(e) {
                        reject(e);
                    }
                };
                img.onerror = () => reject(new Error("Cropping failed"));
                img.src = dataUrl;
            });
        };

        // ★ Gemini 2.5 Flash — 서버 BUSY(503) 시 자동 재시도 최대 3회
        const recognizeNamesWithGemini = async (base64Image, apiKey, onRetry) => {
            const cleanKey = apiKey ? apiKey.trim().replace(/[^a-zA-Z0-9_-]/g, '') : "";

            if (!cleanKey) {
                throw new Error("시스템 설정 메뉴에서 발급받으신 Gemini API 키를 입력해주세요.");
            }
            if (cleanKey.includes("AIzaSyDribbbOpi9VcnLu3szJZnT06R4dhx9eww")) {
                throw new Error("데이터베이스 전용 키가 입력되었습니다. 구글 AI Studio에서 새로 발급받은 키를 넣어주세요.");
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${cleanKey}`;
            const base64Data = base64Image.split(',')[1];
            const payload = {
                contents: [{ parts: [
                    { text: "이 이미지에서 한국어 사람 이름을 모두 찾아 추출해주세요. 이름들은 자석, 스티커, 카드, 명단 등 어떤 형태로든 표기되어 있을 수 있습니다. 규칙: 1) 한국 성명(2~4글자 한글)만 추출하세요. 2) 지명, 단어, 기호는 제외하세요. 3) 출력형식: 오직 이름만 쉼표로 구분, 다른 텍스트 없이. 예시 출력: 홍길동,김철수,이영희,박민준" },
                    { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                ]}],
                generationConfig: { temperature: 0.1 }
            };

            const RETRY_DELAYS = [3000, 7000, 15000]; // 3초, 7초, 15초
            const MAX_ATTEMPTS = 4; // 최초 1회 + 재시도 3회

            for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        const status = response.status;
                        const isBusy = status === 503 || status === 429 ||
                            (errData.error?.status === 'UNAVAILABLE') ||
                            (errData.error?.message || '').toLowerCase().includes('high demand') ||
                            (errData.error?.message || '').toLowerCase().includes('overloaded');

                        if (isBusy && attempt < MAX_ATTEMPTS - 1) {
                            const waitSec = RETRY_DELAYS[attempt] / 1000;
                            onRetry && onRetry(attempt + 1, waitSec);
                            await new Promise(r => setTimeout(r, RETRY_DELAYS[attempt]));
                            continue;
                        }
                        throw new Error(errData.error?.message || `HTTP 에러 (${status})`);
                    }

                    const data = await response.json();
                    if (!data.candidates || data.candidates.length === 0) throw new Error("결과를 찾을 수 없습니다.");
                    return data.candidates[0].content.parts[0].text;

                } catch (e) {
                    // fetch 자체 실패(네트워크)도 재시도
                    if (attempt < MAX_ATTEMPTS - 1 && !(e.message?.includes('키') || e.message?.includes('API'))) {
                        const waitSec = RETRY_DELAYS[attempt] / 1000;
                        onRetry && onRetry(attempt + 1, waitSec);
                        await new Promise(r => setTimeout(r, RETRY_DELAYS[attempt]));
                        continue;
                    }
                    throw e;
                }
            }
        };

                                            ? sabbaticalOnes.map(m => <MemberChipAttended key={m.name} name={m.name} partOverride={m.part} roleOverride={m.role} />)

        };

        const HistoryDetailModal = ({ record, allMembers, onClose, onSave, onDelete, requestAuth, showToast, geminiApiKey }) => {
            const [selected, setSelected] = useState(new Set(record.members || []));
            const [image, setImage] = useState(record.image || null);
            const initialDate = record.date.replace(/\. /g, '-').replace(/\.$/, '');
            const [date, setDate] = useState(initialDate);
            const [isEditable, setIsEditable] = useState(false);
            const [ocrStatus, setOcrStatus] = useState("idle");
            const [ocrProgress, setOcrProgress] = useState(0);
            const [isFullScreen, setIsFullScreen] = useState(false);
            const [imageFile, setImageFile] = useState(null);
            
            const safeMembers = allMembers || [];
            const activeMembers = safeMembers.filter(m => m && (m.status === 'active' || selected.has(m.name)));

            const handleImageUpload = async (e) => {
                const file = e.target.files[0]; 
                if (!file) return;
                try {
                    const compressed = await compressImage(file);
                    setImage(compressed);
                    setImageFile(file);
                } catch (err) {
                    showToast("이미지 업로드에 실패했습니다.");
                }
            };

            const handleRunAI = async () => {
                if (!image) return showToast("먼저 참석 명단 사진을 업로드해주세요.");

                setOcrStatus("processing"); setOcrProgress(30);
                try {
                    const cropped = await cropImageForOCR(image, 0.0, 1.0);
                    setOcrProgress(50);
                    const extractedText = await recognizeNamesWithGemini(cropped, geminiApiKey, (attempt, waitSec) => {
                        setOcrProgress(20);
                        showToast(`서버 혼잡 — ${waitSec}초 후 재시도 중... (${attempt}/3)`);
                    });
                    setOcrProgress(100);

                    const cleanText = extractedText.replace(/\s+/g, '');
                    const next = new Set(selected);
                    allMembers.forEach(m => {
                        if (m && m.name && cleanText.includes(m.name)) next.add(m.name);
                    });
                    setSelected(next);
                    setOcrStatus("success");
                    showToast("AI 이름 인식이 완료되었습니다.");
                } catch (err) {
                    setOcrStatus("idle");
                    console.error("OCR Error:", err);
                    const isBusy = (err.message || '').toLowerCase().includes('demand') || 
                                   (err.message || '').toLowerCase().includes('overload') ||
                                   (err.message || '').toLowerCase().includes('503');
                    showToast(isBusy ? "서버가 혼잡합니다. 잠시 후 다시 눌러주세요." : "인식 실패: " + err.message);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-end md:items-center justify-center p-0 md:p-4 text-center">
                    <div className="bg-[#f8faff] rounded-t-[20px] md:rounded-[28px] w-full md:max-w-2xl max-h-[95vh] md:max-h-[88vh] flex flex-col shadow-2xl scale-in overflow-hidden border border-gray-100">
                        <div className="bg-white rounded-t-[20px] md:rounded-t-[28px] shrink-0">
                            {/* 모바일 드래그 핸들 */}
                            <div className="md:hidden flex justify-center pt-3 pb-1">
                                <div className="w-10 h-1 rounded-full bg-gray-200 sm:opacity-0"></div>
                            </div>
                            <header className="px-5 pt-3 pb-4 border-b border-gray-100 flex justify-between items-center text-left">
                                <div className="flex items-center gap-2.5 overflow-hidden text-left min-w-0">
                                    <h3 className="text-lg font-black text-gray-800 shrink-0">{isEditable ? "기록 편집" : "기록 조회"}</h3>
                                    {isEditable ? (
                                        <input type="date" value={date} onChange={e => setDate(e.target.value)} className="header-date-input" />
                                    ) : (
                                        <span className="text-sm font-bold text-gray-400 bg-gray-50 px-2.5 py-1 rounded-lg shrink-0">{record.date}</span>
                                    )}
                                </div>
                                <div className="flex gap-2 shrink-0">
                                    {!isEditable && <button onClick={() => requestAuth(() => setIsEditable(true))} className="p-2.5 bg-blue-50 text-[#193278] rounded-xl transition-colors active:scale-90"><LucideIcon name="edit-3" className="w-5 h-5" /></button>}
                                    <button onClick={onClose} className="p-2 text-gray-300 hover:text-gray-600 transition-colors"><LucideIcon name="x" className="w-6 h-6" /></button>
                                </div>
                            </header>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-6 hide-scrollbar text-left">
                            <div className="space-y-6">
                                <section>
                                    <div className="flex items-center justify-between mb-3 text-left">
                                        <h4 className="text-[10px] font-black text-gray-300 uppercase tracking-widest text-left">출석 사진</h4>
                                    </div>
                                    
                                    {isEditable && (
                                        <div className="flex flex-col mb-3">
                                            <button onClick={handleRunAI} disabled={ocrStatus === 'processing' || !image} className="w-full bg-purple-50 text-purple-600 py-2.5 px-4 rounded-xl font-black transition-transform active:scale-95 flex justify-center items-center gap-2 hover:bg-purple-100 border border-purple-100 disabled:opacity-50 text-xs">
                                                {ocrStatus === 'processing' ? <div className="w-4 h-4 border-2 border-purple-600 border-t-transparent rounded-full animate-spin"></div> : <LucideIcon name="sparkles" className="w-4 h-4" />}
                                                {ocrStatus === 'processing' ? "AI 이름 인식 중..." : "AI 자동 출석 체크"}
                                            </button>
                                        </div>
                                    )}

                                    <div className={`relative bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 overflow-hidden min-h-[160px] flex items-center justify-center transition-all hover:bg-gray-100 ${isEditable ? 'cursor-pointer' : ''}`}>
                                        {image ? (
                                            <div className={`w-full relative group ${!isEditable ? 'cursor-zoom-in' : ''}`} onClick={() => !isEditable && setIsFullScreen(true)}>
                                                <img src={image} className="w-full max-h-[35vh] md:max-h-[40vh] object-contain bg-gray-50" />
                                                {ocrStatus === "processing" && (
                                                    <div className="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center p-4 text-center">
                                                        <div className="w-full bg-gray-100 h-1.5 rounded-full mb-2 max-w-[150px]"><div className="bg-[#193278] h-full progress-bar-fill" style={{ width: `${ocrProgress}%` }}></div></div>
                                                        <p className="text-[#193278] font-bold text-[10px] animate-pulse">인식 중 {ocrProgress}%</p>
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="text-center p-4">
                                                <LucideIcon name="image" className="w-8 h-8 text-gray-300 mx-auto mb-2" />
                                                <p className="text-gray-400 text-xs font-bold">{isEditable ? "영역을 눌러 사진을 업로드하세요" : "사진이 없습니다."}</p>
                                            </div>
                                        )}
                                        {isEditable && <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleImageUpload} disabled={ocrStatus === 'processing'} />}
                                    </div>
                                </section>
                                <section>
                                    <h4 className="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4 text-left">참석 팀원 명단 ({selected.size}명)</h4>
                                    {['staff', ...PARTS.map(p=>p.id)].map(partId => {
                                        const list = activeMembers.filter(m => m && m.part === partId);
                                        if (list.length === 0) return null;
                                        
                                        const checkedCount = list.filter(m => m && selected.has(m.name)).length;
                                        const partObj = PARTS.find(p => p.id === partId);
                                        const partColor = partId === 'staff' ? '#193278' : (partObj ? partObj.color : '#ccc');
                                        const partLight = partId === 'staff' ? '#eff6ff' : (partObj ? partObj.light : '#f1f5f9');
                                        const partNameLabel = partId === 'staff' ? '성가사 · 반주자' : (partObj ? partObj.name : '');
                                        
                                        return (
                                            <div key={partId} className="mb-5 text-left">
                                                <h5 className="flex items-center gap-1.5 mb-2.5">
                                                    <span className="w-1 h-4 rounded-full shrink-0" style={{backgroundColor: partColor}}></span>
                                                    <span className="text-xs font-black text-gray-600">{partNameLabel}</span>
                                                    <span className="text-[10px] font-black px-2 py-0.5 rounded-full" style={{backgroundColor: partLight, color: partColor}}>
                                                        {checkedCount}/{list.length}
                                                    </span>
                                                </h5>
                                                <div className="grid grid-cols-4 gap-1.5">
                                                    {list.map(m => {
                                                        const pi_h = (() => { let p = PART_ICON[m.part] || null; if (m.part==='staff' && p) p={...p, abbr: m.role==='반주자'?'반':'성'}; return p; })();
                                                        const checked = selected.has(m.name);
                                                        return (
                                                            <button key={m.name}
                                                                onClick={() => { if (!isEditable) return; const n = new Set(selected); if(n.has(m.name)) n.delete(m.name); else n.add(m.name); setSelected(n); }}
                                                                disabled={!isEditable}
                                                                className={`px-2 py-2.5 rounded-xl border border-gray-100 transition-all flex items-center justify-center gap-1.5 ${!isEditable ? '' : 'active:scale-95'}`}
                                                                style={{backgroundColor: checked ? (pi_h?.light || '#f1f5f9') : '#fff', minHeight: '40px'}}
                                                            >
                                                                {pi_h && <span className="inline-flex items-center justify-center w-5 h-5 rounded font-black shrink-0"
                                                                    style={{ backgroundColor: pi_h.light, color: pi_h.color, fontSize:'10px', border: `1.5px solid ${pi_h.color}26` }}>{pi_h.abbr}</span>}
                                                                <span className={`text-xs font-bold whitespace-nowrap ${checked ? 'text-gray-800' : 'text-gray-500'}`}>{m.name}</span>
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </section>
                            </div>
                        </div>
        {isEditable && <footer className="flex gap-2 p-5 border-t border-gray-100 bg-white shrink-0">
                            <button onClick={() => onDelete(record.id)} className="p-3.5 rounded-2xl bg-red-50 text-red-500 hover:bg-red-100 transition-colors active:scale-95"><LucideIcon name="trash-2" className="w-5 h-5" /></button>
                            <button onClick={() => setIsEditable(false)} className="flex-1 bg-gray-100 text-gray-400 py-4 rounded-2xl font-black active:scale-95 transition-transform text-sm">취소</button>
                            <button onClick={async () => {
                                let finalImage = image;
                                if (imageFile) {
                                    try {
                                        finalImage = await uploadToCloudinary(imageFile, 'grace/attendance');
                                    } catch(e) {
                                        console.warn('Cloudinary 업로드 실패, base64 폴백:', e.message);
                                    }
                                }
                                onSave({...record, date: date.replace(/-/g, '. ') + '.', members: Array.from(selected), count: selected.size, image: finalImage});
                            }} className="flex-[2] bg-[#193278] text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-transform text-sm">저장</button>
                        </footer>}
                    </div>
                    {isFullScreen && image && (
                        <div className="fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-4 fade-in text-center" onClick={() => setIsFullScreen(false)}>
                            <button onClick={(e) => { e.stopPropagation(); setIsFullScreen(false); }} className="absolute top-6 right-6 text-white/80 hover:text-white p-3 rounded-full bg-black/20 backdrop-blur-sm transition-all active:scale-90 z-[310]"><LucideIcon name="x" className="w-8 h-8" /></button>
                            <img src={image} className="max-w-full max-h-full object-contain rounded-lg shadow-2xl scale-in" onClick={(e) => e.stopPropagation()} />
                        </div>
                    )}
                </div>
            );
        };

        // ── 음력→양력 정확 변환 (한국천문연구원 기준 월별 날수 데이터 테이블)
        // 각 항목: { newYear:[양력월,양력일], months:[12개월_날수], leap:윤달위치(0=없음), leapDays:윤달날수 }
        const LUNAR_YEAR_DATA = {
            2020: { newYear:[1,25],  months:[29,29,30,30,30,29,30,30,29,30,30,29], leap:4, leapDays:29 },
            2021: { newYear:[2,12],  months:[29,30,29,30,29,30,29,30,29,30,30,29], leap:0, leapDays:0  },
            2022: { newYear:[2,1],   months:[30,29,30,29,30,29,30,29,30,29,30,30], leap:0, leapDays:0  },
            2023: { newYear:[1,22],  months:[29,30,30,29,30,29,30,29,30,29,30,30], leap:2, leapDays:29 },
            2024: { newYear:[2,10],  months:[29,30,29,30,29,30,29,30,29,30,29,30], leap:0, leapDays:0  },
            2025: { newYear:[1,29],  months:[30,29,30,29,30,29,30,29,30,30,30,29], leap:6, leapDays:29 },
            2026: { newYear:[2,17],  months:[29,30,29,30,29,30,29,30,29,30,30,29], leap:0, leapDays:0  },
            2027: { newYear:[2,6],   months:[30,29,30,29,30,29,30,29,30,29,30,29], leap:0, leapDays:0  },
            2028: { newYear:[1,26],  months:[29,30,29,30,29,30,30,29,30,29,30,30], leap:5, leapDays:29 },
            2029: { newYear:[2,13],  months:[30,29,30,29,30,29,30,29,30,29,30,30], leap:0, leapDays:0  },
            2030: { newYear:[2,3],   months:[29,30,29,30,30,29,30,29,30,29,30,29], leap:0, leapDays:0  },
        };

        // 음력 → 양력 변환 함수
        // solarYear: 기준 양력 연도, lunarMonth: 음력 월(1~12), lunarDay: 음력 일(1~30)
        // 반환: { year, month, day } 양력 날짜, 또는 null
        const lunarToSolar = (solarYear, lunarMonth, lunarDay) => {
            const data = LUNAR_YEAR_DATA[solarYear];
            if (!data) return null;
            const [nyMM, nyDD] = data.newYear;
            const { months, leap, leapDays } = data;
            // 윤달 포함 전체 월 목록 생성
            const fullMonths = [];
            for (let m = 1; m <= 12; m++) {
                fullMonths.push({ m, isLeap: false, days: months[m - 1] });
                if (leap > 0 && m === leap) {
                    fullMonths.push({ m, isLeap: true, days: leapDays });
                }
            }
            // 신년부터 목표 음력 날짜까지 일수 계산 (윤달은 건너뜀)
            let offset = 0, found = false;
            for (const fm of fullMonths) {
                if (fm.m === lunarMonth && !fm.isLeap) {
                    offset += lunarDay - 1;
                    found = true;
                    break;
                }
                offset += fm.days;
            }
            if (!found) return null;
            const base = new Date(solarYear, nyMM - 1, nyDD);
            base.setDate(base.getDate() + offset);
            return { year: base.getFullYear(), month: base.getMonth() + 1, day: base.getDate() };
        };

        // 파트 아이콘 — B안: 소프트 파스텔 outlined 스타일
        const PART_ICON = {
            staff:   { abbr: '성', color: '#193278', light: '#eff6ff' },
            soprano: { abbr: 'S',  color: '#db2777', light: '#fdf2f8' },
            alto:    { abbr: 'A',  color: '#d97706', light: '#fffbeb' },
            tenor:   { abbr: 'T',  color: '#2563eb', light: '#eff6ff' },
            bass:    { abbr: 'B',  color: '#7c3aed', light: '#f5f3ff' },
        };
        // 공통 멤버 칩 컴포넌트 (파트 아이콘 + 이름, 3열 그리드 사용)
        // partMap: {name->part} 맵 OR null, partOverride: 직접 파트 id 전달 시 사용
        const MemberChipWithPart = ({ name, partMap, partOverride, roleOverride, bgColor = 'bg-white', borderColor = 'border-gray-100', nameColor = 'text-gray-800', extra }) => {
            const part = partOverride || (partMap ? partMap[name] : null);
            let pi = PART_ICON[part] || null;
            // staff 파트에서 반주자는 '반', 나머지는 '성'
            if (part === 'staff' && pi) {
                const role = roleOverride || '';
                pi = { ...pi, abbr: role === '반주자' ? '반' : '성' };
            }
            return (
                <div className={`flex items-center justify-center gap-1.5 px-2 py-2.5 ${bgColor} border ${borderColor} rounded-xl`} style={{minHeight: '40px'}}>
                    {pi && (
                        <span className="inline-flex items-center justify-center w-5 h-5 rounded font-black shrink-0"
                            style={{ backgroundColor: pi.light, color: pi.color, fontSize: '10px', border: `1.5px solid ${pi.color}26` }}>{pi.abbr}</span>
                    )}
                    <span className={`font-bold text-xs ${nameColor} leading-tight whitespace-nowrap`}>{name}</span>
                    {extra && <span className="text-xs text-gray-400 font-bold shrink-0">{extra}</span>}
                </div>
            );
        };

        /* 출석체크 체크 상태 스타일 칩 — 파트 light 배경 */
        const MemberChipAttended = ({ name, partMap, partOverride, roleOverride }) => {
            const part = partOverride || (partMap ? partMap[name] : null);
            let pi = PART_ICON[part] || null;
            if (part === 'staff' && pi) {
                const role = roleOverride || '';
                pi = { ...pi, abbr: role === '반주자' ? '반' : '성' };
            }
            return (
                <div className="flex items-center justify-center gap-1.5 px-2 py-2.5 bg-white border border-gray-100 rounded-xl"
                    style={{minHeight:'40px'}}>
                    {pi && (
                        <span className="inline-flex items-center justify-center w-5 h-5 rounded font-black shrink-0"
                            style={{backgroundColor:pi.light, color:pi.color, fontSize:'10px', border:`1.5px solid ${pi.color}26`}}>{pi.abbr}</span>
                    )}
                    <span className="font-bold text-xs text-gray-800 whitespace-nowrap leading-tight">{name}</span>
                </div>
            );
        };

        const BirthdayCalendarModal = ({ members, onClose }) => {
            const today = new Date();
            const [calYear, setCalYear] = useState(today.getFullYear());
            const [calMonth, setCalMonth] = useState(today.getMonth() + 1);

            const prevMonth = () => { if (calMonth === 1) { setCalYear(y=>y-1); setCalMonth(12); } else setCalMonth(m=>m-1); };
            const nextMonth = () => { if (calMonth === 12) { setCalYear(y=>y+1); setCalMonth(1); } else setCalMonth(m=>m+1); };

            // 해당 월 생일자 맵 { solarDay: [{name, part, lunar, lunarMM, lunarDD, solarDD}] }
            const bdMap = useMemo(() => {
                const map = {};
                (members || []).filter(m => m.status !== 'sabbatical' && m.status !== 'inactive').forEach(m => {
                    if (!m.birthday) return;
                    const [mm, dd] = m.birthday.split('-').map(Number);
                    if (!mm || !dd) return;
                    let displayMM = mm, displayDD = dd;
                    let lunarMM = null, lunarDD = null;
                    if (m.birthdayType === 'lunar') {
                        lunarMM = mm; lunarDD = dd;
                        // 정확한 음력→양력 변환
                        let solar = lunarToSolar(calYear, mm, dd);
                        // 음력 11~12월처럼 다음 양력 연도로 넘어가는 경우: 이전 음력 연도 기준 재계산
                        if (!solar || solar.year !== calYear) {
                            solar = lunarToSolar(calYear - 1, mm, dd);
                        }
                        if (solar && solar.year === calYear) {
                            displayMM = solar.month;
                            displayDD = solar.day;
                        } else {
                            return;
                        }
                    }
                    if (displayMM === calMonth) {
                        if (!map[displayDD]) map[displayDD] = [];
                        map[displayDD].push({ name: m.name, part: m.part || 'staff', role: m.role || '', lunar: m.birthdayType === 'lunar', lunarMM, lunarDD, solarDD: displayDD });
                    }
                });
                return map;
            }, [members, calMonth, calYear]);

            const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth, 0).getDate();
            const cells = [];
            for (let i = 0; i < firstDay; i++) cells.push(null);
            for (let d = 1; d <= daysInMonth; d++) cells.push(d);
            const isCurrentMonth = calYear === today.getFullYear() && calMonth === today.getMonth()+1;
            const todayD = today.getDate();

            const PartIcon = ({ part, role }) => {
                let pi = PART_ICON[part] || PART_ICON.staff;
                if (part === 'staff') pi = { ...pi, abbr: role === '반주자' ? '반' : '성' };
                return (
                    <span className="inline-flex items-center justify-center w-4 h-4 rounded-md text-[8px] font-black shrink-0" style={{ backgroundColor: pi.light, color: pi.color, border: `1.5px solid ${pi.color}26` }}>{pi.abbr}</span>
                );
            };

            // 이달 생일자 목록 (날짜 순)
            const bdList = Object.entries(bdMap)
                .sort((a,b) => Number(a[0]) - Number(b[0]))
                .flatMap(([d, bds]) => bds.map(b => ({ ...b, displayD: Number(d) })));

            return (
                <div className="fixed inset-0 bg-black/85 backdrop-blur-sm z-[200] flex items-end md:items-center justify-center p-0 md:p-4">
                    <div className="bg-white w-full md:max-w-2xl rounded-t-[24px] md:rounded-[24px] shadow-2xl scale-in flex flex-col min-h-[65vh] max-h-[90vh] overflow-hidden">
                        <div className="flex justify-center pt-3 pb-1 shrink-0 sm:hidden">
                            <div className="w-10 h-1 rounded-full bg-gray-200 sm:opacity-0"></div>

        const StatsView = ({ history, members, onAddAttendance, onOpenInterest, onOpenBdCalendar, onOpenAttendStats, onOpenPersonal, onDetail, requestAuth, askConfirm, showToast }) => {
            const [subTab, setSubTab] = useState('part');

            const chartInstance = useRef(null);
            
            const safeMembers = members || [];
            const activeMembers = safeMembers.filter(m => m && m.status === 'active');

            const memberPartMap = useMemo(() => {
                return safeMembers.reduce((acc, m) => {
                    if (m && m.name) acc[m.name] = m.part;
                    return acc;
                }, {});
            }, [safeMembers]);

            // 이달 생일자 카운트
            const thisMonthBdCount = useMemo(() => {
                const now = new Date();
                const thisM = now.getMonth() + 1;
                const thisY = now.getFullYear();
                return safeMembers.filter(m => m.status !== 'sabbatical' && m.status !== 'inactive').filter(m => {
                    if (!m.birthday) return false;
                    const [mm, dd] = m.birthday.split('-').map(Number);
                    if (!mm || !dd) return false;
                    if (m.birthdayType !== 'lunar') return mm === thisM;
                    // 정확한 음력→양력 변환
                    let solar = lunarToSolar(thisY, mm, dd);
                    if (!solar || solar.year !== thisY) solar = lunarToSolar(thisY - 1, mm, dd);
                    return solar && solar.year === thisY && solar.month === thisM;
                }).length;
            }, [safeMembers]);

            const stats = useMemo(() => {
                const safeHistory = history || [];
                if (safeHistory.length === 0) return { avg: 0, max: 0, attention: 0 };
                const avg = (safeHistory.reduce((a,b) => a + (b.count || 0), 0) / safeHistory.length).toFixed(1);
                const max = Math.max(...safeHistory.map(h => h.count || 0));
                const last3 = safeHistory.slice(0, 3).flatMap(h => h.members || []);
                const attention = activeMembers.filter(m => m && m.name && !last3.includes(m.name)).length;
                return { avg, max, attention };
            }, [history, activeMembers]);

            useEffect(() => {
                const safeHistory = history || [];
                if (safeHistory.length > 0 && chartRef.current && (subTab === 'total' || subTab === 'part')) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const sorted = [...safeHistory].reverse().slice(-10);
                    const labels = sorted.map(h => {
                        const parts = (h.date || "").split('. ');
                        if (parts.length >= 3) {
                            const month = parseInt(parts[1]);
                            const day = parseInt(parts[2]);
                            return `${month}/${day}`;
                        }
                        return h.date || "";
                    });

                    let datasets = [];
                    if (subTab === 'total') {
                        datasets = [{ label: '총 인원', data: sorted.map(h => h.count || 0), borderColor: '#193278', backgroundColor: 'rgba(25, 50, 120, 0.1)', fill: true, tension: 0.4, font: { weight: 'bold' } }];
                    } else if (subTab === 'part') {
                        datasets = PARTS.map(p => ({
                            label: p.name,
                            data: sorted.map(h => (h.members || []).filter(name => memberPartMap[name] === p.id).length),
                            borderColor: p.color,
                            backgroundColor: 'transparent',
                            tension: 0.3,
                            pointRadius: 3
                        }));
                    }

                    chartInstance.current = new Chart(chartRef.current, {
                        type: 'line',
                        data: { labels, datasets },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: subTab === 'part', position: 'top', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } },
                            }, 
                            scales: {
                                y: {
                                    beginAtZero: true,

                                <div className="flex items-baseline gap-0.5">

                    <div className="bg-white p-5 rounded-[28px] shadow-sm border border-gray-50 relative flex flex-col min-h-[240px]">

                                        <div className="flex items-stretch gap-3">
                                            <div className="w-24 sm:w-28 flex-shrink-0 bg-gray-100 rounded-2xl overflow-hidden">
                                                {h.image ? (

                                                        <LucideIcon name="image" className="w-7 h-7 opacity-40" />

                                                {PARTS.map(p => (

                                                        <span className="inline-flex items-center justify-center w-6 h-6 rounded-lg font-black shrink-0 text-[11px]" style={{backgroundColor: p.light, color: p.color, border:`1.5px solid ${p.color}40`}}>
                                                            {p.id==='soprano'?'S':p.id==='alto'?'A':p.id==='tenor'?'T':'B'}
                                                        </span>
                                                        <div className="flex-1 flex items-baseline justify-end gap-0.5">
                                                            <span className="font-black text-lg leading-none" style={{color: p.color}}>{countsByPart[p.id]}</span>

                    {/* 개인출석 확인 팝업 — App 레벨에서 렌더링 */}
                </div>
            );
        };

        const MusicView = ({ songs, requestAuth, askConfirm, showToast, isAdmin, geminiApiKey }) => {
            const getToday = () => new Date().toISOString().split('T')[0];
            const [showAdd, setShowAdd] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [form, setForm] = useState({ title: '', date: getToday(), image: '', links: { s: '', a: '', t: '', b: '', sheet: '', chorus: '' } });

            const handleSave = () => requestAuth(async () => {
                const { db, collection, addDoc, doc, setDoc } = window.MyFirebase;
                let finalImage = form.image;
                if (form.file) {
                    try {
                        finalImage = await uploadToCloudinary(form.file, 'grace/music');
                    } catch(e) {
                        console.warn('Cloudinary 업로드 실패, base64 폴백:', e.message);
                        finalImage = await compressImage(form.file, 400, 400);
                    }
                }
                const data = { ...form, image: finalImage, updatedAt: new Date().toISOString() };
                delete data.file;
                if (form.id) { await setDoc(doc(db, 'music', form.id), data); showToast("수정되었습니다."); }
                else { await addDoc(collection(db, 'music'), data); showToast("저장되었습니다."); }
                resetForm();
            });

            const resetForm = () => { setForm({ title: '', date: getToday(), image: '', links: { s: '', a: '', t: '', b: '', sheet: '', chorus: '' } }); setShowAdd(false); };
            const handleEdit = (song) => requestAuth(() => { 
                setForm({
                    id: song.id, title: song.title || '', date: song.date || getToday(), image: song.image || '',
                    links: { s: song.links?.s || '', a: song.links?.a || '', t: song.links?.t || '', b: song.links?.b || '', sheet: song.links?.sheet || '', chorus: song.links?.chorus || '' }
                });
                setShowAdd(true); 
            });
            const handleDelete = (id) => requestAuth(() => {
                askConfirm("성가 삭제", "이 데이터를 삭제하시겠습니까?", async () => {
                    const { db, doc, deleteDoc } = window.MyFirebase;
                    await deleteDoc(doc(db, 'music', id)); showToast("삭제되었습니다.");
                });
            });

            const handleShareAll = async () => {
                if (!form.title) return showToast("성가 곡명을 먼저 입력해주세요.");

                let dateStr = "날짜 미지정";
                if (form.date) {
                    const [y, m, d] = form.date.split('-');
                    dateStr = `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
                }

                let text = `★ 주일 성가영상 & 음원 업로드 공지 ★\n[주은혜찬양팀 매니저]에 찬양팀 주일 성가 영상과 파트별 유튜브 링크가 업데이트되었습니다. 감사합니다. \nteamgrace.netlify.app\n\n▶ ${dateStr} 주일 찬양\n제목 : ${form.title}\n(중앙성가 42권)\n\n[파트링크]\n`;
                if (form.links?.s) text += `- 소프라노\n${form.links.s}\n`;
                if (form.links?.a) text += `- 알토\n${form.links.a}\n`;
                if (form.links?.t) text += `- 테너\n${form.links.t}\n`;
                if (form.links?.b) text += `- 베이스\n${form.links.b}\n`;
                if (form.links?.chorus) text += `- 합창\n${form.links.chorus}\n`;
                text = text.trim();

                // 텍스트는 항상 클립보드에 먼저 복사 (카톡은 Web Share의 text를 무시함)
                const copyText = async () => {
                    try {
                        await navigator.clipboard.writeText(text);
                    } catch {
                        const dummy = document.createElement("textarea");
                        dummy.value = text;
                        document.body.appendChild(dummy);
                        dummy.select();
                        document.execCommand('copy');
                        document.body.removeChild(dummy);
                    }
                };

                const hasImage = !!(form.file || form.image);

                // ① 모바일 Web Share API로 이미지 공유 + 텍스트는 클립보드
                if (hasImage && navigator.share) {
                    try {
                        let file;
                        if (form.file) {
                            file = form.file;
                        } else {
                            const res = await fetch(form.image);
                            const blob = await res.blob();
                            const ext = blob.type.includes('png') ? 'png' : 'jpg';
                            file = new File([blob], `thumbnail.${ext}`, { type: blob.type });
                        }
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await copyText(); // 공유 시트 열기 전에 클립보드 복사
                            showToast("텍스트 복사됨 ✓  이미지 전송 후 채팅창에 붙여넣기 하세요!");
                            await navigator.share({ files: [file] });
                            return;
                        }
                    } catch (e) {
                        if (e.name === 'AbortError') return; // 사용자가 취소
                        console.warn("파일 공유 실패, 폴백 실행:", e);
                    }
                }

                // ② 폴백: 이미지 자동 다운로드 + 텍스트 클립보드 복사
                if (hasImage) {
                    const a = document.createElement('a');
                    a.href = form.file ? URL.createObjectURL(form.file) : form.image;
                    a.download = `찬양썸네일_${form.title}.jpg`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
                await copyText();
                showToast(hasImage ? "이미지 저장 + 텍스트 복사 완료! 카톡에 붙여넣기 하세요." : "텍스트가 복사되었습니다!");
            };

            const synthesizeThumbnail = (bgBase64, title) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 1280;
                        canvas.height = 720;
                        const ctx = canvas.getContext('2d');
                        
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // 텍스트 가독성을 위한 어두운 오버레이
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        // 그림자 설정
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                        ctx.shadowBlur = 15;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        
                        // 메인 타이틀
                        ctx.fillStyle = '#ffffff';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.font = '900 85px Pretendard, sans-serif';
                        ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 30);
                        
                        // 서브 타이틀
                        ctx.font = '700 45px Pretendard, sans-serif';
                        ctx.fillText("중앙성가 42권", canvas.width / 2, canvas.height / 2 + 80);
                        
                        // 그림자 초기화
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;
                        
                        // 오른쪽 하단 뱃지
                        const badgeText = "주은혜 찬양사역팀";
                        ctx.font = '800 32px Pretendard, sans-serif';
                        const textWidth = ctx.measureText(badgeText).width;
                        const badgeWidth = textWidth + 80;
                        const badgeHeight = 70;
                        const badgeX = canvas.width - badgeWidth;
                        const badgeY = canvas.height - badgeHeight - 40;
                        
                        // 뱃지 배경 (붉은 갈색 - 첨부파일과 동일한 디자인)
                        ctx.fillStyle = 'rgba(128, 43, 34, 0.9)'; 
                        ctx.beginPath();
                        ctx.moveTo(badgeX - 20, badgeY); // 약간 사선으로 디자인
                        ctx.lineTo(canvas.width, badgeY);
                        ctx.lineTo(canvas.width, badgeY + badgeHeight);
                        ctx.lineTo(badgeX - 40, badgeY + badgeHeight); 
                        ctx.fill();
                        
                        // 뱃지 텍스트
                        ctx.fillStyle = '#ffffff';
                        ctx.textAlign = 'right';
                        ctx.fillText(badgeText, canvas.width - 40, badgeY + badgeHeight / 2 + 2);
                        
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = bgBase64;
                });
            };

            const handleGenerateAIImage = async () => {
                if (!form.title) return showToast("성가 곡명을 먼저 입력해주세요.");
                
                setIsGenerating(true);
                try {
                    const seed = Math.floor(Math.random() * 1000000);
                    // 완전 무료 랜덤 이미지 제공 서비스 (CORS 이슈가 거의 없는 picsum 사용)
                    const imageUrl = `https://picsum.photos/seed/${seed}/1280/720`;
                    
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    
                    const bgBase64 = await new Promise((resolve, reject) => {
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = 1280;
                            canvas.height = 720;
                            const ctx = canvas.getContext('2d');
                            
                            // 원본 이미지 그리기
                            ctx.drawImage(img, 0, 0, 1280, 720);
                            
                            // 예배당/성가대 느낌을 내기 위해 어둡고 우아한 색상 오버레이 적용 (주은혜팀 네이비 톤)
                            const gradient = ctx.createLinearGradient(0, 0, 1280, 720);
                            gradient.addColorStop(0, 'rgba(25, 50, 120, 0.5)'); 
                            gradient.addColorStop(1, 'rgba(40, 20, 80, 0.6)');
                            
                            ctx.fillStyle = gradient;
                            ctx.fillRect(0, 0, 1280, 720);
                            
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.onerror = () => reject(new Error("Image Load Failed"));
                        img.src = imageUrl;
                    });

                    const finalImage = await synthesizeThumbnail(bgBase64, form.title);
                    setForm(prev => ({ ...prev, image: finalImage, file: null }));
                    showToast("새로운 썸네일이 생성되었습니다.");
                    
                } catch (err) {
                    console.warn("이미지 서버 로드 실패, 자체 생성 배경으로 대체합니다:", err);
                    
                    // Fallback: 외부 서버 접속이 막혀있을 경우 자체적으로 그라데이션 배경 생성
                    const canvas = document.createElement('canvas');
                    canvas.width = 1280;
                    canvas.height = 720;
                    const ctx = canvas.getContext('2d');
                    
                    const hues = [220, 260, 340, 200];
                    const baseHue = hues[Math.floor(Math.random() * hues.length)];
                    
                    const gradient = ctx.createLinearGradient(0, 0, 1280, 720);
                    gradient.addColorStop(0, `hsl(${baseHue}, 70%, 15%)`);
                    gradient.addColorStop(1, `hsl(${baseHue + 40}, 60%, 35%)`);
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, 1280, 720);
                    
                    const fallbackBg = canvas.toDataURL('image/jpeg', 0.8);
                    const finalImage = await synthesizeThumbnail(fallbackBg, form.title);
                    setForm(prev => ({ ...prev, image: finalImage, file: null }));
                    showToast("기본 예배 배경으로 썸네일이 생성되었습니다.");
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleDownloadThumbnail = () => {
                const link = document.createElement('a');
                link.href = form.image;
                link.download = `${form.title}_썸네일.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const filteredSongs = songs.filter(s => (s.title || "").toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="fade-in space-y-6 text-left">
