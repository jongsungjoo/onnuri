                                            } catch(err) { alert("사진 업로드 실패"); }
                                        }} />
                                    </label>
                                </div>
                                {form.photo && (
                                    <button onClick={() => setForm(prev => ({...prev, photo: null}))} className="text-[10px] text-red-400 font-bold mt-1">사진 삭제</button>
                                )}
                                <p className="text-[10px] text-gray-300 font-bold mt-1">관리자 전용 — 팀원 사진</p>
                            </div>
                            {/* 이름 */}
                            <div>
                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">이름</label>
                                <input type="text" placeholder="팀원 이름"
                                    className="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-500"
                                    value={form.name} onChange={e => setForm({...form, name: e.target.value})} autoFocus={isNew} />
                            </div>
                            {/* 파트 */}
                            <div>
                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">파트</label>
                                <div className="flex flex-wrap gap-2">
                                    {PART_OPTIONS.map(p => (
                                        <button key={p.id} onClick={() => setForm({...form, part: p.id})}
                                            className={`px-3 py-1.5 rounded-xl text-xs font-black border-2 transition-all ${form.part === p.id ? 'text-white shadow-sm' : 'bg-gray-50 border-gray-100 text-gray-400'}`}
                                            style={form.part === p.id ? { backgroundColor: p.color, borderColor: p.color } : {}}
                                        >{p.name}</button>
                                    ))}
                                </div>
                            </div>
                            {/* 상태 */}
                            <div>
                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">상태</label>
                                <div className="flex gap-2">
                                    {STATUS_OPTIONS.map(s => (
                                        <button key={s.id} onClick={() => setForm({...form, status: s.id})}
                                            className={`flex-1 py-2.5 rounded-xl text-xs font-black border-2 transition-all ${form.status === s.id ? 'border-[#193278] bg-[#193278] text-white shadow-sm' : 'bg-gray-50 border-gray-100 text-gray-400'}`}
                                        >{s.label}</button>
                                    ))}
                                </div>
                            </div>
                            {/* 임원 직책 */}
                            <div>
                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1">임원 직책 <span className="normal-case font-normal">(없으면 비워두세요)</span></label>
                                <input type="text" placeholder="예: 팀장, 총무, 파트장, 봉사부장 …"
                                    className="w-full bg-gray-50 p-3.5 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500"
                                    value={form.role} onChange={e => setForm({...form, role: e.target.value})} />
                            </div>
                            {/* 생일 */}
                            <div>
                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">생일 <span className="normal-case font-normal">(선택)</span></label>
                                <div className="flex gap-2 mb-2">
                                    {[['solar','양력'],['lunar','음력']].map(([v,l]) => (
                                        <button key={v} onClick={() => setForm({...form, birthdayType: v})}
                                            className={`flex-1 py-2 rounded-xl text-xs font-black border-2 transition-all flex items-center justify-center gap-1 ${form.birthdayType === v ? 'bg-[#193278] border-[#193278] text-white' : 'bg-gray-50 border-gray-100 text-gray-400'}`}>
                                            {v === 'solar' ? '☀️' : '🌙'} {l}
                                        </button>
                                    ))}
                                </div>
                                <input type="text" placeholder="MM-DD  (예: 03-15)"
                                    className="w-full bg-gray-50 p-3.5 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 tracking-widest"
                                    value={form.birthday} onChange={e => setForm({...form, birthday: e.target.value})}
                                    maxLength={5}
                                />
                                <p className="text-[10px] text-gray-300 font-bold mt-1 pl-1">월-일 형식으로 입력 (예: 03-15)</p>
                            </div>
                        </div>
                        <div className="flex gap-2 px-6 pb-6 pt-3 border-t border-gray-100 shrink-0">
                            {!isNew && <button onClick={onDelete} className="p-3 rounded-2xl bg-red-50 text-red-500 hover:bg-red-100 transition-colors"><LucideIcon name="trash-2" className="w-5 h-5" /></button>}
                            <button onClick={onClose} className="flex-1 bg-gray-100 text-gray-400 py-4 rounded-2xl font-black active:scale-95 transition-transform">취소</button>
                            <button onClick={() => { if (!form.name.trim()) return; onSave(form); }}
                                className="flex-[2] bg-[#193278] text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-transform">저장</button>
                        </div>
                    </div>
                </div>
                </>
            );
        };

        const SelfPhotoModal = ({ member, onClose, onSave }) => {
            const [uploading, setUploading] = useState(false);
            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-[500] flex flex-col items-center justify-center fade-in" onClick={() => !uploading && onClose()}>
                    <div className="flex flex-col items-center gap-5 p-6" onClick={e => e.stopPropagation()}>
                        {member.photo
                            ? <img src={member.photo} className="w-44 h-44 rounded-full object-cover border-4 border-white/20 shadow-2xl" />
                            : <div className="w-44 h-44 rounded-full bg-white/10 border-4 border-white/20 flex items-center justify-center">
                                <LucideIcon name="user" className="w-20 h-20 text-white/40" />
                              </div>
                        }
                        <p className="text-white font-black text-xl">{member.name}</p>
                        <p className="text-white/50 text-xs font-medium -mt-3">본인 프로필 사진만 변경할 수 있습니다</p>
                        <label className={`flex items-center gap-2 px-6 py-3.5 rounded-2xl font-black text-sm cursor-pointer transition-all active:scale-95 shadow-lg ${uploading ? 'bg-white/20 text-white/50 pointer-events-none' : 'bg-white text-[#193278]'}`}>
                            {uploading
                                ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white/80 rounded-full animate-spin"></div> 업로드 중...</>
                                : <><LucideIcon name="camera" className="w-4 h-4" /> 사진 변경</>
                            }
                            <input type="file" accept="image/*" className="hidden"
                                onChange={async (e) => {
                                    const file = e.target.files[0];
                                    if (!file || uploading) return;
                                    setUploading(true);
                                    await onSave(member.name, file);
                                    setUploading(false);
                                }}
                                disabled={uploading}
                            />
                        </label>
                        <button onClick={onClose} className="text-white/40 text-xs font-bold mt-1 active:text-white/70 transition-colors">닫기</button>
                    </div>
                </div>
            );
        };

        const ManageView = ({ members, currentPassword, requestAuth, showToast, geminiApiKey, onSaveGeminiKey, isAdmin, onBecomeAdmin, onOpenBdCalendar, onOpenEditModal }) => {
            const [partFilter, setPartFilter] = useState('all');
            const [statusFilter, setStatusFilter] = useState('active');
            const [editingMember, setEditingMember] = useState(null);
            const [pwdForm, setPwdForm] = useState({ current: '', next: '', confirm: '' });
            const [showPwdSetting, setShowPwdSetting] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [apiForm, setApiForm] = useState(geminiApiKey || "");
            // 찬양팀명단 전용 로컬 관리자 모드 — 전역 isAdmin이면 자동 활성
            const [localAdmin, setLocalAdmin] = useState(isAdmin || false);
            useEffect(() => { if (isAdmin) setLocalAdmin(true); }, [isAdmin]);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [adminPwInput, setAdminPwInput] = useState('');
            const [adminPwError, setAdminPwError] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            const handleLocalAdminLogin = () => {
                if (adminPwInput === currentPassword) {
                    setLocalAdmin(true);
                    if (onBecomeAdmin) onBecomeAdmin(); // 전역 isAdmin도 활성화
                    setShowAdminModal(false); setAdminPwInput(''); setAdminPwError(false);
                } else {
                    setAdminPwError(true); setTimeout(() => setAdminPwError(false), 600);
                }
            };

            const thisMonthBdCount = useMemo(() => {
                const now = new Date();
                const thisM = now.getMonth() + 1;
                const thisY = now.getFullYear();
                return members.filter(m => m && m.status !== 'sabbatical' && m.status !== 'inactive').filter(m => {
                    if (!m.birthday) return false;
                    const [mm, dd] = m.birthday.split('-').map(Number);
                    if (!mm || !dd) return false;
                    if (m.birthdayType !== 'lunar') return mm === thisM;
                    let solar = lunarToSolar(thisY, mm, dd);
                    if (!solar || solar.year !== thisY) solar = lunarToSolar(thisY - 1, mm, dd);
                    return solar && solar.year === thisY && solar.month === thisM;
                }).length;
            }, [members]);

            const statusNorm = m => m.status === 'inactive' ? 'sabbatical' : (m.status || 'active');

            const saveRoster = async (newList) => {
                const { db, doc, setDoc } = window.MyFirebase;
                await setDoc(doc(db, 'roster', 'current'), { list: newList });
            };

            // 저장 시 Firebase에서 최신 명단을 직접 읽어 stale closure 완전 방지
            const handleSaveMember = async (form, originalName) => {
                const { db, doc, setDoc, getDoc } = window.MyFirebase;
                let photoUrl = form.photo;
                if (form.photoFile) {
                    try { photoUrl = await uploadToCloudinary(form.photoFile, 'grace/members'); }
                    catch(e) { console.warn('Cloudinary 업로드 실패, base64 저장:', e.message); }
                }
                const data = { name: form.name.trim(), part: form.part, status: form.status, role: form.role.trim(), birthday: form.birthday.trim(), birthdayType: form.birthdayType || 'solar', photo: photoUrl || null };

                // 항상 Firebase 최신값 기준으로 처리
                const snap = await getDoc(doc(db, 'roster', 'current'));
                const latest = snap.exists() ? (snap.data().list || []) : [];

                let newList;
                if (!originalName) {
                    newList = [...latest, data];
                } else {
                    const found = latest.some(m => m.name === originalName);
                    newList = found
                        ? latest.map(m => m.name === originalName ? { ...m, ...data } : m)
                        : [...latest, data]; // 혹시라도 못 찾으면 추가
                }
                await setDoc(doc(db, 'roster', 'current'), { list: newList });
                showToast(originalName ? "수정되었습니다." : "팀원이 추가되었습니다.");
                setEditingMember(null); onOpenEditModal(null);
            };

            const handleDeleteMember = async (name) => {
                await saveRoster(members.filter(m => m.name !== name));
                showToast("삭제되었습니다."); setEditingMember(null); onOpenEditModal(null);
            };

            const handleUpdatePassword = async () => {
                if (pwdForm.current !== currentPassword) return showToast("현재 비밀번호가 일치하지 않습니다.");
                if (pwdForm.next.length < 4) return showToast("비밀번호는 4자리 이상이어야 합니다.");
                if (pwdForm.next !== pwdForm.confirm) return showToast("새 비밀번호 확인이 일치하지 않습니다.");
                const { db, doc, setDoc } = window.MyFirebase;
                try {
                    await setDoc(doc(db, 'settings', 'admin'), { password: pwdForm.next });
                    showToast("비밀번호가 변경되었습니다.");
                    setPwdForm({ current: '', next: '', confirm: '' }); setShowPwdSetting(false);
                } catch (e) { showToast("변경 중 오류가 발생했습니다."); }
            };

            // 레벨 2 필터탭 목록 (성가사 · 반주자 먼저, 임원진 다음)
            const partTabs = [
                { id: 'all',     name: '전체',          color: '#193278' },
                ...PART_OPTIONS,
                { id: 'officer', name: '임원진', color: '#7c3aed' },
            ];

            // 상태 카운트
            const counts = {
                active:        members.filter(m => statusNorm(m) === 'active').length,
                short_absence: members.filter(m => statusNorm(m) === 'short_absence').length,
                sabbatical:    members.filter(m => statusNorm(m) === 'sabbatical').length,
            };

            // 레벨1 필터 (상태)
            const byStatus = members.filter(m => statusNorm(m) === statusFilter);

            // 레벨2 필터 (파트/임원)
            let filtered;
            if (partFilter === 'all')          filtered = byStatus;
            else if (partFilter === 'officer') filtered = byStatus.filter(m => m.role && m.role.trim());
            else                               filtered = byStatus.filter(m => m.part === partFilter);

            // 파트별 그룹핑 (일반 모드)
            const grouped = PART_OPTIONS.map(p => ({
                ...p,
                members: filtered.filter(m => m.part === p.id),
            })).filter(g => g.members.length > 0);

            // 임원진 모드 전용 그룹핑
            const PART_ABBR = { staff: '성', soprano: 'S', alto: 'A', tenor: 'T', bass: 'B' };
            const getRoleCategory = (role) => {
                if (!role) return 4;
                const r = role.trim();
                if (['팀장','총무','회계'].includes(r)) return 1;
                if (r === '파트장') return 2;
                return 3;
            };
            // 팀장>총무>회계 고정 순서
            const LEAD_ORDER = ['팀장','총무','회계'];
            const officerGroups = (() => {
                const officers = filtered;
                const partOrder = ['soprano','alto','tenor','bass'];
                const staffGroup = {
                    id: 'staff_off', name: '성가사 · 반주자', color: '#193278', light: '#eff6ff',
                    members: officers.filter(m => m.part === 'staff'),
                };
                const leadGroup = {
                    id: 'lead', name: '팀장 · 총무 · 회계', color: '#7c3aed', light: '#f5f3ff',
                    members: [...officers.filter(m => m.part !== 'staff' && getRoleCategory(m.role) === 1)]
                        .sort((a, b) => {
                            const ai = LEAD_ORDER.indexOf(a.role.trim());
                            const bi = LEAD_ORDER.indexOf(b.role.trim());
                            return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
                        }),
                };
                const partLeaderGroup = {
                    id: 'partleader', name: '파트장', color: '#0ea5e9', light: '#f0f9ff',
                    members: [...officers.filter(m => m.part !== 'staff' && getRoleCategory(m.role) === 2)]
                        .sort((a, b) => partOrder.indexOf(a.part) - partOrder.indexOf(b.part)),
                    showPartAbbr: true,
                };
                // 담당부장: 같은 직책끼리 묶어서 정렬
                const etcGroup = {
                    id: 'etc', name: '담당부장', color: '#f59e0b', light: '#fffbeb',
                    members: [...officers.filter(m => m.part !== 'staff' && getRoleCategory(m.role) === 3)]
                        .sort((a, b) => (a.role || '').localeCompare(b.role || '', 'ko')),
                };
                return [staffGroup, leadGroup, partLeaderGroup, etcGroup].filter(g => g.members.length > 0);
            })();

            // 레벨2 탭별 카운트
            const partCounts = partTabs.reduce((acc, p) => {
                if (p.id === 'all')          acc[p.id] = byStatus.length;
                else if (p.id === 'officer') acc[p.id] = byStatus.filter(m => m.role && m.role.trim()).length;
                else                          acc[p.id] = byStatus.filter(m => m.part === p.id).length;
                return acc;
            }, {});

            const [selfPhotoMember, setSelfPhotoMember] = useState(null); // 비관리자 본인 사진 수정용

            const handleSelfPhotoSave = async (memberName, file) => {
                try {
                    let photoUrl;
                    try { photoUrl = await uploadToCloudinary(file, 'grace/members'); }
                    catch(e) { photoUrl = await compressImage(file, 400, 400, 0.85); }
                    const { db, doc, setDoc, getDoc } = window.MyFirebase;
                    const snap = await getDoc(doc(db, 'roster', 'current'));
                    const latest = snap.exists() ? (snap.data().list || []) : [];
                    const newList = latest.map(m => m.name === memberName ? { ...m, photo: photoUrl } : m);
                    await setDoc(doc(db, 'roster', 'current'), { list: newList });
                    showToast("사진이 업데이트되었습니다.");
                    setSelfPhotoMember(null);
                } catch(e) { showToast("업로드에 실패했습니다."); }
            };

            // 칩 컴포넌트 — 높이 통일, 왕관 제거, 직책은 하단 고정 공간
            const MemberChip = ({ m, showPartAbbr }) => {
                const hasRole = m.role && m.role.trim();
                const statusDots = { active: '#22c55e', short_absence: '#eab308', sabbatical: '#9ca3af' };
                const dot = statusDots[statusNorm(m)] || '#9ca3af';
                let pi = PART_ICON[m.part] || null;
                if (m.part === 'staff' && pi) pi = { ...pi, abbr: m.role === '반주자' ? '반' : '성' };
                return (
                    <button
                        onClick={() => {
                            if (localAdmin) {
                                setEditingMember(m);
                                onOpenEditModal({ member: m, onSave: (form) => handleSaveMember(form, m.name), onDelete: () => handleDeleteMember(m.name), onClose: () => setEditingMember(null) });
                            } else {
                                setSelfPhotoMember(m);
                            }
                        }}
                        className={`relative flex flex-col items-center justify-center px-1.5 bg-white border rounded-2xl transition-all text-center w-full active:scale-95 cursor-pointer hover:shadow-sm`}
                        style={{ borderColor: hasRole ? '#ede9fe' : '#f1f5f9', height: '72px', boxSizing: 'border-box' }}
                    >
                        <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: dot }}></span>
                        {m.photo ? (
                            <>
                                <img src={m.photo} className="w-9 h-9 rounded-full object-cover border-2 border-gray-100 shadow-sm mb-0.5" />
                                <span className="font-bold text-gray-800 text-xs leading-tight">{m.name}</span>
                            </>
                        ) : (
                            <div className="flex items-center justify-center gap-1 mb-0.5">
                                {pi && (
                                    <span className="inline-flex items-center justify-center w-5 h-5 rounded font-black shrink-0"
                                        style={{ backgroundColor: pi.light, color: pi.color, fontSize: '10px', border: `1.5px solid ${pi.color}26` }}>{pi.abbr}</span>
                                )}
                                <span className="font-bold text-gray-800 text-sm leading-tight">{m.name}</span>
                            </div>
                        )}
                        {/* 고정 높이 div — 직책 유무 관계없이 동일 공간 확보 */}
                        <div className="h-[18px] flex items-center justify-center">
                            {hasRole && (
                                <span className="text-[10px] font-black px-1.5 py-0.5 rounded-full leading-none bg-purple-50 text-purple-600">
                                    {m.role}
                                </span>
                            )}
                        </div>
                    </button>
                );
            };

            const isSearching = searchQuery.trim().length > 0;
            const searchResults = isSearching
                ? members.filter(m => m && m.name && m.name.includes(searchQuery.trim()))
                : [];

            return (
                <div className="space-y-4 fade-in text-left">
                    {/* 헤더 */}
                    <div className="flex items-end justify-between">
                        <div>
                            <h2 className="text-2xl font-black text-gray-800">찬양팀명단</h2>
                            <p className="text-xs text-gray-400 font-bold mt-0.5">등록팀원 총 {members.length}명</p>
                        </div>
                        <div className="flex gap-2 items-center">
                            {localAdmin ? (
                                <>
                                    <button onClick={() => setShowSettingsModal(true)}
                                        className="p-3 rounded-2xl transition-colors bg-gray-100 text-gray-400 hover:bg-gray-200 active:scale-95">
                                        <LucideIcon name="settings" className="w-5 h-5" />
                                    </button>
                                    <button onClick={() => { setEditingMember(false); onOpenEditModal({ member: null, onSave: (form) => handleSaveMember(form, null), onDelete: null, onClose: () => setEditingMember(null) }); }}
                                        className="flex items-center gap-2 bg-[#193278] text-white px-4 py-3 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-transform">
                                        <LucideIcon name="user-plus" className="w-4 h-4" /> 팀원 추가
                                    </button>
                                </>
                            ) : (
                                <button onClick={() => setShowAdminModal(true)}
                                    className="flex items-center gap-2 bg-gray-100 text-gray-500 px-4 py-3 rounded-2xl font-black text-sm active:scale-95 transition-transform hover:bg-blue-50 hover:text-[#193278]">
                                    <LucideIcon name="shield" className="w-4 h-4" /> 관리자 모드
                                </button>
                            )}
                        </div>
                    </div>

                    {/* 이름 검색 */}
                    <div className="relative w-full">
                        <input
                            type="text"
                            placeholder="팀원 이름 검색"
                            value={searchQuery}
                            onChange={e => setSearchQuery(e.target.value)}
                            className="w-full bg-white border border-gray-100 p-4 pl-12 rounded-2xl font-bold shadow-sm outline-none focus:ring-2 focus:ring-blue-500 text-left"
                        />
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">
                            <LucideIcon name="search" className="w-5 h-5" />
                        </div>
                        {isSearching && (
                            <button onClick={() => setSearchQuery('')}
                                className="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 bg-gray-200 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-300 transition-colors">
                                <LucideIcon name="x" className="w-3 h-3" />
                            </button>
                        )}
                    </div>

                    {/* 생일 배너 (C안 디자인 + B안 위치) */}
                    {!isSearching && (
                        <button onClick={onOpenBdCalendar} className="w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl border border-pink-200 bg-gradient-to-r from-pink-50 to-[#fdf2f8] active:scale-95 transition-all shadow-sm">
                            <span className="text-xl leading-none shrink-0">🎂</span>
                            <span className="text-sm font-bold text-[#db2777] flex-1 text-left">{new Date().getMonth()+1}월 생일 팀원</span>
                            <span className="text-base font-black text-[#db2777] shrink-0">
                                {thisMonthBdCount > 0 ? `${thisMonthBdCount}명` : <span className="text-pink-300 font-medium text-sm">없음</span>}
                            </span>
                            <div className="w-7 h-7 rounded-full bg-white border border-pink-200 flex items-center justify-center shrink-0">
                                <LucideIcon name="chevron-right" className="w-3.5 h-3.5 text-pink-400" />
                            </div>
                        </button>
                    )}

                    {/* 검색 결과 */}
                    {isSearching ? (
                        <div>
                            <p className="text-xs font-bold text-gray-400 mb-3">"{searchQuery}" 검색결과 {searchResults.length}명</p>
                            {searchResults.length === 0 ? (
                                <div className="text-center py-10 text-gray-300">
                                    <LucideIcon name="search" className="w-10 h-10 mx-auto mb-2 opacity-30" />
                                    <p className="font-bold text-sm">검색 결과가 없습니다.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-4 sm:grid-cols-5 gap-2">
                                    {searchResults.map(m => <MemberChip key={m.name} m={m} />)}
                                </div>
                            )}
                        </div>
                    ) : (
                        <>
                            {/* C안 현황 카드 */}
                            <div className="flex gap-2">
                                {STATUS_OPTIONS.map(s => {
                                    const isActive = statusFilter === s.id;
                                    return (
                                        <button key={s.id}
                                            onClick={() => { setStatusFilter(s.id); setPartFilter('all'); }}
                                            className="flex-1 py-3 px-2 rounded-2xl text-xs font-black transition-all flex flex-col items-center gap-1.5 border"
                                            style={isActive
                                                ? { backgroundColor: s.light, borderColor: s.dot + '40', boxShadow: `0 4px 14px ${s.dot}25` }
                                                : { backgroundColor: '#fff', borderColor: '#f1f5f9', boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
                                            <span className="font-black leading-none" style={{ fontSize: 26, color: isActive ? s.dot : '#d1d5db' }}>
                                                {counts[s.id]}
                                            </span>
                                            <div className="flex items-center gap-1.5">
                                                <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ backgroundColor: isActive ? s.dot : '#e2e8f0' }}></span>
                                                <span style={{ color: isActive ? s.text : '#9ca3af' }}>{s.label}</span>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>

                            {/* 파트 필터 — 2줄 flex-wrap */}
                            <div className="flex flex-wrap gap-2">
                                {partTabs.map(p => {
                                    const sel = partFilter === p.id;
                                    const sc = STATUS_OPTIONS.find(s => s.id === statusFilter);
                                    const activeColor = sc?.dot || '#193278';
                                    const activeBg = sc?.light || '#eff6ff';
                                    return (
                                        <button key={p.id}
                                            onClick={() => setPartFilter(p.id)}
                                            className="px-3 py-1.5 rounded-xl text-xs font-black transition-all border-2 flex items-center gap-1 whitespace-nowrap"
                                            style={sel
                                                ? { backgroundColor: activeBg, borderColor: activeColor + '80', color: activeColor }
                                                : { backgroundColor: '#fff', borderColor: '#e5e7eb', color: '#64748b' }}>
                                            {p.id === 'officer' ? '임원진' : p.name}
                                            <span className="text-[10px] font-black ml-0.5" style={{ opacity: sel ? 0.7 : 1, color: sel ? activeColor : '#9ca3af' }}>
                                                {partCounts[p.id]}
                                            </span>
                                        </button>
                                    );
                                })}
                            </div>

                            {/* 멤버 칩 그리드 */}
                            {(partFilter === 'officer' ? officerGroups : grouped).length === 0 ? (
                                <div className="text-center py-14 text-gray-300">
                                    <LucideIcon name="users" className="w-12 h-12 mx-auto mb-3 opacity-30" />
                                    <p className="font-bold text-sm">해당 팀원이 없습니다.</p>
                                </div>
                            ) : (
                                <div className="space-y-5">
                                    {(partFilter === 'officer' ? officerGroups : grouped).map(group => (
                                        <div key={group.id}>
                                            <div className="flex items-center gap-2 mb-2 px-0.5">
                                                <span className="w-1 h-5 rounded-full shrink-0" style={{backgroundColor: group.color}}></span>
                                                <span className="text-xs font-black text-gray-600">{group.name}</span>
                                                <span className="text-[10px] font-black px-2 py-0.5 rounded-full" style={{backgroundColor: group.light || '#f1f5f9', color: group.color}}>
                                                    {group.members.length}명
                                                </span>
                                            </div>
                                            <div className="grid grid-cols-4 sm:grid-cols-5 gap-2">
                                                {group.members.map(m => <MemberChip key={m.name} m={m} showPartAbbr={group.showPartAbbr} />)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* 범례 */}
                            <div className="flex items-center gap-4 px-0.5 pt-1 pb-2 border-t border-gray-50">
                                <span className="text-[10px] font-bold text-gray-300">상태 표시</span>
                                {[['#22c55e','활동중'],['#eab308','단기부재'],['#9ca3af','안식중']].map(([c,l]) => (
                                    <span key={l} className="flex items-center gap-1 text-[10px] font-bold text-gray-400">
                                        <span className="w-2 h-2 rounded-full" style={{backgroundColor:c}}></span>{l}
                                    </span>
                                ))}
                            </div>
                        </>
                    )}

                    {/* 설정 모달 */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[400] flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-white w-full sm:max-w-md rounded-t-[32px] sm:rounded-[32px] shadow-2xl scale-in flex flex-col max-h-[90vh]">
                                <div className="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100 shrink-0">
                                    <div className="flex items-center gap-2">
                                        <LucideIcon name="settings" className="w-5 h-5 text-[#193278]" />
                                        <h3 className="font-black text-gray-800 text-lg">시스템 설정</h3>
                                    </div>
                                    <button onClick={() => setShowSettingsModal(false)} className="p-2 text-gray-300 hover:text-gray-600"><LucideIcon name="x" className="w-6 h-6" /></button>
                                </div>
                                <div className="overflow-y-auto hide-scrollbar p-6 space-y-6">
                                    {/* 비밀번호 변경 */}
                                    <div>
                                        <div className="flex items-center justify-between mb-3">
                                            <div>
                                                <p className="text-sm font-bold text-gray-800">매니저 비밀번호 변경</p>
                                                <p className="text-xs text-gray-400">인증용 비밀번호를 변경합니다.</p>
                                            </div>
                                            <button onClick={() => setShowPwdSetting(!showPwdSetting)} className="px-4 py-2 bg-gray-50 text-gray-500 rounded-xl text-xs font-black hover:bg-gray-100 transition-colors">
                                                {showPwdSetting ? "숨기기" : "변경하기"}
                                            </button>
                                        </div>
                                        {showPwdSetting && (
                                            <div className="space-y-3 scale-in">
                                                <input type="password" placeholder="현재 비밀번호" className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none text-center" value={pwdForm.current} onChange={e=>setPwdForm({...pwdForm, current:e.target.value})} />
                                                <input type="password" placeholder="새 비밀번호" className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none text-center" value={pwdForm.next} onChange={e=>setPwdForm({...pwdForm, next:e.target.value})} />
                                                <input type="password" placeholder="새 비밀번호 확인" className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none text-center" value={pwdForm.confirm} onChange={e=>setPwdForm({...pwdForm, confirm:e.target.value})} />
                                                <button onClick={handleUpdatePassword} className="w-full py-3 bg-[#193278] text-white rounded-xl font-black text-sm shadow-md active:scale-95 transition-transform">비밀번호 저장</button>
                                            </div>
                                        )}
                                    </div>
                                    {/* Gemini API */}
                                    <div className="border-t border-gray-100 pt-6">
                                        <p className="text-sm font-bold text-gray-800 mb-1">AI 출석 인식 (Gemini API)</p>
                                        <p className="text-xs text-blue-500 font-bold mb-3">★ 구글 AI Studio에서 발급받은 API 키를 입력하세요.</p>
                                        <div className="space-y-3">
                                            <input type="password" placeholder="Gemini API Key" className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none text-center" value={apiForm} onChange={e=>setApiForm(e.target.value)} />
                                            <button onClick={() => { onSaveGeminiKey(apiForm); showToast("저장되었습니다."); }} className="w-full py-3 bg-[#193278] text-white rounded-xl font-black text-sm shadow-md active:scale-95 transition-transform">API 키 저장</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 관리자 모드 진입 모달 */}
                    {showAdminModal && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-[500] flex items-center justify-center p-5 text-center">
                            <div className={`bg-white p-8 rounded-[32px] w-full max-sm:max-w-xs max-w-sm scale-in text-center shadow-2xl ${adminPwError ? 'shake' : ''}`}>
                                <h3 className="text-xl font-black text-gray-800 mb-2">관리자 인증</h3>
                                <p className="text-sm text-gray-400 mb-6">보안을 위해 비밀번호가 필요합니다.</p>
                                <div className="relative mb-4">
                                    <input type="password" autoFocus
                                        className={`w-full bg-gray-50 border-2 p-4 rounded-2xl font-bold text-center tracking-widest outline-none transition-all ${adminPwError ? 'border-red-400' : 'border-transparent focus:ring-2 focus:ring-blue-500'}`}
                                        placeholder="Password"
                                        value={adminPwInput}
                                        onChange={e => { setAdminPwInput(e.target.value); setAdminPwError(false); }}
                                        onKeyDown={e => e.key === 'Enter' && handleLocalAdminLogin()}
                                    />
                                    {adminPwError && <p className="text-red-500 text-[10px] font-bold mt-2 animate-bounce">비밀번호가 올바르지 않습니다.</p>}
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { setShowAdminModal(false); setAdminPwInput(''); setAdminPwError(false); }} className="flex-1 py-4 font-bold text-gray-400 active:scale-95 transition-transform">취소</button>
                                    <button onClick={handleLocalAdminLogin} className="flex-[2] py-4 bg-[#193278] text-white rounded-2xl font-black shadow-lg active:scale-95 transition-transform">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 비관리자 본인 사진 수정 모달 */}
                    {selfPhotoMember && (
                        <SelfPhotoModal
                            member={selfPhotoMember}
                            onClose={() => setSelfPhotoMember(null)}
                            onSave={handleSelfPhotoSave}
                        />
                    )}
                </div>
            );
        };

        const AttendanceView = ({ members, onCancel, requestAuth, showToast, geminiApiKey }) => {
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [attendanceMap, setAttendanceMap] = useState({});
            const [previewImage, setPreviewImage] = useState(null);
            const [ocrStatus, setOcrStatus] = useState("idle");
            const [ocrProgress, setOcrProgress] = useState(0);
            const activeMembers = members.filter(m => m && m.status === 'active');
            const fileInputRef = useRef(null);

            const [imageFile, setImageFile] = useState(null);

            const handleImageUpload = async (e) => {
                const file = e.target.files[0]; 
                if (!file) return;
                try {
                    const compressed = await compressImage(file);
                    setPreviewImage(compressed);
                    setImageFile(file);
                } catch (err) { 
                    showToast("이미지 업로드에 실패했습니다.");
                } finally { 
                    if (fileInputRef.current) fileInputRef.current.value = ""; 
                }
            };

            const handleRunAI = async () => {
                if (!previewImage) return showToast("먼저 참석 명단 사진 영역을 눌러 업로드해주세요.");

                setOcrStatus("processing"); setOcrProgress(30);
                try {
                    const cropped = await cropImageForOCR(previewImage, 0.0, 1.0);
                    setOcrProgress(50);
                    const extractedText = await recognizeNamesWithGemini(cropped, geminiApiKey, (attempt, waitSec) => {
                        setOcrProgress(20);
                        showToast(`서버 혼잡 — ${waitSec}초 후 재시도 중... (${attempt}/3)`);
                    });
                    setOcrProgress(100);

                    const cleanText = extractedText.replace(/\s+/g, '');
                    const newMap = { ...attendanceMap };
                    activeMembers.forEach(m => {
                        if (cleanText.includes(m.name)) newMap[m.name] = true;
                    });
                    setAttendanceMap(newMap);
                    setOcrStatus("success");
                    showToast("AI 이름 인식이 완료되었습니다.");
                } catch (err) {
                    setOcrStatus("idle");
                    console.error("OCR Error:", err);
                    const isBusy = (err.message || '').toLowerCase().includes('demand') ||
                                   (err.message || '').toLowerCase().includes('overload') ||
                                   (err.message || '').toLowerCase().includes('503');
                    showToast(isBusy ? "서버가 혼잡합니다. 잠시 후 다시 눌러주세요." : "인식 실패: " + err.message);
                }
            };

            const togglePart = (partId) => {
                const partMembers = activeMembers.filter(m => m.part === partId);
                const allSelected = partMembers.every(m => attendanceMap[m.name]);
                const next = { ...attendanceMap };
                if (allSelected) partMembers.forEach(m => delete next[m.name]);
                else partMembers.forEach(m => next[m.name] = true);
                setAttendanceMap(next);
            };

            const handleSave = () => {
                requestAuth(async () => {
                    const { db, collection, addDoc } = window.MyFirebase;
                    const dateStr = date.replace(/-/g, '. ') + '.';
                    const selectedNames = Object.keys(attendanceMap);
                    let finalImage = previewImage;
                    if (imageFile) {
                        try { finalImage = await uploadToCloudinary(imageFile, 'grace/attendance'); }
                        catch(e) { console.warn('Cloudinary 실패, base64 폴백:', e.message); }
                    }
                    await addDoc(collection(db, 'history'), { 
                        date: dateStr, count: selectedNames.length, members: selectedNames, image: finalImage, updatedAt: new Date().toISOString() 
                    });
                    showToast("기록 저장 완료"); onCancel();
                });
            };

            return (
                <div className="fade-in pb-32 text-left">
                    {/* ── 상단 헤더 ── */}
                    <div className="flex items-center gap-3 mb-6 px-1">
                        <button onClick={onCancel} className="p-2 rounded-xl bg-white border border-gray-100 text-gray-400 shadow-sm transition-transform active:scale-90">
                            <LucideIcon name="chevron-left" className="w-5 h-5" />
                        </button>
                        <div className="flex-1">
                            <h2 className="text-xl font-black text-gray-800">새 출석 기록</h2>
                            <p className="text-xs text-gray-400 font-bold mt-0.5">출석 팀원을 선택하세요</p>
                        </div>
                        <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="header-date-input" />
                    </div>

                    {/* ── AI 출석 인식 섹션 ── */}
                    <div className="bg-gradient-to-br from-[#193278] to-[#2a4a9f] rounded-[28px] p-5 mb-5 shadow-lg">
                        <div className="flex items-center gap-2 mb-4">
                            <div className="w-8 h-8 bg-white/20 rounded-xl flex items-center justify-center">
                                <LucideIcon name="sparkles" className="w-4 h-4 text-white" />
                            </div>
                            <div>
                                <p className="font-black text-white text-sm">AI 자동 출석 인식</p>
                                <p className="text-white/60 text-[10px] font-bold">명단 사진 업로드 → AI가 이름 인식</p>
                            </div>
                        </div>

                        {/* 이미지 업로드 존 */}
                        <div className={`relative rounded-2xl overflow-hidden mb-3 transition-all ${previewImage ? 'bg-black/20' : 'bg-white/10 border-2 border-dashed border-white/30'} min-h-[120px] flex items-center justify-center cursor-pointer`}>
                            {previewImage ? (
                                <div className="w-full relative">
                                    <img src={previewImage} className="w-full max-h-44 object-contain" />
                                    {ocrStatus === "processing" && (
                                        <div className="absolute inset-0 bg-[#193278]/80 backdrop-blur-sm flex flex-col items-center justify-center">
                                            <div className="w-36 bg-white/20 h-1.5 rounded-full mb-2 overflow-hidden">
                                                <div className="bg-white h-full progress-bar-fill rounded-full" style={{ width: `${ocrProgress}%` }}></div>
                                            </div>
                                            <p className="text-white font-black text-xs animate-pulse">AI 인식 중... {ocrProgress}%</p>
                                        </div>
                                    )}
                                    {ocrStatus !== "processing" && (
                                        <button onClick={(e) => { e.stopPropagation(); setPreviewImage(null); setImageFile(null); }}
                                            className="absolute top-2 right-2 w-7 h-7 bg-black/50 rounded-full flex items-center justify-center text-white/80 hover:text-white transition-colors">
                                            <LucideIcon name="x" className="w-3.5 h-3.5" />
                                        </button>
                                    )}
                                </div>
                            ) : (
                                <div className="flex flex-col items-center py-6 text-center">
                                    <LucideIcon name="image-plus" className="w-8 h-8 text-white/50 mb-2" />
                                    <p className="text-white/70 text-xs font-bold">여기를 눌러 명단 사진 업로드</p>
                                </div>
                            )}
                            <input ref={fileInputRef} type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleImageUpload} disabled={ocrStatus === "processing"} />
                        </div>

                        <button onClick={handleRunAI} disabled={ocrStatus === 'processing' || !previewImage}
                            className="w-full bg-white text-[#193278] py-3 rounded-2xl font-black transition-transform active:scale-95 flex justify-center items-center gap-2 disabled:opacity-40 shadow-sm">
                            {ocrStatus === 'processing'
                                ? <><div className="w-4 h-4 border-2 border-[#193278] border-t-transparent rounded-full animate-spin"></div> 인식 중...</>
                                : ocrStatus === 'success'
                                    ? <><LucideIcon name="check-circle" className="w-4 h-4 text-green-600" /><span className="text-green-600">인식 완료 — 다시 실행</span></>
                                    : <><LucideIcon name="sparkles" className="w-4 h-4" /> AI 자동 출석 체크</>
                            }
                        </button>
                    </div>

                    {/* ── 팀원 체크 섹션 ── */}
                    <div className="bg-white rounded-[28px] shadow-sm border border-gray-50 overflow-hidden">
                        {/* 전체 출석 카운터 헤더 */}
                        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-50">
                            <span className="font-black text-gray-800 text-sm">팀원 출석 체크</span>
                            <div className="flex items-center gap-2">
                                <span className="text-2xl font-black text-[#193278]">{Object.keys(attendanceMap).length}</span>
                                <span className="text-sm text-gray-300 font-bold">/ {activeMembers.length}명</span>
                            </div>
                        </div>

                        <div className="p-5 space-y-7">
                            {['staff', ...PARTS.map(p=>p.id)].map(partId => {
                                const list = activeMembers.filter(m => m.part === partId);
                                if (list.length === 0) return null;
                                const checkedCount = list.filter(m => attendanceMap[m.name]).length;
                                const partObj = PARTS.find(p => p.id === partId);
                                const partColor = partId === 'staff' ? '#193278' : (partObj?.color || '#ccc');
                                const partName = partId === 'staff' ? '성가사 · 반주자' : (partObj?.name || '');
                                const rate = Math.round(checkedCount / list.length * 100);

                                return (
                                    <div key={partId}>
                                        {/* 파트 헤더 */}
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="w-1.5 h-5 rounded-full shrink-0" style={{backgroundColor: partColor}}></span>
                                            <span className="font-black text-sm text-gray-700 flex-1">{partName}</span>
                                            <span className="text-xs font-black px-2 py-0.5 rounded-full text-white" style={{backgroundColor: partColor}}>{checkedCount}/{list.length}</span>
                                            <button onClick={() => togglePart(partId)}
                                                className="text-[10px] font-black px-2.5 py-1 rounded-full border transition-colors"
                                                style={checkedCount === list.length
                                                    ? {color: partColor, borderColor: partColor, backgroundColor: partColor + '15'}
                                                    : {color: '#9ca3af', borderColor: '#e5e7eb'}}>
                                                {checkedCount === list.length ? '전체해제' : '전체선택'}
                                            </button>
                                        </div>
                                        {/* 파트 진행률 바 */}
                                        <div className="w-full bg-gray-100 rounded-full h-1 mb-3 overflow-hidden">
                                            <div className="h-1 rounded-full transition-all duration-500" style={{width: `${rate}%`, backgroundColor: partColor}}></div>
                                        </div>
                                        {/* 팀원 그리드 */}
                                        <div className="grid grid-cols-4 gap-1.5">
                                            {list.map(m => {
                                                const pi_a = (() => { let p = PART_ICON[m.part] || null; if (m.part==='staff' && p) p={...p, abbr: m.role==='반주자'?'반':'성'}; return p; })();
                                                const checked = !!attendanceMap[m.name];
                                                const btnColor = pi_a?.color || partColor;
                                                const btnLight = pi_a?.light || partColor + '18';
                                                return (
                                                    <button key={m.name}
                                                        onClick={() => { const n = {...attendanceMap}; if(n[m.name]) delete n[m.name]; else n[m.name]=true; setAttendanceMap(n); }}
                                                        className="px-2 py-2.5 rounded-xl border border-gray-100 transition-all flex items-center justify-center gap-1.5 active:scale-95"
                                                        style={{backgroundColor: checked ? btnLight : '#fff', minHeight: '40px'}}>
                                                        {pi_a && (
                                                            <span className="inline-flex items-center justify-center w-5 h-5 rounded font-black shrink-0"
                                                                style={{backgroundColor: btnLight, color: btnColor, fontSize:'10px', border: `1.5px solid ${btnColor}26`}}>
                                                                {pi_a.abbr}
                                                            </span>
                                                        )}
                                                        <span className={`text-xs font-bold whitespace-nowrap ${checked ? 'text-gray-800' : 'text-gray-500'}`}>{m.name}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* ── 저장 플로팅 바 ── */}
                    <div className="fixed bottom-20 md:bottom-6 left-0 right-0 px-4 z-40 max-w-4xl mx-auto">
                        <div className="bg-white/90 backdrop-blur-md border border-gray-100 rounded-[20px] shadow-2xl p-3 flex items-center gap-3">
                            <div className="flex-1 pl-2">
                                <p className="text-xs text-gray-400 font-bold">출석 인원</p>
                                <p className="font-black text-[#193278]">
                                    <span className="text-2xl">{Object.keys(attendanceMap).length}</span>
                                    <span className="text-sm text-gray-300 font-bold ml-1">/ {activeMembers.length}명</span>
                                </p>
                            </div>
                            <button onClick={handleSave}
                                className="flex-1 bg-[#193278] text-white py-4 rounded-2xl font-black shadow-lg transition-transform active:scale-95 text-center text-sm">
                                저장 완료
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [ready, setReady] = useState(false);
            const [activeTab, setActiveTab] = useState('music'); 
            const [members, setMembers] = useState([]);
            const [history, setHistory] = useState([]);
            const [songs, setSongs] = useState([]);
            const [videos, setVideos] = useState([]);
            const [showInterestModal, setShowInterestModal] = useState(false);
            const [showBdCalendar, setShowBdCalendar] = useState(false);
            const [showAttendStats, setShowAttendStats] = useState(false);
            const [showPersonalModal, setShowPersonalModal] = useState(false);
            const [editMemberConfig, setEditMemberConfig] = useState(null);
            const [editingHistory, setEditingHistory] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [user, setUser] = useState(null);
            const [masterPassword, setMasterPassword] = useState("onnurigrace");
            const [geminiApiKey, setGeminiApiKey] = useState('');
            const [isNavVisible, setIsNavVisible] = useState(true);
            const lastScrollY = useRef(0);

            const [toast, setToast] = useState({ show: false, msg: '' });
            const [authModal, setAuthModal] = useState({ isOpen: false, onConfirm: null });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', msg: '', onConfirm: null });

            useEffect(() => {
                const waitFirebase = setInterval(() => { 
                    if (window.FB_READY && window.MyFirebase) { 
                        clearInterval(waitFirebase); initApp(); 
                    } 
                }, 100);
                // 10초 내 Firebase 미연결 시 강제 로드
                const fallback = setTimeout(() => { clearInterval(waitFirebase); setReady(true); }, 10000);
                return () => { clearInterval(waitFirebase); clearTimeout(fallback); };
            }, []);

            const initApp = async () => {
                const { auth, db, doc, collection, onSnapshot, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.MyFirebase;
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await signInWithCustomToken(auth, __initial_auth_token); } catch (e) { await signInAnonymously(auth); }
                    } else { await signInAnonymously(auth); }

                    onAuthStateChanged(auth, (u) => {
                        try {
                        setUser(u);
                        if (u) {
                            onSnapshot(doc(db, 'settings', 'admin'), (s) => {
                                if (s.exists()) {
                                    if (s.data().password) setMasterPassword(s.data().password);
                                    if (s.data().geminiKey) setGeminiApiKey(s.data().geminiKey);
                                }
                            });
                            
                            onSnapshot(doc(db, 'roster', 'current'), (s) => s.exists() && setMembers(s.data().list));
                            onSnapshot(collection(db, 'history'), (s) => {
                                const list = []; s.forEach(d => list.push({ id: d.id, ...d.data() }));
                                list.sort((a, b) => new Date(b.date.replace(/\. /g, '-').replace(/\.$/, '')) - new Date(a.date.replace(/\. /g, '-').replace(/\.$/, '')));
                                setHistory(list);
                            });
                            onSnapshot(collection(db, 'music'), (s) => {
                                const list = []; s.forEach(d => list.push({ id: d.id, ...d.data() }));
                                list.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
                                setSongs(list);
                            });
                            onSnapshot(collection(db, 'videos'), (s) => {
                                const list = []; s.forEach(d => list.push({ id: d.id, ...d.data() }));
                                list.sort((a, b) => {
                                    const dateCmp = (b.date || '').localeCompare(a.date || '');
                                    if (dateCmp !== 0) return dateCmp;
                                    // 동일 날짜: 알파벳 → 숫자 → 기호 순 (기호 최하단)
                                    const typeOf = s => {
                                        const c = (s || '')[0];
                                        if (!c) return 3;
                                        if (/[a-zA-Z가-힣]/.test(c)) return 0;
                                        if (/[0-9]/.test(c)) return 1;
                                        return 2;
                                    };
                                    const ta = typeOf(a.title), tb = typeOf(b.title);
                                    if (ta !== tb) return ta - tb;
                                    return (b.title || '').localeCompare(a.title || '', 'ko');
                                });
                                setVideos(list);
                            });
                            setReady(true);
                        }
                        } catch(err) { console.error('onAuthStateChanged error:', err); setReady(true); }
                    });
                } catch (e) { console.error('initApp error:', e); setReady(true); }
            };

            const showToast = (msg) => { setToast({ show: true, msg }); setTimeout(() => setToast({ show: false, msg: '' }), 3000); };
            const requestAuth = (callback) => { if (isAdmin) { callback(); } else { setAuthModal({ isOpen: true, onConfirm: callback }); } };
            const askConfirm = (title, msg, onConfirm) => setConfirmModal({ isOpen: true, title, msg, onConfirm });
            
            const handleShare = () => {
                const dummy = document.createElement("textarea"); dummy.value = SHARE_LINK; document.body.appendChild(dummy); dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy);
                showToast("공유 링크가 복사되었습니다!");
            };
            
            const handleTabChange = (id) => { 
                setIsNavVisible(true);
                setActiveTab(id);
            };
            
            const handleSaveGeminiKey = async (key) => {
                const cleanKey = key.trim();
                const { db, doc, setDoc } = window.MyFirebase;
                await setDoc(doc(db, 'settings', 'admin'), { geminiKey: cleanKey }, { merge: true });
                setGeminiApiKey(cleanKey);
                showToast("API 키가 서버에 저장되었습니다.");
            };

            const handleScroll = (e) => {
                const currentScrollY = e.target.scrollTop;
                if (currentScrollY <= 0) {
                    setIsNavVisible(true);
                    lastScrollY.current = currentScrollY;
                    return;
                }
                if (currentScrollY > lastScrollY.current + 10) {
                    setIsNavVisible(false);
                } else if (currentScrollY < lastScrollY.current - 10) {
                    setIsNavVisible(true);
                }
                lastScrollY.current = currentScrollY;
            };

            const sortedMembers = useMemo(() => {
                const safeMembers = members || [];
                return [...safeMembers].sort((a, b) => {
                    if (a && a.name === "박용규") return -1;
                    if (b && b.name === "박용규") return 1;
                    if (a && b && a.name && b.name) return a.name.localeCompare(b.name, 'ko');
                    return 0;
                });
            }, [members]);

            if (!ready) return <div className="h-screen flex items-center justify-center bg-[#f8faff] text-center text-center text-center text-center"><div className="w-10 h-10 border-4 border-blue-100 border-t-[#193278] rounded-full animate-spin"></div></div>;

            return (
                <div className="flex h-screen bg-[#f8faff] overflow-hidden text-left w-full text-left">
                    <aside className="hidden md:flex flex-col w-64 bg-white border-r border-gray-100 p-6 z-10 shrink-0 text-left text-left text-left text-left">
                        <div className="mb-10 flex items-center gap-3 text-left text-left text-left text-left">
                            <AppLogo className="w-10 h-10 text-left text-left text-left text-left" />
                            <div className="text-left text-left text-left text-left min-w-0">
                                <h1 onClick={() => setActiveTab('music')} className="text-lg font-black text-[#193278] tracking-tight cursor-pointer hover:opacity-80 transition-opacity whitespace-nowrap">주은혜 찬양사역팀</h1>
                                <div className="text-[10px] mt-0.5 text-gray-400 font-bold uppercase tracking-widest flex items-center gap-1 text-left text-left">
                                    <span className={`w-2 h-2 rounded-full text-left text-left text-left text-left ${isAdmin ? 'bg-blue-500 animate-pulse' : 'bg-green-500'}`}></span> 
                                    {isAdmin ? '관리자 모드' : '온라인'}
                                </div>
                            </div>
                        </div>
                        <nav className="flex-1 space-y-2 text-left text-left text-left">
                            <NavBtn id="music" label="성가음원" icon="music-2" active={activeTab === 'music'} onClick={handleTabChange} />
                            <NavBtn id="videos" label="찬양영상" icon="play-circle" active={activeTab === 'videos'} onClick={handleTabChange} />
                            <NavBtn id="stats" label="출석현황" icon="bar-chart-2" active={activeTab === 'stats' || activeTab === 'attendance'} onClick={handleTabChange} />
                            <div className="pt-6 pb-2 text-[10px] font-black text-gray-300 uppercase tracking-widest px-4 text-left text-left text-left">매니저 영역</div>
                            <NavBtn id="manage" label="찬양팀명단" icon="user-round" active={activeTab === 'manage'} onClick={handleTabChange} />
                        </nav>
                        <div className="mt-auto space-y-2 text-left text-left text-left text-left">
                            <button onClick={handleShare} className="w-full flex items-center justify-center gap-2 py-3 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold active:scale-95 transition-all text-center"><LucideIcon name="share-2" className="w-3.5 h-3.5 mr-2" /> 링크 공유</button>
                            {isAdmin && (
                                <button onClick={() => window.location.reload()} className="w-full flex items-center justify-center gap-2 py-3 bg-red-50 text-red-600 rounded-xl text-xs font-bold active:scale-95 transition-all text-center">
                                    <LucideIcon name="log-out" className="w-3.5 h-3.5 mr-2" /> 관리 세션 종료
                                </button>
                            )}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-h-0 overflow-hidden relative bg-[#f8faff] text-left text-left text-left text-left">
                        <header className={`md:hidden absolute top-0 left-0 right-0 bg-white px-5 h-16 flex items-center justify-between border-b border-gray-100 shrink-0 z-30 transition-transform duration-300 ${isNavVisible ? 'translate-y-0' : '-translate-y-full'}`}>
                            <div onClick={() => setActiveTab('music')} className="flex items-center gap-2 cursor-pointer text-left text-left">
                                <AppLogo className="w-8 h-8 text-left text-left text-left text-left" />
                                <span className="font-black text-xl text-[#193278] text-left text-left text-left text-left">주은혜 찬양사역팀</span>
                            </div>
                            <div className="flex items-center gap-2 text-left text-left text-left text-left">
                                <button onClick={handleShare} className="p-2 text-blue-500 transition-transform active:scale-90" title="공유"><LucideIcon name="share-2" className="w-5 h-5 text-left text-left" /></button>
                                <button onClick={() => handleTabChange('manage')} className={`p-2 rounded-full transition-transform active:scale-90 text-left text-left ${activeTab === 'manage' ? 'text-blue-600 bg-blue-50' : 'text-gray-400'}`} title="찬양팀명단"><LucideIcon name="user-round" className="w-5 h-5 text-left text-left" /></button>
                                {isAdmin && (
                                    <button onClick={() => window.location.reload()} className="p-2 text-red-500 transition-transform active:scale-90 text-left text-left" title="세션 종료"><LucideIcon name="log-out" className="w-5 h-5 text-left text-left" /></button>
                                )}
                            </div>
                        </header>

                        <div className="flex-1 scroll-container p-4 pt-20 md:p-10 pb-32 md:pb-10 hide-scrollbar min-h-0 w-full overflow-x-hidden text-left text-left text-left text-left" onScroll={handleScroll}>
                            <div className="max-w-4xl mx-auto w-full text-left text-left text-left text-left">
                                {activeTab === 'stats' && <StatsView history={history} members={sortedMembers} onAddAttendance={() => requestAuth(() => setActiveTab('attendance'))} onOpenInterest={() => setShowInterestModal(true)} onOpenBdCalendar={() => setShowBdCalendar(true)} onOpenAttendStats={() => setShowAttendStats(true)} onOpenPersonal={() => setShowPersonalModal(true)} onDetail={(h) => setEditingHistory(h)} requestAuth={requestAuth} askConfirm={askConfirm} showToast={showToast} />}
                                {activeTab === 'music' && <MusicView songs={songs} requestAuth={requestAuth} askConfirm={askConfirm} showToast={showToast} isAdmin={isAdmin} geminiApiKey={geminiApiKey} />}
                                {activeTab === 'videos' && <VideoView videos={videos} requestAuth={requestAuth} askConfirm={askConfirm} showToast={showToast} isAdmin={isAdmin} />}
                                {activeTab === 'manage' && <ManageView members={sortedMembers} currentPassword={masterPassword} requestAuth={requestAuth} showToast={showToast} geminiApiKey={geminiApiKey} onSaveGeminiKey={handleSaveGeminiKey} isAdmin={isAdmin} onBecomeAdmin={() => { setIsAdmin(true); }} onOpenBdCalendar={() => setShowBdCalendar(true)} onOpenEditModal={(cfg) => setEditMemberConfig(cfg)} />}
                                {activeTab === 'attendance' && <AttendanceView members={sortedMembers} onCancel={() => setActiveTab('stats')} requestAuth={requestAuth} showToast={showToast} geminiApiKey={geminiApiKey} />}
                            </div>
                        </div>

                        <nav className={`md:hidden fixed bottom-0 left-0 right-0 h-20 bg-white border-t border-gray-100 flex items-center justify-around px-2 z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.03)] transition-transform duration-300 ${isNavVisible ? 'translate-y-0' : 'translate-y-full'}`}>
                            <NavIconBtn id="music" icon="music-2" label="음원" active={activeTab === 'music'} onClick={handleTabChange} />
                            <NavIconBtn id="videos" icon="play-circle" label="영상" active={activeTab === 'videos'} onClick={handleTabChange} />
                            <NavIconBtn id="stats" icon="bar-chart-2" label="출석" active={activeTab === 'stats' || activeTab === 'attendance'} onClick={handleTabChange} />
                        </nav>
                    </main>

                    {showInterestModal && <InterestModal members={sortedMembers} history={history} onClose={() => setShowInterestModal(false)} />}
                    {showBdCalendar && <BirthdayCalendarModal members={sortedMembers} onClose={() => setShowBdCalendar(false)} />}
                    {showAttendStats && <AttendStatsModal history={history} members={sortedMembers} memberPartMap={sortedMembers.reduce((acc,m)=>{if(m&&m.name)acc[m.name]=m.part;return acc;},{})} onClose={() => setShowAttendStats(false)} />}
                    {showPersonalModal && <PersonalAttendModal history={history} members={sortedMembers} onClose={() => setShowPersonalModal(false)} />}
                    {editMemberConfig && <MemberEditModal member={editMemberConfig.member} onClose={() => { setEditMemberConfig(null); editMemberConfig.onClose(); }} onSave={editMemberConfig.onSave} onDelete={editMemberConfig.onDelete} />}
                    {editingHistory && <HistoryDetailModal record={editingHistory} allMembers={sortedMembers} requestAuth={requestAuth} onClose={() => setEditingHistory(null)} geminiApiKey={geminiApiKey} onSave={async (updated) => { 
                        const { db, doc, setDoc } = window.MyFirebase;
                        await setDoc(doc(db, 'history', updated.id), updated);
                        showToast("수정되었습니다."); setEditingHistory(null);
                    }} onDelete={(id) => {
                        askConfirm("기록 삭제", "정말 삭제하시겠습니까?", async () => {
                            const { db, doc, deleteDoc } = window.MyFirebase;
                            await deleteDoc(doc(db, 'history', id)); showToast("삭제되었습니다."); setEditingHistory(null);
                        });
                    }} showToast={showToast} />}
                    {authModal.isOpen && <AuthModal correctPassword={masterPassword} onClose={() => setAuthModal({ ...authModal, isOpen: false })} onConfirm={() => { setIsAdmin(true); setAuthModal({ ...authModal, isOpen: false }); authModal.onConfirm(); }} />}
                    {confirmModal.isOpen && <ConfirmModal modal={confirmModal} onClose={() => setConfirmModal({ ...confirmModal, isOpen: false })} />}
                    {toast.show && <div className="fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold z-[300] shadow-xl animate-bounce text-center text-center text-left text-left text-left">{toast.msg}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
    </html>
