<!-- ① Firebase 동적 초기화 -->
<script type="module">
    const getConfig = () => {
        // URL 해시에서 설정 읽기 (순원 공유 URL)
        const hash = window.location.hash.slice(1);
        if (hash) {
            try {
                const cfg = JSON.parse(atob(decodeURIComponent(hash)));
                if (cfg && cfg.firebaseConfig && cfg.firebaseConfig.projectId) {
                    localStorage.setItem('soon-config', JSON.stringify(cfg));
                    history.replaceState(null, '', window.location.pathname + window.location.search);
                    return cfg;
                }
            } catch(e) {}
        }
        // localStorage에서 읽기
        try {
            const stored = localStorage.getItem('soon-config');
            if (stored) return JSON.parse(stored);
        } catch(e) {}
        return null;
    };

    const cfg = getConfig();

    if (cfg && cfg.firebaseConfig && cfg.firebaseConfig.projectId) {
        try {
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getAuth, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const { getFirestore, doc, collection, onSnapshot, setDoc, addDoc, deleteDoc, query, getDoc, updateDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js");

            const app = initializeApp(cfg.firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const storage = getStorage(app);

            window.SOON_CONFIG = cfg;
            window.FB_SDK = { auth, db, storage, ref, uploadBytes, getDownloadURL, deleteObject, doc, collection, onSnapshot, setDoc, addDoc, deleteDoc, query, getDoc, updateDoc, signInAnonymously, onAuthStateChanged, appId: 'soon-manager-v1' };
            window.__SOON_MODE__ = 'app';
            window.dispatchEvent(new CustomEvent('firebase-ready'));
        } catch(e) {
            console.error('Firebase init error:', e);
            localStorage.removeItem('soon-config');
            window.__SOON_MODE__ = 'wizard';
            window.dispatchEvent(new CustomEvent('show-wizard'));
        }
    } else {
        window.__SOON_MODE__ = 'wizard';
        window.dispatchEvent(new CustomEvent('show-wizard'));
    }
</script>

<!-- ② React 앱 (SetupWizard + 메인 앱) -->
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ═══════════════════════════════════════════════
//  설정 마법사 (SetupWizard) — Firebase Storage 통합
// ═══════════════════════════════════════════════
const FIRESTORE_RULES = `rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}`;

const STORAGE_RULES = `rules_version = '2';
service firebase.storage {
  match /b/{bucket}/o {
    match /{allPaths=**} {
      allow read, write: if request.auth != null;
    }
  }
}`;

const WizardStep = ({ step, total, children }) => (
    <div key={step} className="wizard-in">
        <div className="flex items-center gap-2 mb-6">
            {Array.from({length: total}).map((_, i) => (
                <div key={i} className={`h-1.5 rounded-full flex-1 transition-all duration-500 ${i < step ? 'bg-[#802B22]' : i === step ? 'bg-[#802B22]/60' : 'bg-gray-200'}`} />
            ))}
        </div>
        <div className="text-xs font-black text-[#802B22]/60 uppercase tracking-widest mb-1">{step + 1} / {total} 단계</div>
        {children}
    </div>
);

const CopyButton = ({ text, label = "복사" }) => {
    const [copied, setCopied] = useState(false);
    const copy = () => {
        navigator.clipboard?.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }).catch(() => {
            const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            setCopied(true); setTimeout(() => setCopied(false), 2000);
        });
    };
    return (
        <button onClick={copy} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-black transition-all ${copied ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
            {copied ? '✓ 복사됨' : label}
        </button>
    );
};

const GuideBox = ({ icon, color = "blue", children }) => {
    const colors = { blue: 'bg-blue-50 border-blue-100 text-blue-800', green: 'bg-green-50 border-green-100 text-green-800', orange: 'bg-orange-50 border-orange-100 text-orange-800' };
    return (
        <div className={`border rounded-2xl p-4 flex gap-3 ${colors[color] || colors.blue}`}>
            <span className="text-xl shrink-0 mt-0.5">{icon}</span>
            <div className="text-sm font-bold leading-relaxed">{children}</div>
        </div>
    );
};

const StepItem = ({ num, children, done, onToggle }) => (
    <div className="flex gap-3 items-start">
        <button onClick={onToggle} className={`w-7 h-7 rounded-full shrink-0 flex items-center justify-center text-xs font-black transition-all border-2 mt-0.5 ${done ? 'bg-[#802B22] border-[#802B22] text-white' : 'border-gray-300 text-gray-400 hover:border-[#802B22]'}`}>
            {done ? '✓' : num}
        </button>
        <div className={`text-sm font-bold leading-relaxed pt-1 ${done ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{children}</div>
    </div>
);

const SetupWizard = () => {
    const [step, setStep] = useState(0);
    const [checks, setChecks] = useState({});
    const [fbConfigText, setFbConfigText] = useState('');
    const [parsedConfig, setParsedConfig] = useState(null);
    const [parseError, setParseError] = useState('');
    const [testStatus, setTestStatus] = useState('idle');
    const [testError, setTestError] = useState('');
    const [groupName, setGroupName] = useState('');
    const [adminPwd, setAdminPwd] = useState('');
    const [shareUrl, setShareUrl] = useState('');
    const [urlCopied, setUrlCopied] = useState(false);

    const TOTAL = 5;
    const check = (key) => setChecks(p => ({...p, [key]: !p[key]}));

    const parseConfig = () => {
        setParseError('');
        const text = fbConfigText.trim();
        try {
            let jsonStr = text;
            const m = text.match(/const\s+firebaseConfig\s*=\s*(\{[\s\S]*?\});?/) ||
                       text.match(/firebaseConfig:\s*(\{[\s\S]*?\})/) ||
                       text.match(/(\{[\s\S]*?"apiKey"[\s\S]*?\})/);
            if (m) jsonStr = m[1];
            jsonStr = jsonStr
                .replace(/\/\/.*$/gm, '')
                .replace(/,(\s*[\}\]])/g, '$1')
                .replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)(\s*):/g, '$1"$2"$3:')
                .trim();
            const parsed = JSON.parse(jsonStr);
            if (!parsed.apiKey || !parsed.projectId) throw new Error('apiKey 또는 projectId 없음');
            setParsedConfig(parsed);
            return true;
        } catch(e) {
            setParseError('파싱 실패: ' + e.message + '\nFirebase 콘솔에서 firebaseConfig 전체를 복사해서 붙여넣어 주세요.');
            return false;
        }
    };

    const testConnection = async () => {
        if (!parsedConfig) return;
        setTestStatus('testing'); setTestError('');
        try {
            const { initializeApp, deleteApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const testId = 'wizard-test-' + Date.now();
            const app = initializeApp(parsedConfig, testId);
            const auth = getAuth(app); const db = getFirestore(app);
            await signInAnonymously(auth);
            await getDoc(doc(db, 'artifacts', 'soon-manager-v1', 'public', 'data', 'settings', 'test'));
            await deleteApp(app);
            setTestStatus('success');
        } catch(e) {
            setTestStatus('error');
            if (e.code === 'auth/configuration-not-found' || e.code === 'auth/operation-not-allowed') {
                setTestError('익명 로그인이 활성화되지 않았습니다. 3단계를 다시 확인해주세요.');
            } else if (e.message?.includes('PERMISSION_DENIED') || e.code === 'permission-denied') {
                setTestError('Firestore 보안 규칙이 설정되지 않았습니다. 2단계를 다시 확인해주세요.');
            } else {
                setTestError(e.message || e.code || '알 수 없는 오류');
            }
        }
    };

    const finish = async () => {
        const cfg = {
            groupName: groupName.trim() || '우리 순',
            firebaseConfig: parsedConfig,
        };
        localStorage.setItem('soon-config', JSON.stringify(cfg));
        try {
            const { initializeApp, deleteApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const { getFirestore, doc, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const app = initializeApp(parsedConfig, 'setup-fin-' + Date.now());
            const auth = getAuth(app); const db = getFirestore(app);
            await signInAnonymously(auth);
            await setDoc(doc(db, 'artifacts', 'soon-manager-v1', 'public', 'data', 'settings', 'admin'), { password: adminPwd.trim() || '1234' });
            await deleteApp(app);
        } catch(e) { console.warn('Admin pwd save failed:', e); }
        const encoded = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(cfg)))));
        setShareUrl(window.location.origin + window.location.pathname + '#' + encoded);
        setStep(6);
    };

    const copyUrl = () => {
        navigator.clipboard?.writeText(shareUrl).then(() => { setUrlCopied(true); setTimeout(() => setUrlCopied(false), 3000); }).catch(() => {
            const ta = document.createElement('textarea'); ta.value = shareUrl; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            setUrlCopied(true); setTimeout(() => setUrlCopied(false), 3000);
        });
    };

    const BtnPrimary = ({ onClick, disabled, children }) => (
        <button onClick={onClick} disabled={disabled} className={`w-full py-4 rounded-2xl font-black text-base transition-all ${disabled ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-[#802B22] text-white shadow-lg hover:bg-[#6c231c] active:scale-95'}`}>
            {children}
        </button>
    );
    const BtnSecondary = ({ onClick, children }) => (
        <button onClick={onClick} className="w-full py-3.5 rounded-2xl font-black text-base bg-gray-100 text-gray-600 hover:bg-gray-200 active:scale-95 transition-all">
            {children}
        </button>
    );

    return (
        <div className="min-h-screen bg-gradient-to-br from-[#802B22]/5 via-white to-orange-50/30 flex items-center justify-center p-4">
            <div className="w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl p-8 relative overflow-hidden max-h-screen overflow-y-auto">
                <div className="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-[#802B22] via-orange-400 to-[#802B22] opacity-30 rounded-t-[2.5rem]" />

                {/* STEP 0: 환영 */}
                {step === 0 && (
                    <div className="wizard-in text-center">
                        <div className="text-6xl mb-5">⛪</div>
                        <h1 className="text-3xl font-black text-gray-900 mb-2">순 매니저</h1>
                        <p className="text-[#802B22] font-black text-sm mb-6 tracking-wider">SOON MANAGER SETUP</p>
                        <div className="bg-gray-50 rounded-2xl p-5 text-left space-y-3 mb-5">
                            {[['📿','순기도제목','순원별 기도제목 태그 분류 & 공유'],['📖','순예배주보','악보·성경·광고 이미지 업로드'],['📅','순예배기록','출석·헌금·달력 연간 통계']].map(([ic,t,d]) => (
                                <div key={t} className="flex items-start gap-3">
                                    <span className="text-xl">{ic}</span>
                                    <div><div className="font-black text-gray-800 text-sm">{t}</div><div className="text-gray-500 text-xs font-bold">{d}</div></div>
                                </div>
                            ))}
                        </div>
                        <GuideBox icon="☁️" color="green">이미지는 <strong>Firebase Storage</strong>에 저장됩니다. 별도 가입 없이 같은 구글 계정으로 사용!</GuideBox>
                        <div className="mt-4 bg-amber-50 border border-amber-100 rounded-2xl p-3 text-xs text-amber-700 font-bold text-left">
                            ⏱️ 설정에 약 <strong>10분</strong>이 걸립니다. 구글 계정만 있으면 됩니다.
                        </div>
                        <div className="mt-5">
                            <BtnPrimary onClick={() => setStep(1)}>설정 시작하기 →</BtnPrimary>
                        </div>
                    </div>
                )}

                {/* STEP 1: Firebase 프로젝트 생성 */}
                {step === 1 && (
                    <WizardStep step={0} total={TOTAL}>
                        <h2 className="text-2xl font-black text-gray-900 mb-1">Firebase 프로젝트 만들기</h2>
                        <p className="text-gray-500 font-bold text-sm mb-4">구글의 무료 데이터베이스 서비스</p>
                        <GuideBox icon="💡">Firestore 무료 플랜: 하루 읽기 5만 번·쓰기 2만 번. Storage 무료: 5GB. 소규모 순모임에 충분합니다.</GuideBox>
                        <a href="https://console.firebase.google.com" target="_blank" rel="noopener" className="flex items-center justify-center gap-2 w-full py-3.5 rounded-2xl font-black text-sm bg-orange-500 text-white shadow-md hover:bg-orange-600 active:scale-95 transition-all mt-4 mb-1">
                            🔥 Firebase 콘솔 열기
                        </a>
                        <div className="bg-gray-50 rounded-2xl p-4 space-y-3 mt-3">
                            {[
                                ['"프로젝트 추가" 버튼 클릭',''],
                                ['프로젝트 이름 입력','예: my-soon-manager (영문 권장)'],
                                ['Google Analytics 비활성화','토글 끄고 진행'],
                                ['"프로젝트 만들기" 클릭 후 완료 대기',''],
                            ].map(([t,d],i) => (
                                <StepItem key={i} num={i+1} done={checks[`s1_${i}`]} onToggle={() => check(`s1_${i}`)}>
                                    <span className="font-black text-gray-800">{t}</span>
                                    {d && <><br/><span className="font-bold text-gray-500 text-xs">{d}</span></>}
                                </StepItem>
                            ))}
                        </div>
                        <div className="mt-5 space-y-2">
                            <BtnPrimary onClick={() => setStep(2)}>완료했어요 →</BtnPrimary>
                            <BtnSecondary onClick={() => setStep(0)}>← 이전</BtnSecondary>
                        </div>
                    </WizardStep>
                )}

                {/* STEP 2: Firestore + Storage + 보안 규칙 */}
                {step === 2 && (
                    <WizardStep step={1} total={TOTAL}>
                        <h2 className="text-2xl font-black text-gray-900 mb-1">데이터베이스 & 스토리지 설정</h2>
                        <p className="text-gray-500 font-bold text-sm mb-4">순원 정보 저장 + 사진 업로드 공간 만들기</p>

                        {/* Firestore */}
                        <div className="mb-1">
                            <div className="flex items-center gap-2 mb-2">
                                <span className="w-6 h-6 rounded-full bg-[#802B22] text-white text-xs font-black flex items-center justify-center shrink-0">A</span>
                                <span className="font-black text-gray-800">Firestore Database 만들기</span>
                            </div>
                            <div className="bg-gray-50 rounded-xl p-3 space-y-2 ml-8">
                                {[
                                    ['빌드 → Firestore Database 클릭','왼쪽 메뉴'],
                                    ['"데이터베이스 만들기" → 프로덕션 모드',''],
                                    ['리전: asia-northeast3 (서울) 선택',''],
                                    ['"규칙" 탭 → 아래 규칙으로 교체 → 게시',''],
                                ].map(([t,d],i) => (
                                    <StepItem key={i} num={i+1} done={checks[`s2a_${i}`]} onToggle={() => check(`s2a_${i}`)}>
                                        <span className="font-black text-gray-800 text-xs">{t}</span>
                                        {d && <><br/><span className="font-bold text-gray-400 text-[11px]">{d}</span></>}
                                    </StepItem>
                                ))}
                            </div>
                            <div className="mt-2 ml-8">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Firestore 보안 규칙</span>
                                    <CopyButton text={FIRESTORE_RULES} label="복사" />

const Icon = ({ name, className = "w-5 h-5" }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (window.lucide && ref.current) {
            ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
            window.lucide.createIcons({ root: ref.current });
        }
    }, [name]);
    return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
};

const Card = ({ children, className = "" }) => (
    <div className={`bg-white rounded-[32px] p-6 card-shadow ${className}`}>{children}</div>
);

const compressImage = (file) => {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const MAX_WIDTH = 800;
                let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
        };
    });
};

const getLocalYYYYMMDD = (dateObj) => {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const d = String(dateObj.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
};

const FullScreenImageViewer = ({ src, onClose }) => {
    const [imgScale, setImgScale] = useState(1);
    const [imgPos, setImgPos] = useState({ x:0, y:0 });
    const pinchRef = useRef(null);
    const lastPosRef = useRef(null);
    const getDistance = (touches) => Math.hypot(touches[0].pageX-touches[1].pageX, touches[0].pageY-touches[1].pageY);
    const handleTouchStart = (e) => {
        if (e.touches.length===2) pinchRef.current = {dist: getDistance(e.touches), scale: imgScale};
        else if (e.touches.length===1 && imgScale>1) lastPosRef.current = {x: e.touches[0].pageX-imgPos.x, y: e.touches[0].pageY-imgPos.y};
    };
    const handleTouchMove = (e) => {
        e.preventDefault();
        if (e.touches.length===2 && pinchRef.current) {
            const newScale = Math.min(Math.max(1, pinchRef.current.scale*(getDistance(e.touches)/pinchRef.current.dist)), 5);
            setImgScale(newScale);
            if (newScale===1) setImgPos({x:0,y:0});
        } else if (e.touches.length===1 && imgScale>1 && lastPosRef.current) {
            setImgPos({x: e.touches[0].pageX-lastPosRef.current.x, y: e.touches[0].pageY-lastPosRef.current.y});
        }
    };
    const handleTouchEnd = (e) => { if (e.touches.length<2) pinchRef.current=null; if (e.touches.length===0) lastPosRef.current=null; if (imgScale<=1) {setImgScale(1);setImgPos({x:0,y:0});} };
    return (
        <div className="fixed inset-0 z-[99999] bg-black flex items-center justify-center fade-in overflow-hidden" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} onClick={imgScale===1?onClose:undefined} style={{touchAction:'none'}}>
            <img src={src} alt="크게 보기" draggable={false} style={{transform:`scale(${imgScale}) translate(${imgPos.x/imgScale}px,${imgPos.y/imgScale}px)`,transformOrigin:'center center',transition:pinchRef.current?'none':'transform .15s ease-out',maxWidth:'100vw',maxHeight:'100vh',objectFit:'contain',userSelect:'none',display:'block'}} />
            <div className="absolute top-5 right-5 flex gap-2">
                <button onClick={async(e)=>{e.stopPropagation();try{const r=await fetch(src);const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='image_'+Date.now()+'.jpg';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}catch{alert('길게 눌러 저장해주세요.');} }} className="bg-white/20 backdrop-blur-sm text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-white/30"><Icon name="download" className="w-5 h-5" /></button>
                <button onClick={(e)=>{e.stopPropagation();onClose();}} className="bg-white/20 backdrop-blur-sm text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-white/30">✕</button>
            </div>
            {imgScale>1 && <button onClick={(e)=>{e.stopPropagation();setImgScale(1);setImgPos({x:0,y:0});}} className="absolute bottom-8 left-1/2 -translate-x-1/2 bg-white/20 backdrop-blur-sm text-white text-xs font-black px-4 py-2 rounded-full hover:bg-white/30">원래 크기로</button>}
        </div>
    );
};

const WorshipGuideView = ({ guideData, onUpdateGuide }) => {
    const [isEditing, setIsEditing] = useState(false);
    const [form, setForm] = useState(guideData);
    const [fullScreenImage, setFullScreenImage] = useState(null);
    const [fullScreenBible, setFullScreenBible] = useState(false);
    const [uploadingSlot, setUploadingSlot] = useState(null);
    const [pinchDist, setPinchDist] = useState(null);
    const [textScale, setTextScale] = useState(1);

    useEffect(() => { setForm(guideData); }, [guideData]);
    useEffect(() => { if (!fullScreenBible) setTextScale(1); }, [fullScreenBible]);

    // Firebase Storage로 이미지 업로드
    const handleImageUpload = async (e, slot) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploadingSlot(slot);
        const pathSlot = slot + 'Path'; // 스토리지 경로 저장용
        try {
            const { storage, ref, uploadBytes, getDownloadURL, deleteObject } = window.FB_SDK;
            // 기존 이미지 삭제
            const oldPath = form[pathSlot];
            if (oldPath) { try { await deleteObject(ref(storage, oldPath)); } catch(_) {} }
            // 이미지 압축 후 업로드
            const compressed = await compressImage(file);
            const blob = await (await fetch(compressed)).blob();
            const path = `images/${slot}_${Date.now()}.jpg`;
            const storageRef = ref(storage, path);
            await uploadBytes(storageRef, blob);
            const url = await getDownloadURL(storageRef);
            setForm(prev => ({...prev, [slot]: url, [pathSlot]: path}));
        } catch(err) {
            console.error('이미지 업로드 실패:', err);
            alert('이미지 업로드에 실패했습니다. Firebase Storage 규칙을 확인해주세요.');
        } finally { setUploadingSlot(null); }
    };

    const save = () => { onUpdateGuide(form); setIsEditing(false); alert("예배 주보가 저장되었습니다."); };

    const handleDeleteAdImage = async (slot) => {
        const pathSlot = slot + 'Path';
        const oldPath = form[pathSlot];
        if (oldPath) { try { const { storage, ref, deleteObject } = window.FB_SDK; await deleteObject(ref(storage, oldPath)); } catch(_) {} }
        const updated = {...form, [slot]:'', [pathSlot]:''};
        setForm(updated);
        await onUpdateGuide(updated);
    };

    const handleTouchStart = (e) => { if (e.touches.length===2) { const d=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY); setPinchDist(d); } };
    const handleTouchMove = (e) => { if (e.touches.length===2&&pinchDist!==null) { const d=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY); setTextScale(prev=>Math.min(Math.max(.5,prev*(d/pinchDist)),5)); setPinchDist(d); } };
    const handleTouchEnd = () => setPinchDist(null);

    const copyToClipboard = (text) => { if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).then(()=>alert('복사됨: '+text)).catch(()=>fallbackCopy(text));}else{fallbackCopy(text);} };

// ── 순기도제목 뷰 ──────────────────────────────────────────────
const extractTags = (text, member) => {
    if (!text) return [];
    const tags = new Set();
    const healthText = text.replace(/건강한\s*가정/g,'');
    if (/건강|치료|수술|아픔|병원|항암|질병|질환|입원|투병/.test(healthText)) tags.add('건강');
    if (/부모님|어머니|어머님|아버지|아버님|장인|장모|시어머니|시아버지|시댁|처가|친정|양가/.test(text)) tags.add('부모님');
    if (/자녀|아들|딸|아이|임신|출산|육아|학업|학교|대학|수능|합격|공부|진로/.test(text)) tags.add('자녀');
    if (member?.children) {
        const childNames = member.children.replace(/\(.*?\)/g,'').split(/[\s,]+/).map(n=>n.trim()).filter(n=>n.length>0);
        if (childNames.some(name=>text.includes(name))) tags.add('자녀');
    }
    if (/사역|사명|순장|봉사|전도|선교|임원|교사|목장|다락방/.test(text)) tags.add('교회/사역');
    if (/직장|취업|이직|회사|면접|승진|업무|사업|매출|계약/.test(text)) tags.add('직장/사업');
    if (/말씀|믿음|관계|갈등|마음|우울|평안|위로/.test(text)) tags.add('말씀/믿음');
    if (/가정|남편|아내|부부|결혼|배우자|신앙|예배|교회|성령|은혜|기도/.test(text)) tags.add('가정/신앙');
    return Array.from(tags).slice(0,4);
};

const PrayerListView = ({ members, onUpdate }) => {
    const activeMembers = useMemo(() => members.filter(m=>m.isParticipating&&m.name.trim()!==''), [members]);
    const [shuffledIds, setShuffledIds] = useState([]);
    useEffect(()=>{ const ids=activeMembers.map(m=>m.id); ids.sort(()=>Math.random()-.5); setShuffledIds(ids); }, [activeMembers.length]);
    const displayMembers = useMemo(()=>{ if(shuffledIds.length===0)return activeMembers; const byId={}; activeMembers.forEach(m=>{byId[m.id]=m;}); return shuffledIds.map(id=>byId[id]).filter(Boolean); }, [activeMembers,shuffledIds]);
    const allTags = useMemo(()=>{ const tags=new Set(); activeMembers.forEach(m=>extractTags(m.prayer,m).forEach(t=>tags.add(t))); return Array.from(tags); }, [activeMembers]);
    const [selectedTag, setSelectedTag] = useState(null);
    const [isAllExpanded, setIsAllExpanded] = useState(true);
    const [editingMember, setEditingMember] = useState(null);
    const [editDraft, setEditDraft] = useState("");
    const filteredMembers = useMemo(()=>{
        if(selectedTag==='가나다순') return [...activeMembers].sort((a,b)=>a.name.localeCompare(b.name));
        if(!selectedTag) return displayMembers;
        return displayMembers.filter(m=>extractTags(m.prayer,m).includes(selectedTag));
    }, [displayMembers,activeMembers,selectedTag]);

    const openEdit = (m) => { setEditingMember(m); setEditDraft(m.prayer||""); };
    const closeEdit = () => { setEditingMember(null); setEditDraft(""); };
    const handleSavePrayer = () => { onUpdate(editingMember.id, editDraft); closeEdit(); };

    const handleShareAll = async () => {
        const groupName = window.SOON_CONFIG?.groupName || '우리 순';
        const prayers = activeMembers.filter(m=>m.prayer&&m.prayer.trim()!=='').sort((a,b)=>(a.order||99)-(b.order||99));
        let text = `★${groupName} 기도제목★\n\n`;
        prayers.forEach(m => { text += `[${m.name} ${m.role||''}]\n${m.prayer}\n\n`; });
        const copyText = async () => {
            if(navigator.clipboard&&window.isSecureContext){try{await navigator.clipboard.writeText(text);return true;}catch{}}
            const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-999999px';document.body.appendChild(ta);ta.focus();ta.select();
            try{document.execCommand('copy');document.body.removeChild(ta);return true;}catch{document.body.removeChild(ta);return false;}
        };
        const copied = await copyText();
        if(navigator.share){try{await navigator.share({text});return;}catch{}}
        if(copied) alert('전체 기도제목이 복사되었습니다.');
    };

    return (
        <div className="space-y-6 animate-slide-up pb-6">

                {allTags.map(tag => <button key={tag} onClick={()=>setSelectedTag(selectedTag===tag?null:tag)} className={`px-4 py-2 rounded-full text-sm font-black transition-colors shadow-sm ${selectedTag===tag?'bg-gray-800 text-white':'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>#{tag}</button>)}
            </div>
            <div className="flex justify-between items-center px-1">
                <button onClick={handleShareAll} className="flex items-center gap-1.5 text-[12px] font-black text-gray-500 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100 hover:bg-gray-50 active:scale-95">

                <button onClick={()=>setIsAllExpanded(!isAllExpanded)} className="text-sm font-black text-[#802B22] flex items-center gap-1.5 bg-red-50 px-4 py-2 rounded-xl active:scale-95 transition-transform shadow-sm hover:bg-red-100 border border-red-100">

                            <div className="flex justify-between items-center mb-6 shrink-0">
                                <div><span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase block mb-1">PRAYER EDIT</span><h3 className="font-black text-xl md:text-2xl">{editingMember.name} {editingMember.role} 기도제목 수정</h3></div>

            if (m.gender==='M') familyMap[fid].husband = m;

            if (m.children) familyMap[fid].children = m.children;
            if (m.vehicle) familyMap[fid].vehicle = m.vehicle;

                                    return (
                                        <tr key={f.id} className="hover:bg-gray-50">
                                            <td className={`py-5 px-6 border-r border-gray-100 ${!husband.isParticipating?'opacity-40':''}`}>
                                                {husband.name?<div className="flex flex-col gap-1"><div className="font-black text-gray-800 text-lg">{husband.name} <span className="font-bold text-gray-400 text-sm ml-1.5">{husband.role}</span></div>{husband.birthday&&<div className="text-xs text-pink-400 font-bold">🎂 {husband.birthday}</div>}<div className="flex items-center gap-1.5 mt-1"><Icon name={husband.isParticipating?"check-circle":"circle"} className={`w-4 h-4 ${husband.isParticipating?'text-[#802B22]':'text-gray-300'}`}/><span className="text-xs font-bold text-gray-500">{husband.isParticipating?'순예배 참여':'미참여'}</span></div></div>:<span className="text-gray-300 font-bold">-</span>}
                                            </td>
                                            <td className={`py-5 px-6 border-r border-gray-100 ${!wife.isParticipating?'opacity-40':''}`}>
                                                {wife.name?<div className="flex flex-col gap-1"><div className="font-black text-gray-800 text-lg">{wife.name} <span className="font-bold text-gray-400 text-sm ml-1.5">{wife.role}</span></div>{wife.birthday&&<div className="text-xs text-pink-400 font-bold">🎂 {wife.birthday}</div>}<div className="flex items-center gap-1.5 mt-1"><Icon name={wife.isParticipating?"check-circle":"circle"} className={`w-4 h-4 ${wife.isParticipating?'text-[#802B22]':'text-gray-300'}`}/><span className="text-xs font-bold text-gray-500">{wife.isParticipating?'순예배 참여':'미참여'}</span></div></div>:<span className="text-gray-300 font-bold">-</span>}
                                            </td>
                                            <td className="py-5 px-6 border-r border-gray-100"><span className="text-base font-bold text-gray-700 leading-snug break-keep">{f.children||'-'}</span></td>
                                            <td className="py-5 px-6 border-r border-gray-100"><span className="text-base font-black text-[#802B22] break-keep">{f.vehicle||'-'}</span></td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            {showChangePwd && ReactDOM.createPortal(
                <div className="fixed inset-0 z-[200] bg-white/80 backdrop-blur-sm flex items-center justify-center p-4 fade-in" onClick={()=>setShowChangePwd(false)}>
                    <div className="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border border-gray-100 text-center" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-2xl font-black text-gray-800 mb-6">새 비밀번호 설정</h3>
                        <input type="text" value={newPwd} onChange={e=>setNewPwd(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleChangePwd();}} className="w-full p-4 bg-[#F3F4F6] border border-transparent rounded-2xl font-black text-center text-lg mb-6 outline-none focus:border-[#802B22]" placeholder="새로운 비밀번호 입력"/>
                        <div className="flex gap-3 mt-2">
                            <button onClick={()=>setShowChangePwd(false)} className="flex-1 py-4 text-gray-500 text-lg font-black rounded-2xl active:scale-95 hover:bg-gray-50">취소</button>
                            <button onClick={handleChangePwd} className="flex-1 py-4 bg-[#802B22] text-white text-lg font-black rounded-2xl active:scale-95 shadow-md hover:bg-[#6c231c]">변경 완료</button>
                        </div>
                    </div>
                </div>,
                document.body
            )}
        </div>,
        document.body
    );
};

// ═══════════════════════════════════════════════
//  메인 앱 (설정 로드 후 표시)
// ═══════════════════════════════════════════════
const MainApp = () => {
    const [ready, setReady] = useState(false);
    const [view, setView] = useState('prayer');
    const [showDirectory, setShowDirectory] = useState(false);
    const [members, setMembers] = useState([]);
    const [history, setHistory] = useState([]);
    const [finance, setFinance] = useState({ carryOver: 0 });
    const [adminPass, setAdminPass] = useState("1234");
    const [isGlobalAdmin, setIsGlobalAdmin] = useState(false);
    const [showGlobalAuth, setShowGlobalAuth] = useState(false);
    const [globalAuthInput, setGlobalAuthInput] = useState('');
    const [globalAuthError, setGlobalAuthError] = useState('');
    const [pendingGlobalAction, setPendingGlobalAction] = useState(null);
    const [showNav, setShowNav] = useState(true);
    const [guideData, setGuideData] = useState({
        prayerLeader: "순장",
        closingPrayerLeader: "",
        announcements: "",
        applicationText: "실천할 일을 결단하고 나누기",
        bibleVerse: "",
        bibleContent: "",
        prsBible: "",
        prsLink: "",
        musicImage: null,
        musicImage2: null
    });

    const groupName = window.SOON_CONFIG?.groupName || '순 매니저';

    const requestAdmin = (action) => {
        if (isGlobalAdmin) { action(); }
        else { setPendingGlobalAction(()=>action); setShowGlobalAuth(true); }
    };
    const handleGlobalAuthConfirm = () => {
        if (globalAuthInput === adminPass) {
            setIsGlobalAdmin(true); setShowGlobalAuth(false); setGlobalAuthInput(''); setGlobalAuthError('');
            if (pendingGlobalAction) { pendingGlobalAction(); setPendingGlobalAction(null); }
        } else { setGlobalAuthError('비밀번호가 일치하지 않습니다.'); }
    };
    const logoutAdmin = () => setIsGlobalAdmin(false);

    useEffect(()=>{
        let lastScrollY = window.pageYOffset, ticking = false;
        const updateNav = () => {
            const curr = window.pageYOffset;
            if(curr<60) setShowNav(true);
            else if(curr>lastScrollY+5) setShowNav(false);
            else if(curr<lastScrollY-5) setShowNav(true);
            lastScrollY = curr>0?curr:0; ticking=false;
        };
        const onScroll = ()=>{ if(!ticking){window.requestAnimationFrame(updateNav);ticking=true;} };
        window.addEventListener('scroll',onScroll,{passive:true});
        return ()=>window.removeEventListener('scroll',onScroll);
    },[]);

    useEffect(()=>{
        const init = async () => {
            const { auth, signInAnonymously, db, collection, onSnapshot, appId, doc } = window.FB_SDK;
            await signInAnonymously(auth);
            onSnapshot(collection(db,'artifacts',appId,'public','data','members'), s=>{
                const list = s.docs.map(d=>({id:d.id,...d.data()}));
                setMembers(list.sort((a,b)=>(a.order||99)-(b.order||99)));
            });
            onSnapshot(collection(db,'artifacts',appId,'public','data','worship'), s=>{
                setHistory(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date)));
            });
            onSnapshot(doc(db,'artifacts',appId,'public','data','settings','guide'), s=>{
                if(s.exists()) setGuideData(s.data());
            });
            onSnapshot(doc(db,'artifacts',appId,'public','data','settings','finance'), s=>{
                if(s.exists()) setFinance(s.data());
            });
            onSnapshot(doc(db,'artifacts',appId,'public','data','settings','admin'), s=>{
                if(s.exists()) { setAdminPass(s.data().password); }
                else { window.FB_SDK.setDoc(doc(db,'artifacts',appId,'public','data','settings','admin'),{password:"1234"}); }
            });
            setReady(true);
        };
        if (window.FB_SDK) init();
        else window.addEventListener('firebase-ready', init);
    },[]);

    const handleUpdateGuide = async (newData) => { const {db,doc,setDoc,appId}=window.FB_SDK; await setDoc(doc(db,'artifacts',appId,'public','data','settings','guide'),newData); };
    const handleUpdateFinanceEdits = async (carryOver, edits) => { const {db,doc,setDoc,updateDoc,appId}=window.FB_SDK; await setDoc(doc(db,'artifacts',appId,'public','data','settings','finance'),{carryOver:Number(carryOver)}); for(const id in edits){if(edits[id]!==undefined){await updateDoc(doc(db,'artifacts',appId,'public','data','worship',id),{offering:Number(edits[id])});}} };
    const handleUpdateRecord = async (id, data) => { const {db,doc,updateDoc,appId}=window.FB_SDK; await updateDoc(doc(db,'artifacts',appId,'public','data','worship',id),{date:data.date,type:data.type||"순예배",members:data.members,offering:Number(data.offering)||0,location:data.location||"",notes:data.notes||""}); };
    const handleDeleteRecord = async (id) => { const {db,doc,deleteDoc,appId}=window.FB_SDK; await deleteDoc(doc(db,'artifacts',appId,'public','data','worship',id)); };
    const handleUpdatePrayer = async (id, prayer) => { const {db,doc,updateDoc,appId}=window.FB_SDK; await updateDoc(doc(db,'artifacts',appId,'public','data','members',id),{prayer}); };
    const handleGlobalSaveFamilyInfo = async (families, draftsMap) => {
        const {db,doc,updateDoc,appId}=window.FB_SDK;
        const promises=[];
        for(const f of families){
            const draft=draftsMap[f.id]; if(!draft) continue;
            if(f.husband?.id) promises.push(updateDoc(doc(db,'artifacts',appId,'public','data','members',f.husband.id),{name:draft.hName,role:draft.hRole,isParticipating:draft.hPart,children:draft.children,vehicle:draft.vehicle,birthday:draft.hBirthday||""}));
            if(f.wife?.id) promises.push(updateDoc(doc(db,'artifacts',appId,'public','data','members',f.wife.id),{name:draft.wName,role:draft.wRole,isParticipating:draft.wPart,children:draft.children,vehicle:draft.vehicle,birthday:draft.wBirthday||""}));
        }
        await Promise.all(promises);
    };
    const handleAddFamily = async () => {
        const {db,collection,addDoc,appId}=window.FB_SDK;
        const newId="f_"+Date.now();
        const newOrder=members.length+1;
        await addDoc(collection(db,'artifacts',appId,'public','data','members'),{familyId:newId,name:"",role:"",gender:"M",children:"",vehicle:"",prayer:"",isParticipating:false,order:newOrder});
        await addDoc(collection(db,'artifacts',appId,'public','data','members'),{familyId:newId,name:"",role:"",gender:"F",children:"",vehicle:"",prayer:"",isParticipating:false,order:newOrder+1});
    };
    const handleDeleteFamily = async (familyId) => {
        if(!confirm("이 가족 명단을 완전히 삭제하시겠습니까?")) return;
        const {db,doc,deleteDoc,appId}=window.FB_SDK;
        const familyMembers=members.filter(m=>(m.familyId||m.id)===familyId);
        for(const m of familyMembers){await deleteDoc(doc(db,'artifacts',appId,'public','data','members',m.id));}
    };
    const handleChangeAdminPass = async (newPwd) => {
        const {db,doc,setDoc,appId}=window.FB_SDK;
        await setDoc(doc(db,'artifacts',appId,'public','data','settings','admin'),{password:newPwd});
        setAdminPass(newPwd);
    };

    const tabs = [
        {id:'prayer', icon:'users', label:'순기도제목'},
        {id:'guide', icon:'book-open', label:'순예배주보'},
        {id:'history', icon:'calendar-days', label:'순예배기록'}
    ];
    const activeIndex = tabs.findIndex(t=>t.id===view);

    if (!ready) return (
        <div className="h-screen flex items-center justify-center w-full">
            <div className="w-12 h-12 border-4 border-[#802B22] border-t-transparent rounded-full animate-spin"></div>
        </div>
    );

    return (
        <div className="w-full min-h-[100dvh] bg-[#F3F4F6] flex flex-col relative overflow-x-hidden">
            <div className={`bg-white border-b border-gray-100 shadow-sm z-40 flex justify-center w-full fixed top-0 transition-transform duration-300 ease-in-out ${showNav?'translate-y-0':'-translate-y-full'}`}>
                <div className="w-full max-w-6xl flex items-center gap-3 p-4 md:p-5">
                    <div className="w-9 h-9 rounded-xl bg-[#802B22] flex items-center justify-center shrink-0">
                        <Icon name="church" className="w-5 h-5 text-white"/>
                    </div>
                    <h2 className="text-[19px] md:text-xl font-black tracking-tighter text-gray-800 flex-1">{groupName} 매니저</h2>
                    {isGlobalAdmin && (
                        <button onClick={logoutAdmin} className="flex items-center gap-1.5 px-3 py-1.5 bg-red-50 border border-red-200 text-[#802B22] text-xs font-black rounded-xl active:scale-95 hover:bg-red-100 shadow-sm">
                            <Icon name="lock" className="w-3.5 h-3.5"/> 관리자 종료
                        </button>
                    )}
                </div>
            </div>

            {showGlobalAuth && ReactDOM.createPortal(
                <div className="fixed inset-0 z-[999999] bg-white/80 backdrop-blur-sm flex items-center justify-center p-4" onClick={()=>{setShowGlobalAuth(false);setGlobalAuthError('');setGlobalAuthInput('');}}>
                    <div className="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border border-gray-100 text-center" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-2xl font-black text-gray-800 mb-2">관리자 인증</h3>
                        <p className="text-sm text-gray-500 font-bold mb-6">보안을 위해 비밀번호가 필요합니다.</p>
                        <input type="password" value={globalAuthInput} onChange={e=>{setGlobalAuthInput(e.target.value);setGlobalAuthError('');}} onKeyDown={e=>{if(e.key==='Enter')handleGlobalAuthConfirm();}} className={`w-full p-4 bg-[#F3F4F6] border ${globalAuthError?'border-red-400':'border-transparent'} rounded-2xl font-black text-center text-xl tracking-[0.2em] mb-2 outline-none focus:border-[#802B22]`} placeholder="••••••••" autoFocus/>
                        {globalAuthError && <p className="text-red-500 text-sm font-bold mb-2">{globalAuthError}</p>}
                        <div className="flex gap-3 mt-6">
                            <button onClick={()=>{setShowGlobalAuth(false);setGlobalAuthError('');setGlobalAuthInput('');}} className="flex-1 py-4 text-gray-500 text-lg font-black rounded-2xl active:scale-95 hover:bg-gray-50">취소</button>
                            <button onClick={handleGlobalAuthConfirm} className="flex-1 py-4 bg-[#802B22] text-white text-lg font-black rounded-2xl active:scale-95 shadow-md hover:bg-[#6c231c]">확인</button>
                        </div>
                    </div>
                </div>,
                document.body
            )}

            <div className="flex-1 w-full flex justify-center pt-[74px] md:pt-[80px] pb-[100px] bg-[#F3F4F6]">
                <div className="w-full max-w-6xl p-4 md:p-6">
                    {view==='prayer' && <PrayerListView members={members} onUpdate={handleUpdatePrayer}/>}
                    {view==='guide' && <WorshipGuideView guideData={guideData} onUpdateGuide={handleUpdateGuide}/>}
                    {view==='history' && <WorshipHistoryView history={history} members={members} finance={finance} isGlobalAdmin={isGlobalAdmin} onRequestAdmin={requestAdmin} onUpdateFinanceEdits={handleUpdateFinanceEdits} onUpdateRecord={handleUpdateRecord} onDeleteRecord={handleDeleteRecord} onOpenDirectory={()=>setShowDirectory(true)} onAddRecord={async(r)=>{const{db,collection,addDoc,appId}=window.FB_SDK;await addDoc(collection(db,'artifacts',appId,'public','data','worship'),r);}}/>}
                </div>
            </div>

            <nav className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 h-[76px] md:h-[84px] safe-bottom z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] flex justify-center transition-transform duration-300 ease-in-out ${showNav?'translate-y-0':'translate-y-full'}`}>
                <div className="w-full max-w-xl flex relative h-full px-2 items-center pb-1">
                    <div className="absolute h-[56px] top-1/2 -translate-y-1/2 bg-red-50 rounded-[1.2rem] transition-transform duration-500" style={{width:`calc((100% - 16px) / 3)`,left:`8px`,transform:`translateX(calc(${activeIndex} * 100%))`,transitionTimingFunction:'cubic-bezier(0.34, 1.56, 0.64, 1)'}}/>
                    {tabs.map(t=>(
                        <button key={t.id} onClick={()=>{setView(t.id);window.scrollTo({top:0,behavior:'smooth'});setShowNav(true);}} className="flex-1 relative z-10 flex flex-col items-center justify-center h-full w-full outline-none" style={{WebkitTapHighlightColor:'transparent'}}>
                            <div className={`transition-all duration-500 ease-out flex flex-col items-center ${view===t.id?'-translate-y-1.5':'translate-y-0'}`}>
                                <Icon name={t.icon} className={`transition-colors duration-500 ${view===t.id?'text-[#802B22] w-[22px] h-[22px] stroke-[2.5]':'text-gray-400 w-6 h-6 stroke-2'}`}/>
                            </div>
                            <span className={`text-[11px] md:text-xs font-black tracking-tighter absolute bottom-1.5 transition-colors duration-500 ease-out ${view===t.id?'text-[#802B22]':'text-gray-400'}`}>{t.label}</span>
                        </button>
                    ))}
                </div>
            </nav>

            {showDirectory && <DirectoryModal members={members} onClose={()=>setShowDirectory(false)} onGlobalSave={handleGlobalSaveFamilyInfo} onAddFamily={handleAddFamily} onDeleteFamily={handleDeleteFamily} adminPass={adminPass} onChangeAdminPass={handleChangeAdminPass} isGlobalAdmin={isGlobalAdmin} onRequestAdmin={requestAdmin}/>}
        </div>
    );
};

// ═══════════════════════════════════════════════
//  루트 컴포넌트 (마법사 ↔ 메인 앱 전환)
// ═══════════════════════════════════════════════
const Root = () => {
    const [mode, setMode] = useState('loading');

    useEffect(()=>{
        // 이미 모듈 스크립트가 완료된 경우 (race condition 방지)
        if (window.__SOON_MODE__ === 'app') { setMode('app'); return; }
        if (window.__SOON_MODE__ === 'wizard') { setMode('wizard'); return; }
        // 아직 완료 안 된 경우 이벤트 대기
        const onReady = () => setMode('app');
        const onWizard = () => setMode('wizard');
        window.addEventListener('firebase-ready', onReady);
        window.addEventListener('show-wizard', onWizard);
        return ()=>{
            window.removeEventListener('firebase-ready', onReady);
            window.removeEventListener('show-wizard', onWizard);
        };
    },[]);

    if (mode === 'loading') return (
        <div className="h-screen flex flex-col items-center justify-center bg-white gap-4">
            <div className="w-12 h-12 border-4 border-[#802B22] border-t-transparent rounded-full animate-spin"></div>
            <p className="text-gray-400 font-bold text-sm">잠시만 기다려주세요...</p>
        </div>
    );
    if (mode === 'wizard') return <SetupWizard />;
    return <MainApp />;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);
</script>
</body>
</html>
